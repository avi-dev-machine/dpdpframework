red from undertaking tracking or behavioral monitoring of children.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Prohibition on Targeted Ads:</strong> Entities are prohibited from directing targeted advertising at children.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Verifiable Consent:</strong> Fiduciaries must obtain verifiable parental consent before processing a child's personal data.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Processing to Prevent Detrimental Effects</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Interestingly, the DPDP Rules, 2025, identify the prevention of detrimental effects as a specialized purpose that allows for certain procedural flexibility. Under the Fourth Schedule, a Data Fiduciary is exempt from the strictures of verifiable consent and the tracking ban if the processing is done specifically for:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Ensuring that any information, service, or advertisement likely to cause a detrimental effect on the well-being of a child is not accessible to her.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">This means that while fiduciaries cannot harm a child's well-being, they are encouraged (and procedurally supported) to use data to filter out harmful content or services.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Enforcement and High Penalties</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The framework treats the protection of children\u2019s well-being with significant gravity. Under the Schedule of the Act, a breach in observing the additional obligations in relation to children under <strong>Section 9</strong> can result in a monetary penalty of up to two hundred crore rupees. This is among the highest potential penalties specified in the Act, surpassed only by the penalty for failing to take reasonable security safeguards to prevent a data breach.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The substantive provisions governing the processing of children's data (<strong>Section 9</strong>) and the corresponding procedural mandates (Rules 10 and 12) are subject to a staggered commencement. According to the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, notification, these mandates are scheduled to come into force eighteen months later, meaning the prohibition on detrimental processing will be formally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></div>"
            },
            {
              "clause_number": "(3)",
              "title": "No tracking or behavioral monitoring",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">No tracking or behavioral monitoring</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, and the DPDP Rules, 2025, the prohibition against tracking or behavioural monitoring of children is a central protective pillar designed to prevent the exploitation of minors' digital footprints,. A \"child\" is defined under the Act as an individual who has not yet completed the age of eighteen years.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. The Statutory Prohibition (<strong>Section 9</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act imposes a strict ban on specific processing activities related to children's data:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>No Tracking or Monitoring:</strong> A Data Fiduciary is expressly prohibited from undertaking the tracking or behavioural monitoring of children.</li>\n<li style=\"margin-bottom: 4px;\"><strong>No Targeted Advertising:</strong> Linked to the tracking ban, entities are also barred from directing targeted advertising at children.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Exemptions by Class of Data Fiduciary (Fourth Schedule, <strong>Part A</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Rules, 2025, recognize that in certain specialized contexts, tracking or monitoring is necessary for a child's education or physical safety,. The following entities are exempt from the tracking ban under specific conditions:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Educational Institutions:</strong> Tracking and monitoring are permitted when restricted to educational activities or when done in the interest of student safety,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Cr\u00e8ches and Daycare Centers:</strong> Individuals entrusted with the care of infants and children in these centers may undertake monitoring if it is restricted to ensuring the safety of the children in their care,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Transport Providers:</strong> Entities engaged by schools or cr\u00e8ches for transportation are permitted to track the location of children during travel to and from the institution to ensure their safety,.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Exemptions by Purpose (Fourth Schedule, <strong>Part B</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The prohibition on tracking also does not apply when the processing serves critical public or safety interests,:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Legal and State Functions:</strong> Tracking is permitted to the extent necessary for the exercise of any power or performance of any function in the interest of a child under any Indian law, or for providing subsidies and benefits,,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Real-Time Location:</strong> Processing is allowed for determining a child's real-time location when it is done in the interest of their safety and protection,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Filtering Harmful Content:</strong> Fiduciaries may process data to ensure that information, services, or advertisements likely to have a detrimental effect on a child's well-being are not accessible to them,.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Potential for \"Verifiably Safe\" Exemptions</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act provides a mechanism for the Central Government to relax these restrictions for specific entities. If the Government is satisfied that a Data Fiduciary processes children's data in a verifiably safe manner, it may notify an age above which that specific fiduciary is exempt from the ban on tracking and behavioral monitoring.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Enforcement and Penalties</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The framework treats the protection of children as a high-priority obligation:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Significant Penalties:</strong> A breach of these additional obligations in relation to children (<strong>Section 9</strong>) can result in a monetary penalty of up to two hundred crore rupees,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Implementation Timeline:</strong> According to the enforcement notification from <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, the provisions of <strong>Section 9</strong> and the corresponding <strong>Rule 12</strong> will come into force eighteen months after the notification,,. This makes the ban on tracking formally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>.</li>\n</ul>"
            },
            {
              "clause_number": "(4)",
              "title": "No targeted advertising",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">No targeted advertising</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, and the DPDP Rules, 2025, the prohibition of targeted advertising directed at children is a mandatory additional obligation for Data Fiduciaries. This restriction is designed to protect minors from commercial exploitation and algorithmic manipulation of their preferences and behaviors.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Core Statutory Prohibition</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">A \"child\" is defined as an individual who has not yet completed eighteen years of age. Under <strong>Section 9</strong>(3) of the Act, a Data Fiduciary is expressly forbidden from undertaking two related activities regarding children:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Tracking or behavioural monitoring.</li>\n<li style=\"margin-bottom: 4px;\">Targeted advertising directed at them.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Context within Children's Protections</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The ban on targeted advertising is <strong>part of</strong> a broader set of stringent obligations intended to safeguard minors:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Verifiable Parental Consent:</strong> Fiduciaries must obtain verifiable consent from a parent or lawful guardian before processing any personal data of a child.</li>\n<li style=\"margin-bottom: 4px;\"><strong>No Detrimental Processing:</strong> Fiduciaries are prohibited from any processing likely to cause a detrimental effect on a child's well-being.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Specialized Exemptions</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The framework provides specific instances where these restrictions are relaxed to serve the child's safety or the public interest:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Filtering Harmful Advertisements:</strong> Under the Fourth Schedule (<strong>Part B</strong>), the prohibition on tracking and targeted advertising does not apply when processing is necessary to ensure that advertisements likely to cause a detrimental effect on a child's well-being are not accessible to them. Essentially, fiduciaries can use data to block harmful ads but not to serve targeted ones.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Verifiably Safe Processing:</strong> The Central Government has the power under <strong>Section 9</strong>(5) to exempt specific Data Fiduciaries from the ban on targeted advertising if it is satisfied that the entity processes children's data in a \"verifiably safe manner\". In such cases, the government may notify an age above which the exemption applies.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Enforcement and Heavy Penalties</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Act treats the protection of children as a high-priority obligation with severe financial consequences for non-compliance:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Penalty Amount:</strong> A breach of the additional obligations in relation to children under <strong>Section 9</strong> (including targeted advertising) can result in a monetary penalty of up to two hundred crore rupees.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Board Inquiries:</strong> The Data Protection Board of India has the authority to inquire into such breaches upon receiving a complaint from a Data Principal or a reference from the Government.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to the enforcement notification issued on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, the substantive provisions governing children's data protections are subject to a staggered commencement:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Statutory Mandate:</strong> <strong>Section 9</strong>, which establishes the prohibition, is scheduled to come into force eighteen months after the notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Procedural Rule:</strong> <strong>Rule 12</strong>, which outlines the specific exemptions, follows the same eighteen-month timeline.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, the ban on targeted advertising directed at children will be formally and legally enforceable starting in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            }
          ]
        },
        {
          "section_number": "4.2",
          "title": "Persons with Disabilities",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "Verifiable lawful guardian consent",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Verifiable lawful guardian consent</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, and the DPDP Rules, 2025, the processing of personal data belonging to persons with disabilities is subject to a specialized protective framework centered on obtaining verifiable lawful guardian consent. This requirement ensures that individuals who may be unable to take legally binding decisions are protected through the oversight of a recognized guardian.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Definition of Data Principal and Guardian</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act expands the definition of a Data Principal to ensure representation for those with disabilities. Where an individual is a person with a disability, the term \"Data Principal\" includes her lawful guardian acting on her behalf.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. The Statutory Mandate for Verifiable Consent</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to <strong>Section 9</strong>(1), a Data Fiduciary is legally required to obtain the verifiable consent of the lawful guardian before processing any personal data of a person with a disability who has such a guardian. This is categorized as an \"additional obligation\" for fiduciaries, similar to the protections afforded to children.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. The Verification Process (<strong>Rule 11</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Rules, 2025, establish the due diligence standards that a Data Fiduciary must follow when obtaining this consent.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Due Diligence:</strong> While obtaining consent from someone identifying as a lawful guardian, the fiduciary must verify that the individual was officially appointed under the law applicable to guardianship.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Recognized Appointing Authorities:</strong> The fiduciary must verify the appointment was made by:</li>\n<li style=\"margin-bottom: 4px;\">A court of law.</li>\n<li style=\"margin-bottom: 4px;\">A designated authority (as defined under the Rights of Persons with Disabilities Act, 2016).</li>\n<li style=\"margin-bottom: 4px;\">A local level committee (constituted under the National Trust Act, 1999).</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Scope of \"Person with Disability\"</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Rules provide a specific definition for a \"person with disability\" in the context of requiring a guardian's consent:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Individuals with long-term physical, mental, intellectual, or sensory impairments which, in interaction with various barriers, hinder their full and effective participation in society.</li>\n<li style=\"margin-bottom: 4px;\">The definition specifically includes those who, despite being provided with adequate and appropriate support, are unable to take legally binding decisions.</li>\n<li style=\"margin-bottom: 4px;\">It also encompasses specific conditions such as autism, cerebral palsy, and mental retardation, or combinations of these conditions.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. The Right to Nominate and Incapacity</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">In the broader context of rights, the Act also provides for a Right to Nominate. A Data Principal can nominate another individual to exercise her rights in the event of incapacity, which is defined as the inability to exercise rights due to unsoundness of mind or infirmity of body. This ensures that even if an official guardian is not yet in place, the individual\u2019s data interests can be managed by a trusted nominee.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">6. Enforcement and Penalties</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The framework treats the protection of persons with disabilities with high priority:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Significant Penalties:</strong> A breach of the additional obligations under <strong>Section 9</strong> (which includes the failure to obtain verifiable guardian consent) can result in a monetary penalty of up to two hundred crore rupees.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Implementation Timeline:</strong> According to the notification issued on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, the provisions governing the processing of data for persons with disabilities (<strong>Section 9</strong> and <strong>Rule 11</strong>) are subject to a staggered commencement. These mandates are scheduled to come into force eighteen months after the notification, making them legally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(2)",
              "title": "Due diligence on guardianship status",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Due diligence on guardianship status</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, and the DPDP Rules, 2025, the processing of personal data belonging to persons with disabilities is governed by a strict requirement for verifiable consent from a lawful guardian. To ensure this protection is not bypassed, the framework imposes a specific duty of due diligence on Data Fiduciaries to verify the legal status of any individual claiming to be such a guardian.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. The Core Mandate for Due Diligence</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to <strong>Rule 11</strong>(1) of the DPDP Rules, 2025, a Data Fiduciary must observe due diligence when obtaining verifiable consent from an individual identifying herself as a lawful guardian. This process is not merely a formality; the fiduciary is legally required to verify that the guardian was officially appointed under the law applicable to guardianship.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Recognized Appointing Authorities</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The due diligence process requires fiduciaries to confirm that the guardian's appointment was made by one of three specific legal entities:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>A Court of Law:</strong> Guardianship granted through the formal judicial system.</li>\n<li style=\"margin-bottom: 4px;\"><strong>A Designated Authority:</strong> This refers to authorities designated under <strong>Section 15</strong> of the Rights of Persons with Disabilities Act, 2016, specifically tasked with supporting individuals in exercising their legal capacity.</li>\n<li style=\"margin-bottom: 4px;\"><strong>A Local Level Committee:</strong> Committees constituted under <strong>Section 13</strong> of the National Trust Act, 1999, which manage guardianship for specific conditions such as autism or cerebral palsy.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Defining the Scope of Protection</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The requirement for due diligence is triggered when a person with a disability is unable to take legally binding decisions, even when provided with adequate support. The sources define these individuals as having long-term physical, mental, intellectual, or sensory impairments, including specific conditions like:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Autism.</li>\n<li style=\"margin-bottom: 4px;\">Cerebral palsy.</li>\n<li style=\"margin-bottom: 4px;\">Mental retardation.</li>\n<li style=\"margin-bottom: 4px;\">Severe multiple disabilities.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">In these instances, the lawful guardian is legally recognized as <strong>part of</strong> the \"Data Principal\" and must act on the individual's behalf.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Verifiable Consent and Additional Obligations</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The duty of due diligence is a prerequisite for obtaining verifiable consent under <strong>Section 9</strong>(1) of the Act. This is classified as an \"additional obligation\" for Data Fiduciaries, placing it on par with the high-level protections afforded to children.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Penalties for Failure in Due Diligence</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act treats the failure to properly verify guardianship and obtain valid consent with extreme gravity. Under the Schedule of the Act, a breach in observing these additional obligations in relation to persons with disabilities (<strong>Section 9</strong>) can result in a monetary penalty of up to two hundred crore rupees.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">6. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The specific provisions regarding due diligence on guardianship (<strong>Section 9</strong> and <strong>Rule 11</strong>) are subject to a staggered commencement schedule.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Notification Date:</strong> <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Enforcement Date:</strong> These mandates are scheduled to come into force eighteen months after the notification, meaning fiduciaries must have their due diligence mechanisms operational by <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            }
          ]
        }
      ]
    },
    {
      "chapter_number": "5",
      "title": "Regulatory Framework",
      "section": [
        {
          "section_number": "5.1",
          "title": "Data Protection Board of India",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "Body corporate with perpetual succession",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Body corporate with perpetual succession</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the Data Protection Board of India (DPBI) is established as a legal entity with a specific corporate status to ensure its institutional continuity and legal autonomy.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Legal Status and Corporate Identity</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act explicitly defines the Board's legal nature under <strong>Section 18</strong>(2):</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Body Corporate:</strong> The Board is a body corporate by the name of the Data Protection Board of India.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Perpetual Succession:</strong> It possesses perpetual succession, meaning the Board continues to exist as a single legal entity regardless of changes in its membership (Chairperson or other Members).</li>\n<li style=\"margin-bottom: 4px;\"><strong>Common Seal:</strong> The Board is required to have a common seal, which serves as its official signature for formal documents and legal instruments.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Powers Conferred by Corporate Status</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Being a body corporate with perpetual succession grants the Board specific legal powers that allow it to function independently:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Property Ownership:</strong> The Board has the power to acquire, hold, and dispose of property, both movable and immovable.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Contractual Capacity:</strong> It has the legal authority to enter into contracts in its own name.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Legal Standing:</strong> The Board can sue or be sued in its own name, allowing it to engage in legal proceedings independently of the Central Government.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Establishment and Structural Context</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Official Establishment:</strong> The Central Government formally established the Board through a notification on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Headquarters:</strong> The head office of the Data Protection Board is located in the National Capital Region (NCR) of India.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Composition:</strong> As a body corporate, the Board consists of a Chairperson and a specific number of Members (currently notified as four members) appointed by the Central Government.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Independence:</strong> The Board is mandated to function as an independent body and, as far as practicable, operate as a digital office, meaning its processes are digital by design.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Regulatory Framework</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The provisions of the Act governing the establishment and corporate status of the Board (Sections 18 to 26) came into force on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>. This corporate structure ensures that the Board remains a permanent fixture of the data protection regime in India, capable of exercising its powers\u2014such as conducting inquiries and imposing penalties\u2014as a distinct legal person</div>"
            },
            {
              "clause_number": "(2)",
              "title": "Independent digital office",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Independent digital office</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, a \"digital office\" is defined as an institution that utilizes an online mechanism to conduct its proceedings\u2014ranging from the receipt of an initial complaint or reference to the final disposal of the matter\u2014entirely in a digital mode. This concept is central to the operational identity of the Data Protection Board of India (DPBI), which is mandated to function as an independent body.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Structural and Functional Independence</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Board is established as a body corporate with perpetual succession and a common seal, granting it the legal autonomy to own property, enter contracts, and sue or be sued in its own name. Within this framework, the Act explicitly requires the Board to function as an independent body, ensuring that its adjudicatory and regulatory roles are insulated from undue influence.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. \"Digital by Design\" Mandate</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Board's operations are intended to be \"digital by design,\" particularly regarding the following activities:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Case Management:</strong> The receipt of complaints, their subsequent allocation to Members, and the scheduling of hearings must be conducted through digital means.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Adjudication:</strong> The hearing process and the final pronouncement of decisions are required to be digital, utilizing prescribed techno-legal measures.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Administrative Actions:</strong> The Board is authorized to observe procedures for its meetings and the authentication of its orders and directions through digital means.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Operational Flexibility and Techno-Legal Measures</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Rules, 2025, provide more specific guidance on how this digital office should function. <strong>Rule 20</strong> states that the Board shall adopt techno-legal measures to conduct proceedings in a manner that does not require the physical presence of any individual. Importantly, this digital-first approach does not diminish the Board\u2019s formal legal powers; it retains the same authority as a civil court to summon and enforce attendance or examine individuals on oath, even if those processes occur remotely.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Extension to the Appellate Tribunal</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The requirement for an independent digital office extends to the Appellate Tribunal as well. Aggrieved persons may file appeals in a digital form, and the Tribunal is mandated to function as a digital office, employing similar techno-legal measures to conduct its hearings without requiring physical presence.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">While the Central Government formally established the Data Protection Board of India on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, the full transition to a digital office is subject to a staggered commencement.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Active Provisions:</strong> The sections governing the establishment, composition, and administrative powers of the Board (Sections 18\u201326) came into force on the date of the notification in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 2025</u>.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Future Mandate:</strong> The substantive procedural requirements for the Board to operate as a digital office (<strong>Section 28</strong> and <strong>Rule 20</strong>) are scheduled to come into force eighteen months later, in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(3)",
              "title": "Inquiry and penalty powers",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Inquiry and penalty powers</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the Data Protection Board of India (DPBI) is granted extensive powers to conduct inquiries and impose significant monetary penalties to ensure compliance. These powers are designed to maintain the integrity of the data protection regime while functioning as an independent, \"digital-by-design\" adjudicatory body.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Scope of Inquiry Powers</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Board is empowered to initiate an inquiry under several specific circumstances:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Data Breaches:</strong> Upon receiving an intimation of a personal data breach from a Data Fiduciary.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Complaints:</strong> On a complaint made by a Data Principal regarding a personal data breach, a breach of a fiduciary's obligations, or a violation of an individual's rights.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Government References:</strong> On a reference made by the Central or State Government.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Intermediaries:</strong> On a reference from the Central Government regarding a breach by an intermediary under the Act.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Consent Managers:</strong> In response to a complaint about a Consent Manager\u2019s obligations or a breach of its registration conditions.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Civil Court Powers and Procedure</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">To effectively discharge its functions, the Board is vested with the same powers as a civil court under the Code of Civil Procedure, 1908, in respect of:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Summoning and enforcing the attendance of any person and examining them on oath.</li>\n<li style=\"margin-bottom: 4px;\">Receiving evidence on affidavit and requiring the discovery and production of documents.</li>\n<li style=\"margin-bottom: 4px;\">Inspecting data, books, registers, or accounts.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Board must follow the principles of natural justice and record reasons for its actions. It may also issue interim orders during the course of an inquiry after hearing the concerned parties.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Penalty Powers and Determination</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">If the Board determines, following an inquiry, that a breach of the Act or its Rules is significant, it may impose monetary penalties. In determining the amount, the Board must consider several factors:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">The nature, gravity, and duration of the breach.</li>\n<li style=\"margin-bottom: 4px;\">The type and nature of the personal data affected.</li>\n<li style=\"margin-bottom: 4px;\">Whether the breach is of a repetitive nature.</li>\n<li style=\"margin-bottom: 4px;\">Any gains realized or losses avoided as a result of the breach.</li>\n<li style=\"margin-bottom: 4px;\">Actions taken by the person to mitigate the effects of the breach.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Specific Penalties (The Schedule)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act specifies maximum penalty amounts for different types of violations:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Failure to take reasonable security safeguards to prevent a data breach:</strong> Up to two hundred and fifty crore rupees.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Failure to notify the Board or individuals of a data breach:</strong> Up to two hundred crore rupees.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Breach of obligations in relation to children:</strong> Up to two hundred crore rupees.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Breach of Significant Data Fiduciary (SDF) obligations:</strong> Up to one hundred and fifty crore rupees.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Breach of Data Principal duties:</strong> Up to ten thousand rupees.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Other breaches of the Act or Rules:</strong> May extend to fifty crore rupees.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Additional Remedial Actions</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Beyond penalties, the Board can:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Direct urgent remedial or mitigation measures in the event of a breach.</li>\n<li style=\"margin-bottom: 4px;\">Issue directions to any person, who is then legally bound to comply.</li>\n<li style=\"margin-bottom: 4px;\">Direct parties to attempt resolution through mediation.</li>\n<li style=\"margin-bottom: 4px;\">Accept a voluntary undertaking from a person at any stage of the proceeding, which acts as a bar on further proceedings unless the terms are breached.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">6. Implementation and Timelines</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Board was formally established on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, and its administrative provisions (Sections 18\u201326) are currently in force. However, the substantive powers related to inquiries and penalties are subject to a staggered commencement:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Inquiry/Penalty Provisions:</strong> Most sections governing the Board's inquiry and penalty powers (Sections 27, 28, and 33) are scheduled to come into force eighteen months after the initial notification, in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Timeline for Completion:</strong> Once these powers are active, the Board must complete an inquiry within six months of receiving a complaint or intimation, with a possible one-time extension of three months</li>\n</ul>"
            },
            {
              "clause_number": "(4)",
              "title": "Directional and remedial powers",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Directional and remedial powers</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the Data Protection Board of India (DPBI) is vested with extensive directional and remedial powers. These powers allow the Board to intervene actively to prevent harm, mitigate the effects of data breaches, and ensure that Data Fiduciaries and Consent Managers adhere to their statutory obligations.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Urgent Remedial and Mitigation Measures</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Board has the specific authority to act swiftly in the event of a security failure.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Breach Response:</strong> Upon receiving an intimation of a personal data breach, the Board can direct a Data Fiduciary to undertake urgent remedial or mitigation measures.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Inquiry and Penalty:</strong> These directions often serve as the immediate response while the Board simultaneously conducts a deeper inquiry to determine if a penalty is warranted.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. General Power to Issue Directions</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Beyond breach response, the Board possesses a broad mandate to issue directions to any person to ensure the effective discharge of its functions.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Binding Nature:</strong> Any person to whom a direction is issued is legally bound to comply.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Procedural Safeguards:</strong> Before issuing such directions, the Board must provide the concerned person with an opportunity of being heard and must record its reasons in writing.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Flexibility:</strong> The Board may modify, suspend, withdraw, or cancel its own directions based on a representation from an affected person or a reference from the Central Government.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Interim Orders and Voluntary Undertakings</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act provides the Board with flexible tools to manage ongoing inquiries and encourage self-correction:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Interim Orders:</strong> If necessary during the course of an inquiry, the Board may issue interim orders after recording reasons and hearing the affected party.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Voluntary Undertakings:</strong> The Board may accept a voluntary undertaking from a person at any stage of a proceeding. This undertaking may include a commitment to take specific actions, refrain from others, or publicize the undertaking. Acceptance of such an undertaking typically acts as a bar on further proceedings regarding its contents, unless the terms are breached.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Remedial Powers Regarding Consent Managers</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Rules, 2025, grant the Board specialized remedial powers over Consent Managers:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Compliance Measures:</strong> If a Consent Manager is not adhering to its obligations, the Board can direct it to take specific measures to ensure adherence.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Registration Actions:</strong> In the interest of Data Principals, the Board may suspend or cancel the registration of a Consent Manager.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Protective Directions:</strong> The Board can issue any directions it deems fit to a Consent Manager specifically to protect the interests of Data Principals.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Alternate Dispute Resolution (Mediation)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">As a remedial alternative to formal inquiries, if the Board believes a complaint can be resolved through mediation, it may direct the parties to attempt resolution through a mutually agreed-upon mediator.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">6. Referral for Blocking Orders</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">In extreme cases of recidivism, the Board's remedial power extends to advising the Central Government.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Blocking Access:</strong> If a Data Fiduciary has had monetary penalties imposed on it in two or more instances, the Board may advise the Government to block public access to the fiduciary's computer resources (such as an app or website) in the interest of the general public.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">7. Enforcement Context and Timelines</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">These directional and remedial powers are exercised by the Board in its capacity as an independent body corporate with the powers of a civil court. While the Board was established in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 2025</u>, the substantive sections granting these powers (Sections 27, 28, and 31\u201333) and their corresponding rules are scheduled to come into force eighteen months after the initial notification, becoming fully operational in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></div>"
            }
          ]
        },
        {
          "section_number": "5.2",
          "title": "Consent Manager",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "Registered with the Board",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Registered with the Board</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, a Consent Manager is defined specifically as a person registered with the Board. This registration is a mandatory prerequisite for any entity wishing to act as a single point of contact for Data Principals to give, manage, review, and withdraw their consent through transparent and interoperable platforms.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Core Requirement for Registration</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act stipulates that every Consent Manager must be registered with the Data Protection Board of India. This registration is subject to various technical, operational, financial, and other conditions prescribed by the government to ensure these entities are fit to handle sensitive consent-related functions.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Conditions for Registration (First Schedule, <strong>Part A</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">To qualify for registration, an applicant must meet several stringent criteria:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Legal Structure:</strong> The applicant must be a company incorporated in India.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Financial Capacity:</strong> The entity must have a net worth of at least two crore rupees and possess a sound financial condition.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Operational Integrity:</strong> The directors and key managerial personnel must have a reputation for fairness and integrity.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Constitutional Documents:</strong> The company\u2019s Memorandum and Articles of Association must include provisions to avoid conflicts of interest with Data Fiduciaries, and these provisions can only be amended with the Board's previous approval.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Technical Certification:</strong> The applicant's interoperable platform must be independently certified to be consistent with data protection standards and assurance frameworks published by the Board.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. The Registration Process (<strong>Rule 4</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Rules, 2025, outline the procedural steps for registration:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Application:</strong> A person meeting the conditions must apply to the Board with required particulars and documents.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Inquiry by the Board:</strong> Upon receiving an application, the Board may conduct an inquiry to satisfy itself that all conditions are met.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Decision:</strong> If satisfied, the Board will register the applicant as a Consent Manager and publish their particulars on its website. If not satisfied, the application is rejected with stated reasons.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Continuing Oversight and Board Powers</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Registration brings the Consent Manager under the Board's direct regulatory control:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Monitoring and Directions:</strong> If the Board finds a Consent Manager is not adhering to its obligations, it can direct the entity to take corrective measures.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Suspension or Cancellation:</strong> If necessary in the interest of Data Principals, the Board has the power to suspend or cancel the registration of a Consent Manager after giving them an opportunity to be heard.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Restrictions on Transfer:</strong> The control of a registered Consent Manager company (via sale, merger, etc.) cannot be transferred without the previous approval of the Board.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Inquiry into Breaches:</strong> The Board is specifically empowered to inquire into breaches of any condition of registration and may impose penalties for such violations.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The requirement for Consent Managers to be registered with the Board is subject to a specific commencement timeline:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Notification Date:</strong> The initial notification was published on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Enforcement Date:</strong> The provisions regarding the registration of Consent Managers (<strong>Section 6</strong>(9) and <strong>Rule 4</strong>) are scheduled to come into force one year after the notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, the formal registration mechanism and the Board\u2019s power to inquire into registration breaches will be active starting <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2026</u></li>\n</ul>"
            },
            {
              "clause_number": "(2)",
              "title": "Fiduciary capacity to Data Principal",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Fiduciary capacity to Data Principal</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, and the DPDP Rules, 2025, a Consent Manager is legally required to act in a fiduciary capacity in relation to the Data Principal,. This designation places a high standard of trust and legal obligation on the Consent Manager, ensuring they prioritize the interests of the individual over those of Data Fiduciaries.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Statutory Mandate of Accountability</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act establishes the foundation for this relationship by stating that a Consent Manager must be accountable to the Data Principal and shall act on her behalf. This means that while a Consent Manager provides a technical platform for managing consent, its primary legal loyalty is to the individual, not the entities seeking to process the data,.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Defining the Fiduciary Capacity</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Rules, 2025, explicitly state that \"the Consent Manager shall act in a fiduciary capacity in relation to the Data Principal\",. In this context, the fiduciary duty includes:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Conflict of Interest Prevention:</strong> The Consent Manager must strictly avoid conflicts of interest with Data Fiduciaries, including their promoters and key managerial personnel,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Structural Independence:</strong> They must implement measures to ensure that their directors, senior management, and key personnel do not have directorships, financial interests, employment, or beneficial ownership in any Data Fiduciary that could influence their actions,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Transparency:</strong> They must publish information about their own promoters and any person holding more than two percent of their shares to maintain transparency,.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Obligations in Service of the Data Principal</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">To fulfill its fiduciary role, the Consent Manager must provide tools and maintain records that empower the Data Principal:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Record-Keeping:</strong> They must maintain a platform record of all consents given, denied, or withdrawn, as well as the notices that preceded those requests,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Accessibility:</strong> Upon request, they must provide the Data Principal with access to these records in a machine-readable form,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Integrity of Consent:</strong> They must ensure that the manner in which data is shared prevents the Consent Manager itself from being able to read the contents of the personal data,.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Board Oversight of the Fiduciary Relationship</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Data Protection Board of India acts as the regulator of this fiduciary relationship through the registration process:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Registration Review:</strong> Before registering a Consent Manager, the Board must satisfy itself that the entity has the \"financial condition and the general character of management\" to fulfill these obligations,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Remedial Action:</strong> If a Consent Manager fails to adhere to its fiduciary duties or registration conditions, the Board has the power to issue directions, suspend registration, or cancel it entirely in the interest of Data Principals,.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The provisions defining the accountability and fiduciary duties of Consent Managers (<strong>Section 6</strong>(8) and <strong>Rule 4</strong>) are scheduled to come into force eighteen months after the initial notification, becoming formally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></div>"
            },
            {
              "clause_number": "(3)",
              "title": "Interoperable platform for consent lifecycle",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Interoperable platform for consent lifecycle</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, and its accompanying 2025 Rules, the interoperable platform is the mandatory technical core of a Consent Manager's operations. It serves as the functional interface through which a Data Principal manages their entire consent lifecycle in a standardized and secure manner,.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Definition and Core Function</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">A Consent Manager is defined as a person registered with the Data Protection Board who acts as a single point of contact for the Data Principal. The Act mandates that this contact occurs through an accessible, transparent, and interoperable platform designed to enable four key actions:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Giving consent for data processing,.</li>\n<li style=\"margin-bottom: 4px;\">Managing existing consents.</li>\n<li style=\"margin-bottom: 4px;\">Reviewing the status of consents and data sharing,.</li>\n<li style=\"margin-bottom: 4px;\">Withdrawing consent with the same ease it was given,.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Standards and Certification</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">To ensure the platform is truly \"interoperable\" across different Data Fiduciaries and services, the DPDP Rules, 2025, set strict registration conditions:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Independent Certification:</strong> Before registration, the platform must be independently certified as consistent with data protection standards and the assurance framework published by the Board,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Technical Capacity:</strong> The applicant must demonstrate sufficient technical and operational capacity to maintain such a platform,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Primary Access:</strong> The Consent Manager must develop and maintain a website, app, or both as the primary means for the Data Principal to access these services,.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Managing the Consent Lifecycle</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The platform is responsible for facilitating the flow of consent between the individual and various entities:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Direct or Routed Consent:</strong> The platform must enable the Data Principal to give consent to an \"onboarded\" Data Fiduciary either directly or through another onboarded fiduciary who already maintains that individual's data (such as a bank or digital locker),.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Comprehensive Record-Keeping:</strong> The platform must maintain a detailed record of the lifecycle, including:</li>\n<li style=\"margin-bottom: 4px;\">Consents given, denied, or withdrawn,.</li>\n<li style=\"margin-bottom: 4px;\">The specific notices that preceded or accompanied each consent request,.</li>\n<li style=\"margin-bottom: 4px;\">The actual sharing of personal data with \"transferee\" Data Fiduciaries,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Machine-Readable Access:</strong> Upon request, the platform must provide the Data Principal with their consent records in a machine-readable form,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Retention:</strong> These lifecycle records must be maintained on the platform for at least seven years, unless a longer period is agreed upon or required by law,.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Technical Safeguards and \"Data Blindness\"</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">A critical obligation of the Consent Manager is to ensure the platform operates as a secure conduit without accessing the underlying data:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Inability to Read Contents:</strong> The platform must be designed so that the manner of sharing personal data ensures the contents of the data are not readable by the Consent Manager itself,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Security Measures:</strong> The Consent Manager is required to take reasonable security safeguards to prevent any personal data breach within this platform,.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Enforcement and Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The rollout of these platform requirements follows a staggered schedule:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Registration Provisions:</strong> The sections and rules governing the registration of Consent Managers (including the certification of their platforms) are scheduled to come into force one year after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, notification, meaning <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2026</u>,,.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Substantive Obligations:</strong> The specific obligations of Consent Managers regarding the management of the consent lifecycle on the platform are scheduled to come into force eighteen months after the notification, in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(4)",
              "title": "Maintain records of consent",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Maintain records of consent</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, and the DPDP Rules, 2025, a Consent Manager serves as a specialized, registered entity that acts as a single point of contact for a Data Principal to give, manage, review, and withdraw consent. A core pillar of this role is the mandatory requirement to maintain comprehensive records of the consent lifecycle to ensure transparency and accountability to the individual.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Scope of Record-Keeping (First Schedule, <strong>Part B</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">A Consent Manager is legally obligated to maintain a detailed record on its platform regarding the following activities:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Consent Status:</strong> Every instance of consent being given, denied, or withdrawn by the Data Principal.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Associated Notices:</strong> The specific notices that either preceded or accompanied the requests for consent, ensuring there is a record of what information the individual was provided with before making a decision.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Data Sharing Events:</strong> A record of the actual sharing of personal data with any \"transferee\" Data Fiduciary, providing a trail of where the individual's data has been sent.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Accessibility and Data Portability</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">To empower the Data Principal, the records maintained by the Consent Manager must be highly accessible:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Direct Access:</strong> The platform must provide the Data Principal with direct access to these records at any time.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Machine-Readable Form:</strong> Upon request, and in accordance with the terms of service, the Consent Manager must provide the information contained in these records in a machine-readable form. This ensures the individual can easily review or transfer their consent history.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Retention Period</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act and Rules establish a long-term retention standard for these records:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Seven-Year Minimum:</strong> Consent Managers must maintain these lifecycle records for a minimum period of seven years.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Extensions:</strong> This period can be longer if the Data Principal and Consent Manager mutually agree to an extension or if such retention is required by another law for the time being in force.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Technical Integrity and \"Data Blindness\"</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">While the Consent Manager is required to keep records of the consent transactions, the framework includes a critical safeguard to protect the privacy of the underlying data:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Non-Readable Contents:</strong> The Consent Manager must ensure that the technical manner of making personal data available or sharing it is designed so that the contents of the personal data are not readable by the Consent Manager itself. Essentially, they manage the \"permission\" to share data without having access to the \"substance\" of the data being shared.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Context of Fiduciary Duty</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The duty to maintain these records is a key component of the Consent Manager's fiduciary capacity. Because they are accountable to the Data Principal and act on her behalf, these records serve as the primary evidence that the individual's choices regarding their personal data are being respected and correctly implemented across various Data Fiduciaries.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">6. Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The substantive obligations for Consent Managers to maintain these records (<strong>Rule 4</strong> and the First Schedule) are subject to a staggered commencement:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Registration Start:</strong> The provisions allowing for the registration of Consent Managers come into force in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2026</u>.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Full Enforcement:</strong> The broader obligations, including the 7-year record-keeping mandate, are scheduled to come into force eighteen months after the initial notification, making them legally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            }
          ]
        },
        {
          "section_number": "5.3",
          "title": "Appellate Tribunal",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "Appeal within sixty days",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Appeal within sixty days</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the requirement to file an appeal within sixty days is a critical procedural timeline for those seeking to challenge a decision made by the Data Protection Board of India. This mandate is <strong>part of</strong> the broader regulatory framework governing the Appellate Tribunal, which is designated as the Telecom Disputes Settlement and Appellate Tribunal (TDSAT).</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. The Sixty-Day Filing Mandate</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act specifies a strict window for legal recourse following a Board decision:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Statutory Window:</strong> Every appeal against an order or direction made by the Board must be filed within a period of sixty days.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Trigger Event:</strong> This sixty-day period begins from the date of receipt of the order or direction being appealed against.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Exceptions for Delay:</strong> The Appellate Tribunal has the legal authority to entertain an appeal after the expiry of this sixty-day window if it is satisfied that the appellant had sufficient cause for the delay.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Digital Filing and Fee Requirements</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">In line with the Act\u2019s \"digital by design\" philosophy, the process of filing within this sixty-day window must follow specific digital protocols:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Digital Form:</strong> Appeals must be filed in a digital form as determined by the Appellate Tribunal.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Digital Payment:</strong> The appeal must be accompanied by a fee, which must be paid digitally using the Unified Payments Interface (UPI) or another authorized payment system.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Fee Amount:</strong> The fee is generally the same amount applicable to appeals under the Telecom Regulatory Authority of India Act, 1997, though the Chairperson of the Tribunal has the discretion to reduce or waive it.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Context within the Appellate Tribunal\u2019s Function</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The sixty-day filing rule is the first step in a process designed for speed and technical efficiency:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Expedited Disposal:</strong> Once an appeal is presented, the Tribunal is required to deal with it as expeditiously as possible, with an endeavor to reach a final disposal within six months.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Digital Office:</strong> The Tribunal operates as a digital office, meaning that from the receipt of the appeal within the sixty-day window to the final decision, proceedings may be conducted through techno-legal measures that do not require physical presence.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Binding Outcomes:</strong> Orders passed following the appeal are executable as a decree of a civil court.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Enforcement and Implementation</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">While the Data Protection Board was established in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 2025</u>, the legal provisions governing the right to appeal and the sixty-day timeline are subject to a staggered commencement.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> According to the enforcement notification, <strong>Section 29</strong> (Appeal to Appellate Tribunal) and <strong>Rule 22</strong> (Appellate Procedure) are scheduled to come into force eighteen months after the initial <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Practical Impact:</strong> This means the sixty-day window for appeals and the Tribunal\u2019s jurisdiction over DPDP matters will be formally and legally active starting in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(2)",
              "title": "TDSAT as designated tribunal",
