              "content": "<strong style=\"display:block; margin-bottom:6px;\">Appoint independent data auditor</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, and the DPDP Rules, 2025, the appointment of an independent data auditor is a specialized \"additional obligation\" reserved exclusively for Significant Data Fiduciaries (SDFs). This requirement is <strong>part of</strong> a more rigorous compliance framework designed for entities whose data processing poses higher risks to individuals or national interests.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Mandatory Appointment and Role</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Every SDF is legally required to appoint an independent data auditor to carry out a data audit. The primary role of this auditor is to evaluate the compliance of the SDF with the provisions of the Act and the accompanying Rules. Unlike the general \"periodic audit\" also required of SDFs, this specific audit must be conducted by an external, independent party to ensure an objective assessment of the entity's data protection practices.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Audit Frequency and Reporting</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The regulatory framework establishes strict timelines and transparency requirements for these audits:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Annual Requirement:</strong> An SDF must undertake a data audit at least once in every twelve-month period starting from the date it is notified as an SDF.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Reporting to the Board:</strong> The SDF is responsible for ensuring that the person conducting the audit (the independent auditor) furnishes a report to the Data Protection Board of India.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Content of the Report:</strong> The report submitted to the Board must contain \"significant observations\" identified during the Data Protection Impact Assessment and the audit process.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Strategic Context: Oversight of SDFs</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The independent auditor works alongside other SDF-specific mandates to provide a comprehensive oversight structure:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>DPO Coordination:</strong> The auditor\u2019s findings are <strong>part of</strong> the broader compliance regime overseen by the India-based Data Protection Officer (DPO), who is accountable to the SDF's Board of Directors.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Risk Management:</strong> The audit serves as a check on the SDF's technical measures, such as algorithmic software, to ensure they do not pose a risk to the rights of Data Principals.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Penalties for Non-Compliance</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The framework treats the failure to fulfill SDF-specific obligations with significant gravity. Under the Schedule of the Act, a breach in observing the additional obligations of an SDF\u2014which includes the failure to appoint an independent auditor or conduct the required audits\u2014can result in a monetary penalty of up to one hundred and fifty crore rupees.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">While the administrative provisions for the Data Protection Board are currently active, the substantive requirements for SDFs, including <strong>Section 10</strong> of the Act and <strong>Rule 13</strong> of the DPDP Rules, are subject to a staggered commencement. These mandates are scheduled to come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, notification, meaning SDFs must be prepared to appoint auditors and commence these processes by <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></div>"
            },
            {
              "clause_number": "(3)",
              "title": "Periodic Data Protection Impact Assessment",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Periodic Data Protection Impact Assessment</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, and the DPDP Rules, 2025, a periodic Data Protection Impact Assessment (DPIA) is a mandatory additional obligation reserved for Significant Data Fiduciaries (SDFs). This process is designed to ensure that entities processing high volumes of sensitive data or posing greater risks to individuals maintain higher standards of accountability.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Mandate and Definition of a DPIA</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to <strong>Section 10</strong>(2)(c)(i) of the Act, a Data Protection Impact Assessment is defined as a formal process that must include:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">A detailed description of the rights of Data Principals and the specific purpose of processing their personal data.</li>\n<li style=\"margin-bottom: 4px;\">An assessment and management of the risks to the rights of the Data Principals.</li>\n<li style=\"margin-bottom: 4px;\">Any other matters regarding the process as may be prescribed by the Central Government.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Frequency and Reporting Requirements</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Rules, 2025, provide specific operational details for these assessments:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Annual Frequency:</strong> An SDF must undertake a DPIA at least once in every twelve-month period, starting from the date it is notified as an SDF or included in an SDF class.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Reporting to the Board:</strong> The SDF is legally required to cause the person carrying out the DPIA (and the mandatory audit) to furnish a report to the Data Protection Board of India.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Significant Observations:</strong> This report must contain any significant observations identified during the impact assessment and audit process.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Technical Oversight and Risk Management</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPIA is integrated into a broader requirement for technical due diligence. Under <strong>Rule 13</strong>(3), an SDF must verify that its technical measures\u2014including algorithmic software used for hosting, displaying, or sharing personal data\u2014do not pose a risk to the rights of Data Principals. This technical evaluation often informs the broader risk management findings of the periodic DPIA.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Context within SDF Obligations</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPIA does not exist in isolation; it is one of several specialized obligations for SDFs, which also include:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Appointing an India-based Data Protection Officer (DPO) who is accountable to the Board of Directors.</li>\n<li style=\"margin-bottom: 4px;\">Appointing an independent data auditor to evaluate overall compliance.</li>\n<li style=\"margin-bottom: 4px;\">Undertaking periodic audits in addition to the impact assessments.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Enforcement and Implementation</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Penalties:</strong> Failure to observe the additional obligations of an SDF, including the requirement for periodic DPIAs, is treated as a significant breach. Under the Act\u2019s Schedule, such a violation can result in a monetary penalty of up to one hundred and fifty crore rupees.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Timeline:</strong> The substantive sections governing SDF obligations (<strong>Section 10</strong>) and the procedural rules for DPIAs (<strong>Rule 13</strong>) are subject to a staggered commencement. According to the notification issued on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, these provisions are scheduled to come into force eighteen months later, making them formally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(4)",
              "title": "Periodic audits",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Periodic audits</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, and the DPDP Rules, 2025, a periodic audit is a specialized \"additional obligation\" mandatory for Significant Data Fiduciaries (SDFs). This requirement ensures that entities handling high-risk or high-volume data are subject to regular, high-level scrutiny to confirm they are meeting their legal and security responsibilities.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Mandatory Requirement and Auditor Independence</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act distinguishes between general organizational oversight and the rigorous standards required for an SDF:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Independent Auditor:</strong> Every SDF must appoint an independent data auditor to carry out the data audit. The auditor\u2019s role is to evaluate the entity's compliance with the Act\u2019s provisions and associated rules.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Statutory Basis:</strong> The requirement for a periodic audit is explicitly codified under <strong>Section 10</strong>(2)(c)(ii) of the Act.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Frequency and Reporting Mandates</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Rules, 2025, provide the operational timeframe and reporting structure for these audits:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Annual Cycle:</strong> An SDF must undertake an audit at least once in every twelve-month period starting from the date it is notified as an SDF.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Reporting to the Board:</strong> The SDF is responsible for causing the auditor to furnish a report to the Data Protection Board of India.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Content of the Report:</strong> This report must contain \"significant observations\" identified during the audit and the accompanying Data Protection Impact Assessment (DPIA).</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Role within the SDF Compliance Ecosystem</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Periodic audits are not isolated events but <strong>part of</strong> a broader, tiered accountability structure for SDFs:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Coordination with DPO:</strong> The results of the audit are typically overseen by the India-based Data Protection Officer (DPO), who is responsible to the SDF's Board of Directors.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Linkage with DPIA:</strong> The audit often occurs alongside the periodic Data Protection Impact Assessment, providing a holistic view of the risks to Data Principals and the effectiveness of the fiduciary\u2019s management strategies.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Technical Verification:</strong> The audit helps verify that technical measures, such as algorithmic software used for data processing, do not pose a risk to the rights of individuals.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Enforcement and Heavy Penalties</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The framework treats the failure to conduct these audits with extreme gravity. Under the Schedule of the Act, a breach in observing the additional obligations of an SDF\u2014which specifically includes the mandate for periodic audits\u2014can result in a monetary penalty of up to one hundred and fifty crore rupees.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to the notification dated <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, the enforcement of these periodic audit requirements is subject to a staggered timeline:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Commencement:</strong> The substantive provisions regarding SDF obligations (<strong>Section 10</strong>) and the corresponding procedural requirements (<strong>Rule 13</strong>) are scheduled to come into force eighteen months after the initial notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, SDFs must have their auditing processes established and their first annual reports submitted by <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>.</li>\n</ul>"
            }
          ]
        }
      ]
    },
    {
      "chapter_number": "3",
      "title": "Rights and Duties of Data Principals",
      "section": [
        {
          "section_number": "3.1",
          "title": "Rights",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "Right to access information",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Right to access information</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the Right to access information about personal data is a fundamental entitlement of the Data Principal, situated within the broader framework of individual rights in Chapter III. This right ensures transparency by allowing individuals to understand exactly how their data is being handled and with whom it is being shared.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Scope of the Right to Access (<strong>Section 11</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">A Data Principal who has previously given consent (including voluntary data provided for specified purposes) has the right to obtain the following from a Data Fiduciary upon request:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Summary of Processing:</strong> A summary of the personal data currently being processed and a description of the specific processing activities undertaken with that data.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Third-Party Disclosures:</strong> The identities of all other Data Fiduciaries and Data Processors with whom their personal data has been shared, alongside a description of the specific data shared with them.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Prescribed Information:</strong> Any other information related to their personal data and its processing as may be prescribed by the government.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Mechanisms for Exercising the Right</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The framework establishes clear procedural requirements for both the individual and the entity to ensure this right is actionable:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Publication of Means:</strong> Data Fiduciaries and Consent Managers are required to prominently publish on their website or app the specific means (such as a link or portal) through which a Data Principal can make a request to exercise their rights.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Identity Verification:</strong> To fulfill a request, a Data Fiduciary may require the Data Principal to provide certain particulars, such as a username or other identifier (e.g., email, mobile number, or enrollment ID), to verify their identity under the terms of service.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Notice Requirement:</strong> The Data Fiduciary is obligated to inform the Data Principal of the manner in which they may exercise this right through the mandatory notice provided at the time of the consent request.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Specific Limitations and Exceptions</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The right to access information is not absolute and contains a specific carve-out for legal and security purposes. The requirement to disclose the identities of other fiduciaries or processors does not apply if the data was shared with an entity authorized by law for:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">The prevention, detection, or investigation of offenses.</li>\n<li style=\"margin-bottom: 4px;\">The prevention of cyber incidents.</li>\n<li style=\"margin-bottom: 4px;\">The prosecution or punishment of offenses. In these cases, the sharing must be pursuant to a written request from the authorized fiduciary.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Context within the Broader \"Rights\" Framework</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The right to access is the first of several rights designed to provide end-to-end control for the individual:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Informed Correction and Erasure:</strong> Accessing a summary of data is often the prerequisite for a Data Principal to exercise their subsequent Right to correction, completion, and erasure.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Consent Management:</strong> Data Principals can use a Consent Manager to manage, review, and access records of their consents and the history of data sharing in a machine-readable form.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Grievance Redressal:</strong> If a Data Principal is unsatisfied with the information provided or the fiduciary's failure to provide it, they have the right to use the fiduciary's grievance redressal mechanism before escalating the matter to the Board.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Right to Nominate:</strong> An individual may nominate another person to exercise these access rights on their behalf in the event of death or incapacity.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to the notification dated <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, the substantive provisions regarding the right to access information (<strong>Section 11</strong>) and the associated procedural rules (<strong>Rule 14</strong>) are subject to a staggered commencement. These rights are scheduled to come into force eighteen months after the notification's publication, making them formally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>.</div>"
            },
            {
              "clause_number": "(2)",
              "title": "Right to correction and updating",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Right to correction and updating</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the Right to correction, completion, and updating is a key entitlement that empowers a Data Principal to ensure the integrity of her personal data held by a Data Fiduciary. This right is situated within Chapter III, which balances these individual rights with specific statutory duties.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Scope of the Right (<strong>Section 12</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">A Data Principal has the right to request the correction, completion, and updating of her personal data for which she has previously given consent. This also includes data voluntarily provided for specified purposes under <strong>Section 7</strong>(a). The exercise of this right must align with any existing requirements or procedures established by other laws currently in force in India.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Obligations of the Data Fiduciary</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Upon receiving a valid request from a Data Principal, the Data Fiduciary is legally mandated to perform the following actions:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Correct any personal data that is inaccurate or misleading.</li>\n<li style=\"margin-bottom: 4px;\">Complete any personal data that is incomplete.</li>\n<li style=\"margin-bottom: 4px;\">Update the personal data to ensure it remains current.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">These duties are <strong>part of</strong> the broader general obligation of a Data Fiduciary to ensure the completeness, accuracy, and consistency of data, especially when that data is used to make a decision affecting the individual or is disclosed to another fiduciary.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Procedural Requirements (<strong>Rule 14</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">To make this right actionable, the DPDP Rules, 2025, establish specific procedural mandates:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Publication of Means:</strong> Data Fiduciaries (and Consent Managers) must prominently publish on their website or app the specific means, such as a dedicated communication link, through which an individual can submit a correction request.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Identity Verification:</strong> To prevent unauthorized changes, a fiduciary may require the individual to provide a username or other identifier (e.g., email address, mobile number, or enrollment ID) to verify their identity under the terms of service.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Notice:</strong> The mandatory notice provided at the time of collection must inform the Data Principal of the manner in which they may exercise their right to correction.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Reciprocal Duties of the Data Principal</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act imposes a significant statutory duty on the individual to ensure the system is not misused. Under <strong>Section 15</strong>(e), a Data Principal is required to furnish only such information as is verifiably authentic when exercising their right to correction or updating.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Prohibition of Impersonation:</strong> Individuals must not impersonate another person while providing data.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Penalties for Breach:</strong> A breach of these duties can lead to a monetary penalty of up to ten thousand rupees.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Exemptions for State Functions</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The right to correction is subject to specific exemptions regarding the State. Under <strong>Section 17</strong>(4), when the State or its instrumentalities process personal data for a purpose that does not include making a decision that affects the individual (such as general archiving or research), the mandatory correction and updating requirements under <strong>Section 12</strong>(2) do not apply.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">6. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to the notification issued on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, the substantive provisions governing the right to correction (<strong>Section 12</strong>) and the associated procedural mandates (<strong>Rule 14</strong>) are subject to a staggered commencement. These requirements are scheduled to come into force eighteen months after the notification's publication, making them formally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></div>"
            },
            {
              "clause_number": "(3)",
              "title": "Right to erasure",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Right to erasure</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, and the DPDP Rules, 2025, the Right to Erasure is a vital entitlement that allows a Data Principal to demand the deletion of their personal data. This right is <strong>part of</strong> the broader framework of \"Rights and Duties of Data Principal\" in Chapter III, and it works in tandem with the general obligations of Data Fiduciaries to ensure that personal data is not retained longer than necessary.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. The Statutory Right to Request Erasure</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to <strong>Section 12</strong>(3), a Data Principal has the right to make a request to a Data Fiduciary for the erasure of her personal data.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Scope:</strong> This right applies to personal data for which the individual has previously given consent.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Mandatory Action:</strong> Upon receiving such a request, the Data Fiduciary is legally obligated to erase the data unless its retention is strictly necessary for the specified purpose or for compliance with any law currently in force.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Right to Erasure vs. General Obligation to Erase</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">While the \"Right to Erasure\" (<strong>Section 12</strong>) is triggered by a request from the individual, it is closely linked to the General Obligation (<strong>Section 8</strong>) of the fiduciary to erase data automatically:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Automatic Trigger:</strong> A Data Fiduciary must erase personal data as soon as it is reasonable to assume the specified purpose is no longer being served or if the individual withdraws their consent.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Data Processors:</strong> In both cases\u2014whether triggered by a request or an automatic obligation\u2014the Data Fiduciary must ensure that its Data Processors also erase the personal data.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Procedural Mandates and Timelines</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Rules, 2025, provide specific operational details to make this right effective:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Means of Request:</strong> Fiduciaries must prominently publish on their website or app the means (such as a communication link) through which an individual can submit an erasure request.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Identity Verification:</strong> A fiduciary may require the individual to provide a username or other identifier to verify their identity before acting on an erasure request.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Deemed Completion for Specific Entities:</strong> For large e-commerce, social media, and gaming entities, the purpose is deemed completed\u2014and erasure mandated\u2014if the individual has not initiated contact for three years.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Pre-Erasure Notice:</strong> Fiduciaries must notify the individual forty-eight hours before the scheduled erasure to allow them to maintain their account if they choose.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Duties and Restrictions on the Data Principal</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act balances this right with a statutory duty imposed on the Data Principal to prevent misuse:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Verifiable Authenticity:</strong> Under <strong>Section 15</strong>(e), when exercising the right to erasure, the individual is duty-bound to furnish only such information as is verifiably authentic.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Penalties:</strong> Providing false information while requesting erasure can lead to a monetary penalty of up to ten thousand rupees.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Legal Exceptions and State Exemptions</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Right to Erasure is not absolute and is subject to critical legal carve-outs:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Compliance with Law:</strong> If another Indian law requires data to be retained (e.g., banking laws requiring records for ten years), that law overrides the erasure request.</li>\n<li style=\"margin-bottom: 4px;\"><strong>State Functions:</strong> Under <strong>Section 17</strong>(4), the mandatory erasure requirements (both the general obligation and the individual's right to request) do not apply to the State or its instrumentalities when processing data for specific public functions.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">6. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to the enforcement notification from <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 2025</u>, the substantive provisions for the right to erasure (<strong>Section 12</strong>) and the related procedural requirements (Rules 8 and 14) are subject to a staggered commencement. These mandates are scheduled to come into force eighteen months after the notification's publication, making them formally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>.</div>"
            },
            {
              "clause_number": "(4)",
              "title": "Right of grievance redressal",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Right of grievance redressal</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the Right of grievance redressal is a cornerstone of the legal framework designed to empower individuals. Situated within Chapter III (Rights and Duties of Data Principal), this right ensures that Data Principals have a formal, time-bound, and accessible path to resolve disputes directly with the entities processing their data.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Scope and Definition (<strong>Section 13</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act establishes that every Data Principal has the right to \"readily available means\" of grievance redressal.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Target Entities:</strong> This right can be exercised against either a Data Fiduciary or a Consent Manager.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Subject Matter:</strong> A grievance can be raised regarding any act or omission by these entities concerning their statutory obligations or the exercise of the individual's rights under the Act.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Procedural Requirements for Entities</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Rules, 2025, provide specific operational mandates to ensure this right is not just theoretical:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Prominent Publication:</strong> Data Fiduciaries and Consent Managers must prominently publish details of their grievance redressal system on their website, app, or both.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Fixed Response Period:</strong> Entities are legally required to respond to any grievance within an effective period not exceeding ninety days from the date of receipt.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effectiveness:</strong> Fiduciaries must implement appropriate technical and organisational measures to ensure their system can effectively respond within this 90-day window.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. The Principle of \"Exhaustion of Remedies\"</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">A unique feature of the DPDP Act is the procedural requirement for dispute escalation. Under <strong>Section 13</strong>(3), a Data Principal is legally mandated to exhaust the opportunity of redressing her grievance through the fiduciary\u2019s internal mechanism before approaching the Data Protection Board. This ensures that the Board acts as a secondary body for unresolved or significant disputes rather than a first-instance clearinghouse for all complaints.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Connection to Data Principal Duties</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">To maintain the integrity of the redressal system, the Act balances the right to complain with a statutory duty.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Prohibition of Misuse:</strong> Under <strong>Section 15</strong>(d), a Data Principal is duty-bound not to register a false or frivolous grievance or complaint with a Data Fiduciary or the Board.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Verifiable Identity:</strong> To process a grievance, a fiduciary may require the individual to provide a username or other identifier (such as an email address or mobile number) to verify their identity under the terms of service.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Grievance Redressal for Significant Data Fiduciaries (SDFs)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">For entities classified as Significant Data Fiduciaries, the grievance process is more formalised. The Act requires an SDF to appoint an India-based Data Protection Officer (DPO), who is specifically designated as the point of contact for the grievance redressal mechanism. This ensures that high-risk entities have a senior, locally-based official accountable to their Board of Directors for resolving individual complaints.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">6. Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The implementation of this right is subject to the Act's staggered commencement schedule:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Substantive Right:</strong> <strong>Section 13</strong>, which grants the right of grievance redressal, is scheduled to come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Procedural Rule:</strong> <strong>Rule 14</strong>, which sets the 90-day response limit, follows the same 18-month timeline.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, the formal right to demand grievance redressal under these specific standards will be enforceable starting in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(5)",
              "title": "Right to nominate",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Right to nominate</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the Right to nominate is a critical provision that ensures the continuity and protection of an individual's data rights even when they are personally unable to exercise them. This right is situated within Chapter III, which details the \"Rights and Duties of Data Principal,\" placing it alongside other fundamental entitlements like the right to access, correction, and grievance redressal.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Scope and Triggering Events</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to <strong>Section 14</strong>(1), a Data Principal has the legal authority to nominate any other individual to act on her behalf. This nominee is empowered to exercise the Data Principal's rights only in the event of two specific circumstances:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Death:</strong> The nominee assumes the role of exercising the individual's rights posthumously.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Incapacity:</strong> The Act defines \"incapacity\" as the inability to exercise one's rights due to unsoundness of mind or infirmity of body.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Procedural Requirements for Nomination</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Rules, 2025, provide the operational framework for how this right is managed:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Multi-Nomination:</strong> A Data Principal may nominate one or more individuals to act on her behalf.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Fiduciary Obligations:</strong> Data Fiduciaries and Consent Managers are required to prominently publish on their websites or applications the specific means\u2014such as a dedicated communication link\u2014that a Data Principal can use to make a nomination request.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Verification:</strong> To process the nomination, a fiduciary may require the Data Principal to furnish specific particulars, such as a username or other identifier, to verify her identity under the terms of service.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Role in the Larger Context of Rights</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The right to nominate acts as a legal bridge for all other rights granted under the Act. It ensures that even if the primary Data Principal cannot personally act, their nominee can effectively manage their digital footprint by:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Accessing information about what data is being processed and with whom it has been shared.</li>\n<li style=\"margin-bottom: 4px;\">Requesting the correction, completion, or erasure of personal data.</li>\n<li style=\"margin-bottom: 4px;\">Utilizing the grievance redressal mechanism to resolve disputes with fiduciaries or managers.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The implementation of this right follows the Act's staggered commencement schedule:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Statutory Provision:</strong> <strong>Section 14</strong>, which establishes the right to nominate, is scheduled to come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Operational Rule:</strong> <strong>Rule 14</strong>, which provides the manner and procedural details for nomination, follows the same eighteen-month timeline.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, the formal mechanism for nominating individuals to exercise these rights will be legally enforceable starting in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            }
          ]
        },
        {
          "section_number": "3.2",
          "title": "Duties",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "Comply with applicable laws",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Comply with applicable laws</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the duty to comply with applicable laws is a foundational requirement for both the Data Principal (the individual) and the Data Fiduciary (the entity), ensuring that the exercise of rights and the processing of data occur within the broader legal framework of India.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Statutory Duty of the Data Principal</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act explicitly outlines the duties of an individual in Chapter III.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Compliance While Exercising Rights:</strong> A Data Principal is legally mandated to comply with the provisions of all applicable laws for the time being in force while exercising her rights under the Act.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Authenticity and Truthfulness:</strong> Linked to this general duty are specific requirements to ensure the integrity of legal processes:</li>\n<li style=\"margin-bottom: 4px;\">Individuals must not impersonate another person when providing personal data for a specified purpose.</li>\n<li style=\"margin-bottom: 4px;\">They must not suppress material information when providing data for state-issued documents or identifiers.</li>\n<li style=\"margin-bottom: 4px;\">They must not register false or frivolous grievances with a Data Fiduciary or the Board.</li>\n<li style=\"margin-bottom: 4px;\">When exercising the right to correction or erasure, they must furnish only information that is verifiably authentic.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Compliance Obligations of the Data Fiduciary</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">While the Act categorizes the responsibilities of entities as \"General Obligations,\" these function as mandatory duties that often intersect with other Indian laws.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Primary Compliance Duty:</strong> A Data Fiduciary is responsible for complying with the Act and its Rules for all processing undertaken by it or on its behalf by a Data Processor.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Conflict and Precedence:</strong> The DPDP Act is \"in addition to and not in derogation of any other law\". However, in the event of a conflict between this Act and another law, the provisions of the DPDP Act shall prevail.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Overriding Retention Requirements:</strong> The duty to erase data once a purpose is served is explicitly limited by other legal mandates. A fiduciary must retain data if such retention is necessary for compliance with any law for the time being in force. For example, if banking laws require a record to be kept for ten years, the bank must comply with that law regardless of an erasure request under the DPDP Act.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Compliance in Specialized Contexts</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Rules, 2025, further integrate the requirement to follow applicable laws into specific procedures:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Verifiable Consent for Children:</strong> When obtaining parental consent, a fiduciary must observe due diligence to identify the adult in connection with compliance with any law currently in force in India.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Log Retention:</strong> Fiduciaries must retain processing logs for a minimum of one year unless compliance with another law requires a different retention period.</li>\n<li style=\"margin-bottom: 4px;\"><strong>State Processing:</strong> When the State processes data for subsidies or services, it must follow the standards set in the Second Schedule, which include ensuring processing is consistent with any law for the time being in force.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Penalties for Non-Compliance</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act enforces these duties through a tiered penalty structure:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Data Principal Breaches:</strong> A breach of the duties listed under <strong>Section 15</strong> (such as failing to comply with applicable laws or providing false info) can result in a penalty of up to ten thousand rupees.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Data Fiduciary Breaches:</strong> Failure by a fiduciary to comply with its statutory obligations can lead to much higher penalties, such as up to two hundred and fifty crore rupees for failing to take reasonable security safeguards to prevent a breach.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The implementation of these duties is subject to a staggered commencement schedule.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Data Principal Duties:</strong> <strong>Section 15</strong>, which establishes the duty to comply with applicable laws and maintain authenticity, is scheduled to come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u> notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, these specific legal duties and the corresponding penalties for individuals will become formally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(2)",
              "title": "No impersonation while providing data",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">No impersonation while providing data</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the prohibition against impersonation is a specific statutory duty imposed on the Data Principal (the individual). This duty is situated within Chapter III, which balances the rights of individuals with a set of mandatory responsibilities designed to ensure the integrity and authenticity of the data ecosystem.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. The Specific Duty: No Impersonation</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act explicitly mandates under <strong>Section 15</strong>(b) that a Data Principal must ensure she does not impersonate another person while providing her personal data for a specified purpose. This requirement is intended to prevent identity fraud and ensure that Data Fiduciaries are processing accurate information related to the actual individual involved in the transaction or service.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. The Larger Context of \"Duties\"</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The duty to not impersonate is <strong>part of</strong> a broader set of Duties of the Data Principal aimed at maintaining legal and procedural integrity:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Compliance with Laws:</strong> Individuals must comply with all applicable laws while exercising their rights under the Act.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Truthfulness with the State:</strong> When providing data for any document, unique identifier, or proof of identity/address issued by the State, the individual must not suppress any material information.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Authenticity in Correction/Erasure:</strong> When an individual exercises her right to have data corrected or erased, she is duty-bound to furnish only such information as is verifiably authentic.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Prohibition of Frivolous Complaints:</strong> Data Principals must not register false or frivolous grievances or complaints with a Data Fiduciary or the Data Protection Board.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Consequences and Penalties</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The framework enforces these duties through a dedicated penalty structure. If the Data Protection Board determines, following an inquiry, that a Data Principal has breached her duties under <strong>Section 15</strong>, it may impose a monetary penalty. According to the Schedule of the Act, a breach of the duties under <strong>Section 15</strong> can result in a penalty that may extend to ten thousand rupees.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Like many substantive portions of the Act, the provisions governing the duties of individuals are subject to a staggered implementation schedule. According to the notification dated <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, <strong>Section 15</strong> is scheduled to come into force eighteen months after the publication of the gazette. Consequently, the legal duty to not impersonate and the associated penalties for doing so will become formally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></div>"
            },
            {
              "clause_number": "(3)",
              "title": "No suppression of material info for State ID",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">No suppression of material info for State ID</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the requirement to avoid suppressing material information when applying for State-issued identification is a specific statutory duty of the Data Principal. This obligation is <strong>part of</strong> the broader framework of \"Duties of Data Principal\" (Chapter III), which establishes the responsibilities individuals must uphold to maintain the integrity of the national data ecosystem.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Scope of the Duty (<strong>Section 15</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act explicitly mandates that a Data Principal must ensure she does not suppress any material information when providing her personal data for the following:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>State-Issued Documents:</strong> Any document issued by the State or its instrumentalities.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Unique Identifiers:</strong> This includes digital or physical identifiers used for unique recognition of an individual.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Proof of Identity or Address:</strong> Any data provided to establish residency or identity for official purposes.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The term \"State\" is defined under Article 12 of the Constitution, encompassing the Government and Parliament of India, the Government and Legislature of each State, and all local or other authorities within the territory of India.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Context within the General \"Duties\" Framework</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">This specific duty to be transparent with the State works alongside other mandatory responsibilities listed under <strong>Section 15</strong>:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Compliance with Laws:</strong> Individuals must follow all applicable laws while exercising their rights.</li>\n<li style=\"margin-bottom: 4px;\"><strong>No Impersonation:</strong> Individuals are prohibited from pretending to be someone else when providing data for a specified purpose.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Authenticity in Rights Claims:</strong> When requesting data correction or erasure, individuals must only provide information that is verifiably authentic.</li>\n<li style=\"margin-bottom: 4px;\"><strong>No Frivolous Complaints:</strong> Data Principals are barred from registering false or frivolous grievances with a Data Fiduciary or the Board.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Penalties for Suppression of Information</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act treats the breach of these duties as a punishable offense to ensure the accuracy of official records.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Board Inquiry:</strong> If a complaint is made or a reference is received, the Data Protection Board of India has the power to inquire into the breach.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Monetary Penalty:</strong> Under the Schedule of the Act (Sl. No. 5), a breach in observing the duties under <strong>Section 15</strong> can result in a monetary penalty that may extend to ten thousand rupees.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Implementation and Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to the enforcement notification dated <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, the provisions establishing these duties are subject to a staggered commencement:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Wait Period:</strong> <strong>Section 15</strong> (Duties of Data Principal) is scheduled to come into force eighteen months after the publication of the notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, the legal obligation to avoid suppressing material information for State IDs, along with the Board's power to penalize such actions, will become formally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(4)",
              "title": "No false or frivolous complaints",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">No false or frivolous complaints</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the prohibition against filing false or frivolous complaints is a statutory duty imposed on the Data Principal. This duty is designed to maintain the integrity of the grievance redressal and regulatory framework by discouraging the misuse of the law through bad-faith allegations.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Scope of the Duty</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act specifically mandates under <strong>Section 15</strong>(d) that every Data Principal must ensure they do not register a false or frivolous:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Grievance with a Data Fiduciary.</li>\n<li style=\"margin-bottom: 4px;\">Complaint with the Data Protection Board of India.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">This duty applies regardless of whether the individual is exercising their right to access information, correction, or erasure.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Board Powers Regarding Frivolous Complaints</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The framework provides the Data Protection Board with specific powers to address cases where this duty is breached during the inquiry process. Under <strong>Section 28</strong>(12), if the Board determines at any stage after receiving a complaint that it is false or frivolous, it may:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Issue a warning to the complainant.</li>\n<li style=\"margin-bottom: 4px;\">Impose costs on the complainant.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Penalties for Breach of Duty</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Beyond the immediate costs or warnings issued during an inquiry, a breach of the duties listed under <strong>Section 15</strong> (which includes the prohibition of false complaints) carries a specific financial penalty. According to the Schedule of the Act, the Data Protection Board may impose a monetary penalty for such a breach that may extend to ten thousand rupees.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The implementation of the duties of the Data Principal is subject to the Act's staggered commencement schedule.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Commencement:</strong> <strong>Section 15</strong>, which establishes the duty to avoid false or frivolous complaints, is scheduled to come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, the legal requirement to refrain from filing such complaints and the Board's authority to penalize individuals for doing so will be formally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(5)",
              "title": "Furnish authentic information",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Furnish authentic information</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the duty to furnish authentic information is a specific statutory responsibility of the Data Principal. This duty is designed to ensure that the processes of correcting and updating personal records are based on truth, thereby maintaining the integrity of the data ecosystem.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Scope of the Duty (<strong>Section 15</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act explicitly mandates in <strong>Section 15</strong>(e) that a Data Principal must furnish only such information as is verifiably authentic. This duty is specifically triggered when the individual is exercising their:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Right to correction of inaccurate or misleading data.</li>\n<li style=\"margin-bottom: 4px;\">Right to erasure of their personal data.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">By requiring that information be \"verifiably authentic,\" the Act ensures that individuals cannot use their statutory rights to inject false data into a Data Fiduciary's system or delete records based on fraudulent claims.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Interaction with Related Duties</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The duty to provide authentic information is <strong>part of</strong> a broader suite of \"Duties of Data Principal\" intended to prevent the misuse of the Act:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>No Impersonation:</strong> While providing data for a specified purpose, an individual must not pretend to be someone else.</li>\n<li style=\"margin-bottom: 4px;\"><strong>No Suppression of Material Info:</strong> When providing data for State-issued identifiers or documents (like an ID or proof of address), the individual is duty-bound not to hide relevant facts.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Authenticity for State Functions:</strong> When the State processes data for subsidies or benefits, it must make reasonable efforts to ensure the completeness, accuracy, and consistency of the data, a process that relies on the Data Principal's duty to provide truthful information.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Verification and Identity</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">To facilitate the fulfillment of this duty, a Data Fiduciary or Consent Manager may require the individual to provide specific particulars to verify their identity before processing a request for correction or erasure. This may include:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">A username or other identifier (such as an email address, mobile number, or enrollment ID) issued by the fiduciary.</li>\n<li style=\"margin-bottom: 4px;\">Adherence to the terms of service of the Data Fiduciary.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Enforcement and Penalties</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act imposes a financial consequence for individuals who fail to uphold these duties. If the Data Protection Board of India determines that a Data Principal has breached their duty to furnish authentic information under <strong>Section 15</strong>, it may impose a monetary penalty.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Penalty Amount:</strong> The penalty for a breach of duties under <strong>Section 15</strong> can extend to ten thousand rupees.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to the notification issued on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, the enforcement of these duties is subject to a staggered commencement.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Wait Period:</strong> The provisions of <strong>Section 15</strong> (Duties of Data Principal) are scheduled to come into force eighteen months after the publication of the gazette.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, the legal mandate to furnish only verifiably authentic information\u2014and the Board's power to penalize failures to do so\u2014will be formally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            }
          ]
        }
      ]
    },
    {
      "chapter_number": "4",
      "title": "Special Categories and Processing",
      "section": [
        {
          "section_number": "4.1",
          "title": "Children",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "Verifiable parental consent",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Verifiable parental consent</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, and the DPDP Rules, 2025, the processing of a child\u2019s data is subject to strict protective mandates, centered on the requirement of verifiable parental consent. A \"child\" is defined by the Act as an individual who has not yet completed eighteen years of age.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. The Statutory Mandate for Verifiable Consent</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to <strong>Section 9</strong>(1), a Data Fiduciary is legally required to obtain the verifiable consent of a parent or a lawful guardian before processing any personal data belonging to a child. This requirement is <strong>part of</strong> a broader set of \"additional obligations\" intended to safeguard minors in the digital ecosystem.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. The Verification Process (<strong>Rule 10</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Rules establish a rigorous standard for how this consent must be obtained. A Data Fiduciary must implement appropriate technical and organizational measures to ensure the consent is valid and must observe due diligence to verify that the person identifying themselves as the parent is indeed an identifiable adult (someone 18 or older).</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Methods of Verification</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The framework provides several pathways for a fiduciary to verify an adult's identity and age in connection with parental consent:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Existing Records:</strong> Referencing reliable identity and age details already available to the Data Fiduciary (for example, if the parent is already a registered user on the platform).</li>\n<li style=\"margin-bottom: 4px;\"><strong>Voluntary Disclosure:</strong> Using identity and age details voluntarily provided by the individual at the time of the request.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Virtual Tokens:</strong> Utilizing a virtual token issued by an authorized entity that is mapped to the individual's verified identity and age details.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Digital Locker Services:</strong> Verification can also be performed through details made available and verified by a Digital Locker service provider.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Prohibitions Regarding Children's Data</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The requirement for verifiable consent exists alongside absolute prohibitions on certain types of processing for minors:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>No Detrimental Effect:</strong> Fiduciaries must not process data in any way likely to cause a detrimental effect on a child's well-being.</li>\n<li style=\"margin-bottom: 4px;\"><strong>No Monitoring or Targeting:</strong> Fiduciaries are strictly barred from undertaking tracking or behavioural monitoring of children or directing targeted advertising at them.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Exemptions and Specialized Processing</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Under <strong>Section 9</strong>(4) and <strong>Rule 12</strong>, certain classes of Data Fiduciaries and specific purposes are exempt from the requirements of verifiable consent and the prohibition on tracking:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Healthcare:</strong> Clinical and mental health establishments and healthcare professionals are exempt when processing is necessary for providing health services to protect the child's health.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Education and Safety:</strong> Educational institutions may track or monitor children for educational activities or to ensure the safety of students.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Transport and Childcare:</strong> Cr\u00e8ches and transport providers (engaged by schools) may track children's real-time location in the interest of their safety.</li>\n<li style=\"margin-bottom: 4px;\"><strong>State Functions:</strong> Processing by the State for providing subsidies or benefits in the interest of a child is also exempt from these specific <strong>Section 9</strong> mandates.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">6. Enforcement and Penalties</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Failure to observe these obligations is treated with high severity. Under the Act\u2019s Schedule, a breach of the additional obligations related to children can result in a monetary penalty of up to two hundred crore rupees. These provisions are scheduled to come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u> notification, making them legally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></div>"
            },
            {
              "clause_number": "(2)",
              "title": "No detrimental processing to well-being",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">No detrimental processing to well-being</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the prohibition against processing data in a manner that causes a \"detrimental effect on the well-being of a child\" is a core statutory mandate designed to ensure the safety and healthy development of minors.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. The Statutory Prohibition (<strong>Section 9</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act establishes a strict standard for any entity handling the data of a child, which is defined as an individual who has not yet completed eighteen years of age. Specifically, <strong>Section 9</strong>(2) mandates that:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">A Data Fiduciary shall not undertake any processing of personal data that is likely to cause any detrimental effect on the well-being of a child.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Unlike the requirements for verifiable parental consent or the ban on tracking, which have specific exemptions for healthcare or education, this prohibition on \"detrimental processing\" is an absolute obligation for fiduciaries.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Integration with Protective Frameworks</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">This obligation exists within a broader \"General Obligations\" framework specifically for children, which also includes:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Prohibition on Tracking:</strong> Data Fiduciaries are bar
