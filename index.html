<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Personal Data Protection Framework</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ── Theme tokens (White + Blue) ──────────────────── */
        :root {
            --bg:            #FFFFFF;
            --bg-sidebar:    #F0F4FA;
            --bg-card:       #FFFFFF;
            --bg-ill:        #EBF2FF;
            --border:        #D9E4F0;
            --accent:        #1A56DB;
            --accent-muted:  #4B83D4;
            --accent-light:  #EBF2FF;
            --accent-xlight: #F5F9FF;
            --text:          #1A1F2E;
            --text-muted:    #6B7A99;
            --text-ill:      #2D4A8A;
            --node-hl:       rgba(26, 86, 219, 0.07);
            --ui-font:       'JetBrains Mono', 'Courier New', monospace;
            --body-font:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* ── Reset ────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body-font);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ──────────────────────────────────────── */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px 18px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-sidebar);
        }

        .sidebar-header h1 {
            font-family: var(--ui-font);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 3px;
        }

        .sidebar-header p {
            font-family: var(--ui-font);
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .toc-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 10px;
            list-style: none;
        }

        .toc-item { margin-bottom: 2px; }

        .toc-link {
            display: block;
            padding: 8px 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-family: var(--ui-font);
            font-size: 11.5px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: color 0.15s, background 0.15s;
        }

        .toc-link:hover { color: var(--text); background: rgba(0,0,0,0.04); }
        [data-theme="dark"] .toc-link:hover { background: rgba(255,255,255,0.04); }
        .toc-link.active { color: var(--text); border: 1px solid var(--border); }

        /* Tree TOC */
        .toc-chapter-group { margin-bottom: 4px; }

        .toc-chapter-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 9px 12px;
            background: none;
            border: 1px solid transparent;
            color: var(--text);
            font-family: var(--ui-font);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            text-align: left;
            transition: background 0.15s, color 0.15s;
            border-radius: 4px;
        }

        .toc-chapter-btn:hover { background: var(--accent-light); color: var(--accent); }

        .toc-ch-label { flex: 1; }
        .toc-ch-num {
            font-size: 10px;
            color: var(--accent-muted);
            margin-right: 6px;
        }
        .toc-ch-arrow {
            width: 12px; height: 12px;
            flex-shrink: 0;
            transition: transform 0.2s;
            color: var(--text-muted);
        }
        .toc-chapter-group.open .toc-ch-arrow { transform: rotate(90deg); }

        .toc-section-list {
            list-style: none;
            margin: 2px 0 2px 16px;
            padding: 0;
            border-left: 1px solid var(--border);
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.25s ease;
        }
        .toc-chapter-group.open .toc-section-list { max-height: 80000px; }

        /* Section group (expandable) */
        .toc-section-group { margin-bottom: 1px; }

        .toc-section-link {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            margin: 1px 0;
            color: var(--text-muted);
            font-family: var(--ui-font);
            font-size: 11px;
            cursor: pointer;
            transition: color 0.12s;
            line-height: 1.4;
            gap: 4px;
        }
        .toc-section-link:hover { color: var(--text); }
        .toc-section-link.active { color: var(--accent); border-left: 2px solid var(--accent); margin-left: -1px; }

        .toc-sec-num {
            font-weight: 700;
            margin-right: 4px;
            opacity: 0.6;
            flex-shrink: 0;
        }
        .toc-sec-label { flex: 1; }
        .toc-sec-arrow {
            flex-shrink: 0;
            transition: transform 0.2s;
            color: var(--text-muted);
            opacity: 0.5;
        }
        .toc-section-group.sec-open > .toc-sec-arrow,
        .toc-section-group.sec-open > .toc-section-link .toc-sec-arrow { transform: rotate(90deg); }

        /* Clause list (3rd level) */
        .toc-clause-list {
            list-style: none;
            margin: 1px 0 2px 12px;
            padding: 0;
            border-left: 1px dashed var(--border);
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
        }
        .toc-section-group.sec-open > .toc-clause-list { max-height: 40000px; }

        .toc-clause-group { margin-bottom: 0; }

        .toc-clause-link {
            display: flex;
            align-items: flex-start;
            padding: 3px 8px;
            margin: 0;
            color: var(--text-muted);
            font-family: var(--ui-font);
            font-size: 10px;
            cursor: pointer;
            transition: color 0.12s, background 0.12s;
            line-height: 1.35;
            gap: 4px;
        }
        .toc-clause-link:hover { color: var(--text); background: rgba(0,0,0,0.03); }
        [data-theme="dark"] .toc-clause-link:hover { background: rgba(255,255,255,0.03); }

        .toc-cl-num {
            font-weight: 700;
            color: var(--accent-muted);
            flex-shrink: 0;
            min-width: 22px;
            opacity: 0.7;
        }
        .toc-cl-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .toc-cl-arrow {
            flex-shrink: 0;
            transition: transform 0.2s;
            color: var(--text-muted);
            opacity: 0.4;
            margin-top: 1px;
        }
        .toc-clause-group.cl-open > .toc-clause-link .toc-cl-arrow { transform: rotate(90deg); }

        /* Sub-clause list (4th level) */
        .toc-subclause-list {
            list-style: none;
            margin: 0 0 1px 10px;
            padding: 0;
            border-left: 1px dotted var(--border);
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.25s ease;
        }
        .toc-clause-group.cl-open > .toc-subclause-list { max-height: 20000px; }

        .toc-subclause-link {
            display: flex;
            align-items: flex-start;
            padding: 2px 6px;
            margin: 0;
            color: var(--text-muted);
            font-family: var(--ui-font);
            font-size: 9.5px;
            cursor: pointer;
            transition: color 0.12s, background 0.12s;
            line-height: 1.3;
            gap: 3px;
            opacity: 0.8;
        }
        .toc-subclause-link:hover { color: var(--text); opacity: 1; background: rgba(0,0,0,0.03); }
        [data-theme="dark"] .toc-subclause-link:hover { background: rgba(255,255,255,0.03); }

        .toc-sub-num {
            font-weight: 700;
            color: var(--accent-muted);
            flex-shrink: 0;
            min-width: 18px;
            opacity: 0.6;
        }
        .toc-sub-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Pulse highlight animation for scroll targets */
        @keyframes tocPulse {
            0% { background: rgba(180, 140, 60, 0.35); }
            100% { background: transparent; }
        }
        .clause-pulse {
            animation: tocPulse 2s ease-out;
        }
        [data-theme="dark"] .clause-pulse {
            animation: tocPulseDark 2s ease-out;
        }
        @keyframes tocPulseDark {
            0% { background: rgba(245, 234, 207, 0.15); }
            100% { background: transparent; }
        }

        /* ── Main area ────────────────────────────────────── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* ── Top bar ──────────────────────────────────────── */
        .top-bar {
            padding: 0 28px;
            height: 50px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            background: #FFFFFF;
            flex-shrink: 0;
            box-shadow: 0 1px 0 var(--border);
        }

        .top-bar-left {
            flex: 1;
            display: flex;
        }

        .search-container {
            position: relative;
            flex: 0 1 420px;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 7px 12px 7px 34px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--ui-font);
            font-size: 11.5px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* control bar */
        .controls {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            flex: 1;
        }

        .ctrl-group {
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
        }

        .ctrl-group + .ctrl-group { margin-left: 8px; }

        .btn {
            padding: 5px 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: var(--ui-font);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            outline: none;
            white-space: nowrap;
            transition: color 0.15s, background 0.15s;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        .btn:hover { color: var(--accent); background: var(--accent-light); }
        .btn + .btn { border-left: 1px solid var(--border); border-radius: 0; }

        .btn-icon { font-size: 14px; line-height: 1; }

        .page-indicator {
            font-family: var(--ui-font);
            font-size: 10px;
            color: var(--text-muted);
            padding: 0 8px;
            white-space: nowrap;
            align-self: center;
        }

        /* ── Document area ────────────────────────────────── */
        .document-container {
            flex: 1;
            overflow-y: auto;
            padding: 48px 60px;
            scroll-behavior: smooth;
        }

        .document-view {
            max-width: 820px;
            margin: 0 auto;
            padding-bottom: 100px;
            font-size: var(--doc-size, 15px);
            line-height: 1.75;
        }

        /* ── Chapter card ─────────────────────────────────── */
        .chapter-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 28px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(26,86,219,0.04);
            transition: box-shadow 0.15s;
        }
        .chapter-card:hover { box-shadow: 0 2px 8px rgba(26,86,219,0.08); }

        .chapter-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            background: var(--accent-light);
            border-left: 4px solid var(--accent);
        }
        .chapter-header:hover { background: #dceaff; }

        .chapter-title-area h2 {
            font-family: var(--ui-font);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .chapter-title-area h3 {
            font-family: var(--body-font);
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        .expand-icon {
            width: 22px; height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--accent-muted);
            border-radius: 4px;
            color: var(--accent-muted);
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .collapsed .expand-icon { transform: rotate(-90deg); }

        .chapter-body {
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--bg-card);
        }
        .collapsed .chapter-body { display: none; }

        /* ── Section node ─────────────────────────────────── */
        .section-node {
            border-left: 3px solid var(--accent-muted);
            border-radius: 0 6px 6px 0;
            padding-left: 18px;
            margin-bottom: 4px;
            transition: border-color 0.15s;
        }
        .section-node:hover { border-color: var(--accent); }

        .section-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 10px 12px 10px 0;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
            transition: background 0.12s;
        }
        .section-header:hover { background: var(--node-hl); }

        .section-title {
            font-family: var(--body-font);
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.02em;
        }
        .section-title span {
            font-family: var(--ui-font);
            font-size: 11px;
            color: var(--accent);
            margin-right: 8px;
            font-weight: 700;
            background: var(--accent-light);
            padding: 1px 5px;
            border-radius: 3px;
        }

        .section-body {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .collapsed .section-body { display: none; }

        .intro-content {
            font-family: var(--body-font);
            font-size: 0.95em;
            line-height: 1.75;
            color: var(--text-muted);
            padding: 4px 0;
            font-style: italic;
        }

        /* ── Clause node ──────────────────────────────────── */
        .clause-node {
            border-left: 2px solid var(--border);
            border-radius: 0 4px 4px 0;
            padding-left: 14px;
            margin-left: 4px;
            padding-top: 6px;
            padding-bottom: 6px;
            transition: border-color 0.12s, background 0.12s;
        }
        .clause-node:hover {
            border-color: var(--accent-muted);
            background: var(--accent-xlight);
        }

        .clause-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-family: var(--body-font);
            font-size: 0.95em;
            line-height: 1.7;
            color: var(--text);
        }

        .clause-num {
            font-family: var(--ui-font);
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            background: var(--accent-light);
            border-radius: 3px;
            padding: 2px 5px;
            min-width: 28px;
            text-align: center;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .clause-content { flex: 1; }

        .clause-body {
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ── Sub-clause ───────────────────────────────────── */
        .sub-clause-node {
            border-left: 2px dashed var(--border);
            border-radius: 0 4px 4px 0;
            padding-left: 12px;
            margin-left: 8px;
            padding-top: 4px;
            padding-bottom: 4px;
            transition: border-color 0.12s;
        }
        .sub-clause-node:hover { border-color: var(--accent-muted); }
        .sub-clause-num {
            font-family: var(--ui-font);
            font-size: 10px;
            font-weight: 700;
            color: var(--accent-muted);
            background: var(--bg-ill);
            border-radius: 3px;
            padding: 2px 4px;
            min-width: 28px;
            text-align: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* ── Sub-sub-clause ───────────────────────────────── */
        .sub-sub-clause-node {
            border-left: 1px dotted var(--border);
            padding-left: 12px;
            margin-left: 8px;
        }
        .sub-sub-clause-num {
            font-family: var(--ui-font);
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            min-width: 24px;
            padding-top: 2px;
            flex-shrink: 0;
        }

        /* ── Illustrations ────────────────────────────────── */
        .illustration-card {
            background: var(--bg-ill);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 0 6px 6px 0;
            padding: 14px 18px;
            margin-top: 8px;
            margin-left: 28px;
        }

        .illustration-header {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-family: var(--ui-font);
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 8px;
        }

        .illustration-body {
            font-family: var(--body-font);
            font-size: 0.9em;
            line-height: 1.65;
            color: var(--text-ill);
            font-style: italic;
        }

        /* ── Scrollbar ────────────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-muted); }

        /* ── Search highlight ─────────────────────────────── */
        .highlight {
            background: rgba(26, 86, 219, 0.15);
            color: var(--accent);
            padding: 0 2px;
            border-radius: 2px;
        }

        .hidden { display: none !important; }

        /* ── Sahayak Chat Panel ───────────────────────────── */
        .chat-panel {
            position: absolute;
            top: 52px;
            right: 0;
            bottom: 0;
            width: 400px;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            box-shadow: -4px 0 24px rgba(0,0,0,0.05);
        }
        [data-theme="dark"] .chat-panel {
            box-shadow: -4px 0 24px rgba(0,0,0,0.4);
        }
        .chat-panel.open {
            transform: translateX(0);
        }
        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
        }
        .chat-header h2 {
            font-family: var(--ui-font);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text);
        }
        .chat-close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .chat-msg {
            font-family: var(--body-font);
            font-size: 13px;
            line-height: 1.6;
            padding: 12px 16px;
            max-width: 85%;
            border: 1px solid var(--border);
            word-wrap: break-word;
        }
        .chat-msg.user {
            align-self: flex-end;
            background: var(--bg-card);
            border-color: var(--border);
            color: var(--text);
        }
        .chat-msg.bot {
            align-self: flex-start;
            background: var(--bg-ill);
            border-color: var(--border);
            color: var(--text-ill);
        }
        .chat-msg.bot p { margin-bottom: 8px; }
        .chat-msg.bot p:last-child { margin-bottom: 0; }
        .chat-msg.bot strong { font-weight: 700; color: var(--accent); }
        .chat-msg.bot ul, .chat-msg.bot ol { margin-left: 16px; margin-bottom: 8px; }
        .chat-msg.bot li { margin-bottom: 4px; }
        .chat-input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-card);
            display: flex;
            gap: 8px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--ui-font);
            font-size: 12px;
            outline: none;
        }
        .chat-input-area input:focus {
            border-color: var(--accent);
        }
        .chat-btn {
            padding: 0 16px;
            background: var(--text);
            color: var(--bg);
            border: 1px solid var(--text);
            font-family: var(--ui-font);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .chat-btn:hover {
            opacity: 0.8;
        }

        /* ── Sahayak Chat Additions ──────────────────────── */
        .chat-bot-wrap {
            align-self: flex-start;
            max-width: 85%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }
        .meta-pill {
            display: inline-flex;

    <script>
        const actData = {
  "chapter": [
    {
      "chapter_number": "1",
      "title": "Scope and Applicability",
      "section": [
        {
          "section_number": "1.1",
          "title": "Digital personal data",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "",
              "content": "<div style=\"margin-bottom: 8px; line-height: 1.6;\">The framework establishes a hierarchy of definitions to identify what data is protected. Data is a representation of information, facts, concepts, or instructions suitable for communication or processing by humans or automated means. Personal Data is any data about an individual who is identifiable by or in relation to such data. Digital Personal Data specifically refers to personal data in digital form.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Material scope: the Act applies specifically to the 'processing' of digital personal data \u2014 a wholly or partly automated operation (or set of operations) performed on such data, such as collection, recording, storage, sharing, or erasure. For the Act to apply, the personal data must either be collected originally in digital form, or collected in non-digital form and digitized subsequently.</div>"
            }
          ]
        },
        {
          "section_number": "1.2",
          "title": "Processing within India",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "",
              "content": "<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act applies to the processing of digital personal data within the territory of India under two conditions: when personal data is collected directly in digital form (Digital Collection), or when personal data is collected in non-digital form but is digitized subsequently (Subsequent Digitization). 'Processing' is defined broadly as a wholly or partly automated operation (or set of operations) performed on such data, including collection, recording, indexing, sharing, and erasure.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Statutory exclusions for domestic processing: even where processing occurs within India, the Act does not apply to data processed by an individual for a personal or domestic purpose, or to data the Data Principal has made publicly available (e.g. social media blogging) or that is required to be made public by law.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Further exemptions for processing within India: (a) processing necessary for enforcing legal rights, or for judicial or regulatory functions of courts and tribunals; (b) processing for research, archiving, or statistical purposes, provided it follows the standards in the Second Schedule and is not used to make a decision specific to a Data Principal; (c) certain State functions such as providing subsidies, benefits, or licenses; and (d) State instrumentalities exempted by the Central Government in the interest of sovereignty, security of the State, or public order.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Temporal scope and enforcement: while the Act was enacted in 2023, provisions governing processing within India are subject to staggered commencement. Administrative provisions, such as establishment of the Data Protection Board of India, came into force on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>. The core 'Application of Act' (<strong>Section 3</strong>) and the processing obligations are scheduled to come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 2025</u> notification (approximately <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>).</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Consistency with other laws: the DPDP Act is designed to be in addition to existing laws, but for processing within India, if there is a conflict between the DPDP Act and any other law, the provisions of the DPDP Act will prevail.</div>"
            }
          ]
        },
        {
          "section_number": "1.3",
          "title": "Outside India for Indian goods/services",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "",
              "content": "<div style=\"margin-bottom: 8px; line-height: 1.6;\">Extra-territorial application: the Act applies to the processing of digital personal data outside the territory of India if such processing is in connection with any activity related to offering goods or services to Data Principals located within India \u2014 ensuring foreign entities targeting Indian consumers are held to the same standards as domestic fiduciaries.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Exemption for foreign data processed in India: the Act does not apply where personal data of Data Principals not within India is processed by a person based in India pursuant to a contract entered into with a person outside India. This means an Indian company processing data for a foreign client concerning foreign individuals is not bound by the Act's obligations for that specific data \u2014 a carve-out for the Indian outsourcing and service industries.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Transfer of personal data outside India: the Central Government may, by notification, restrict transfer of personal data by a Data Fiduciary to specific countries or territories outside India. Under the Rules, personal data may generally be transferred outside India provided the Data Fiduciary meets government-specified requirements regarding making such data available to foreign states or entities. The Act does not supersede any other Indian law providing a higher degree of protection or stricter restrictions on transfer of personal data outside India.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Localization for Significant Data Fiduciaries (SDFs): the Government, based on committee recommendations, can specify certain types of personal data \u2014 including both the data itself and related traffic data \u2014 that must not be transferred outside the territory of India.</div>"
            }
          ]
        },
        {
          "section_number": "1.4",
          "title": "Excludes personal or domestic use",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "",
              "content": "<div style=\"margin-bottom: 8px; line-height: 1.6;\">Under <strong>Section 3</strong>(c)(i), the provisions of the Act do not apply to personal data processed by an individual for any personal or domestic purpose. While the Act does not define 'personal or domestic,' this carve-out generally protects activities like maintaining a private digital address book, sending personal emails, or storing family photos, provided these activities are not <strong>part of</strong> a professional or commercial endeavor. This is distinct from the separate exclusion for data made publicly available by the individual, which falls under <strong>Section 3</strong>(c)(ii).</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Role in the larger scope: this exclusion limits the Act's broad 'Positive Scope' \u2014 which otherwise covers data collected digitally or digitized later, automated processing operations, and processing within India or outside India tied to offering goods/services to Indian Data Principals. By excluding personal and domestic use, the framework focuses its regulatory burden on Data Fiduciaries \u2014 entities (including companies and the State) that determine the purpose and means of data processing \u2014 rather than private citizens managing their own information.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Boundaries: if an individual processes data for a personal reason, they are not considered a 'Data Fiduciary' and are therefore not subject to the obligations (notice, consent, erasure) or penalties that a business or government agency would face for similar data handling.</div>"
            }
          ]
        },
        {
          "section_number": "1.5",
          "title": "Excludes publicly available data",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "",
              "content": "<div style=\"margin-bottom: 8px; line-height: 1.6;\">Under <strong>Section 3</strong>(c)(ii), the provisions of the Act do not apply to personal data that is made, or caused to be made, publicly available through two channels: (a) by the Data Principal, when the individual chooses to share it publicly themselves; or (b) by legal obligation, when any other person is under a legal obligation (under any Indian law currently in force) to make that personal data publicly available.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Illustration: if an individual is blogging her views and publicly makes her personal data available on social media, the Act does not apply to that data. Because the individual has purposefully placed that information in the public domain, the Data Fiduciaries processing that specific public data are not bound by the Act's requirements around notice, consent, or erasure for it.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Context within scope: this exclusion is a counterweight to the Act's positive scope. While the Act applies generally to digital personal data processed within or related to services in India, the public-data exclusion removes the regulatory burden for information that is no longer private by the Principal's own choice or by mandate of law. It is one of two major exclusions \u2014 the other being personal or domestic use \u2014 and both prevent the Act from over-regulating non-commercial or already-public spheres of life. For data that is not public, Data Fiduciaries must still comply with obligations such as notice and ensuring data accuracy; for data falling under this exclusion, those specific statutory obligations are removed.</div>"
            }
          ]
        }
      ]
    },
    {
      "chapter_number": "2",
      "title": "Obligations of Data Fiduciaries",
      "section": [
        {
          "section_number": "2.1",
          "title": "Consent and Notice",
          "clauses": [
            {
              "clause_number": "(intro)",
              "title": "",
              "content": "<div style=\"margin-bottom: 8px; line-height: 1.6;\">A Data Fiduciary \u2014 any person who determines the purpose and means of processing personal data \u2014 can only process personal data for a lawful purpose after obtaining consent or under 'certain legitimate uses'. The obligations of a Data Fiduciary are anchored in the principles of transparency and accountability, primarily through the twin mechanisms of Notice and Consent.</div>"
            },
            {
              "clause_number": "(1)",
              "title": "Notice in English or 8th Schedule languages",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Notice in English or 8th Schedule languages</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\"><strong>Section 5</strong>(3) of the Act requires a Data Fiduciary to give the Data Principal the option to access the contents of the notice \u2014 which describes the data collected and the purpose of processing \u2014 in English or any of the 22 languages listed in the Eighth Schedule to the Constitution. <strong>Section 6</strong>(3) similarly mandates that every request for consent be presented in clear and plain language, again with the option to access it in English or any Eighth Schedule language.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Role in the consent framework: the language requirement exists to make consent genuinely informed and specific \u2014 notice in a language the Data Principal actually understands is essential to knowing what they are agreeing to, in an itemized manner. Even within the chosen language, the information must be clear and plain, and presented independently of other information so it isn't buried or confusing. Because the notice must also explain how to exercise rights and how to complain to the Board, the language mandate ensures these legal protections aren't obscured by a language barrier.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Content requirements regardless of language: the notice must still contain an itemized description of the personal data to be processed, a specific description of the goods or services to be provided or uses to be enabled, and the contact details of a Data Protection Officer or authorized person to respond to the Principal's queries.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Retrospective application: for data collected before the Act's commencement, the Fiduciary must, as soon as reasonably practicable, provide a notice in English or an Eighth Schedule language describing the data already processed and the individual's rights.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Implementation timeline: per the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 2025</u> enforcement notification, the substantive Notice and Consent provisions (Sections 5 and 6) and the associated procedural requirements in <strong>Rule 3</strong> \u2014 including the multilingual notice and consent-request requirement \u2014 come into force eighteen months later, i.e. <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>.</div>"
            },
            {
              "clause_number": "(2)",
              "title": "Itemised description of data and purpose",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Itemised description of data and purpose</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Statutory requirement for itemisation: <strong>Rule 3</strong>(b)(i) mandates that the notice must include an 'itemised description' of the personal data proposed to be processed, preventing fiduciaries from using vague categories and requiring them to list specific data points. Alongside the data list, the notice must state a 'specified purpose or purposes' for the processing, accompanied by a specific description of the goods or services to be provided or uses to be enabled.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Enabling specific and informed consent: this itemisation must be presented in clear, plain language, independently of any other information, so these details aren't buried in lengthy terms and conditions. The 'specified purpose' is legally defined as the exact purpose mentioned in the notice; any processing outside this description lacks a valid legal basis.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Principle of necessity: consent signifies agreement to process data only for the specified purpose, limited to personal data necessary for that purpose. Example: if a telemedicine app requests consent to process data for medical services and also requests access to a contact list, consent is legally limited to data necessary for the medical services \u2014 the contact list cannot be processed even if the user signifies consent, since it isn't necessary for that purpose.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Transparency and accountability: if a question arises regarding consent in a proceeding, the Data Fiduciary bears the burden of proving that a valid notice with itemised details was given and consent obtained accordingly. Once consent is given, the Data Principal has a right to request a summary of the personal data being processed and of the processing activities.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Retrospective application: for individuals who consented before the Act's commencement, Data Fiduciaries must provide a fresh notice as soon as reasonably practicable, including the itemised description of data and purpose, so the individual can decide whether to maintain or withdraw consent.</div>"
            },
            {
              "clause_number": "(3)",
              "title": "Free, specific, and informed consent",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Free, specific, and informed consent</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Consent is not a mere formality but a substantive obligation the Data Fiduciary must manage carefully. The Act stipulates that consent must be free, specific, informed, unconditional, and unambiguous, signified by a clear affirmative action.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Principle of necessity: consent is limited only to the personal data strictly necessary for the specified purpose \u2014 for example, if a telemedicine app requests access to a user's contact list when it isn't necessary for medical services, that <strong>part of</strong> the consent is invalid.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Burden of proof: in any legal proceeding, the Data Fiduciary is obliged to prove that a valid notice was given and consent obtained in accordance with the law.</div>"
            },
            {
              "clause_number": "(4)",
              "title": "Right to withdraw consent",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Right to withdraw consent</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">A Data Principal has the right to withdraw consent at any time, and the ease of withdrawal must be comparable to the ease with which consent was given. Upon withdrawal, the fiduciary must cease processing within a reasonable time, unless continued processing is legally required.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Related infrastructure: Consent Managers \u2014 entities registered with the Board \u2014 act as a single point of contact for Data Principals to give, review, and withdraw consent through an interoperable platform, acting in a fiduciary capacity and prohibited from sub-contracting their obligations.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Enforcement timeline: while administrative provisions establishing the Board are already in force, the core obligations regarding notice and consent (Sections 5 and 6) are scheduled to come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u> notification (approximately <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>). Provisions on registration of Consent Managers (<strong>Section 6</strong>(9)) become active one year after notification (<u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 2026</u>).</div>"
            }
          ]
        },
        {
          "section_number": "2.2",
          "title": "Processing Grounds",
          "clauses": [
            {
              "clause_number": "(intro)",
              "title": "",
              "content": "<div style=\"margin-bottom: 8px; line-height: 1.6;\">A Data Fiduciary is prohibited from processing personal data except for a lawful purpose. The framework establishes two primary grounds for processing: Consent, and 'certain legitimate uses' listed under <strong>Section 7</strong> (State functions, medical emergencies, disasters and public order, and employment, among others). These grounds serve as the legal foundation upon which all other obligations of a Data Fiduciary are built.</div>"
            },
            {
              "clause_number": "(1)",
              "title": "Lawful purpose with consent",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Lawful purpose with consent</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Lawful purpose with consent is one of the two primary legal pillars for processing personal data, alongside 'certain legitimate uses.' A Data Fiduciary may not process personal data unless it is for a lawful purpose for which the individual has given explicit consent.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Defining 'lawful purpose': a lawful purpose is any purpose not expressly forbidden by law. For consent-based processing, this is strictly tied to the 'specified purpose' \u2014 the exact purpose stated in the notice given to the Data Principal before or at the time of the consent request.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Role of consent: consent must be free, specific, informed, unconditional, and unambiguous, signified by a clear affirmative action, and signifies agreement to process data only for the specified purpose. Any <strong>part of</strong> a consent request that infringes the Act or another law is void to that extent \u2014 e.g. asking a user to waive their right to complain to the Board is legally void.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Purpose limitation and necessity: processing is strictly limited to data necessary for the specified purpose. Example: a telemedicine app requesting consent for medical services and also contact-list access can only process data necessary for the medical services \u2014 the contact list cannot be processed since it isn't necessary, regardless of the user's affirmative action.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Procedural requirements: the informed and specific nature of a lawful purpose is established through the notice, which must give a fair account of the processing in clear, plain language, a specific description of goods/services or uses enabled, and an itemised description of the personal data proposed to be processed.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Accountability: the Data Fiduciary bears the burden of proving a valid notice was given and consent obtained for the lawful purpose. The individual retains the right to withdraw consent at any time, after which the fiduciary must cease processing within a reasonable time unless another law requires continued processing.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Timeline: the core grounds for processing and notice requirements (Sections 3\u20135) are scheduled to come into force in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>, eighteen months after the initial notification.</div>"
            },
            {
              "clause_number": "(2)",
              "title": "Legitimate uses for State functions",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Legitimate uses for State functions</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">'Legitimate uses for State functions' is a category of Processing Grounds allowing the State and its instrumentalities to process personal data without explicit consent, under the broader head of 'certain legitimate uses.'</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Core grounds for State processing: (a) provision of subsidies, benefits, services, certificates, licenses, or permits (<strong>Section 7</strong>(b)) \u2014 permitted if the individual previously consented to such State processing or the data is already available in a notified digital database maintained by the State; (b) performance of any statutory function under law currently in force in India (<strong>Section 7</strong>(c)); (c) processing in the interest of the sovereignty and integrity of India or the security of the State; and (d) fulfilling a legal obligation to disclose information to the State or its instrumentalities (<strong>Section 7</strong>(d)), provided it aligns with that law's disclosure provisions.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Expanded scope under the Rules: 'provision or issuance' of State services under <strong>Section 7</strong>(b) includes services delivered through statutory powers or Central/State government policies and instructions, and specifically covers services funded by public funds (Consolidated Fund of India, Consolidated Fund of a State, public accounts, or funds of local/other authorities).</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Standards for State processing (Second Schedule): data minimization limited to what is necessary for the specified State use; reasonable efforts to ensure completeness, accuracy, and consistency; transparency via intimation (contact information and a link to exercise statutory rights, even though consent isn't required); and storage limitation \u2014 data retained only as long as required for the use or by law.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Exemptions: the Central Government may notify specific State instrumentalities as exempt from the entire Act in the interest of national security, public order, or preventing incitement to offenses. When the State processes data for subsidies, benefits, or licenses, it is exempt from the erasure obligation (<strong>Section 8</strong>(7)) and certain correction/completion requests (<strong>Section 12</strong>), especially where processing doesn't involve a decision affecting the individual.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Timeline: the core provisions establishing these legitimate uses (<strong>Section 7</strong>) and corresponding standards (<strong>Rule 5</strong> and Second Schedule) are scheduled to come into force in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>.</div>"
            },
            {
              "clause_number": "(3)",
              "title": "Medical emergencies and public health",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Medical emergencies and public health</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Processing personal data to respond to medical emergencies and public health threats is a 'certain legitimate use,' allowing a Data Fiduciary to process data without the Data Principal's explicit consent \u2014 a carve-out for situations where obtaining consent might be impossible or detrimental to life and safety.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Specific grounds (<strong>Section 7</strong>): (a) medical emergencies \u2014 processing to respond to a threat to the life or immediate threat to the health of the Data Principal or any other individual; and (b) public health safeguards \u2014 processing to provide medical treatment or health services during an epidemic, disease outbreak, or other threat to public health.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Specialized exemptions for children's health: while the Act generally requires verifiable parental consent and prohibits tracking for children's data, the Rules exempt clinical and mental health establishments and healthcare professionals from these restrictions where processing is limited to providing health services necessary for the child's health, and similarly exempt allied healthcare professionals supporting treatment and referral plans for the child's health.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Regulatory context: these scenarios fall under <strong>Section 4</strong>(1)(b) as valid grounds without consent. Even without consent, processing must still be for a lawful purpose and limited to what the emergency or health measure requires. Once the emergency or threat has passed, the general obligation to erase data when the purpose is no longer served still applies, unless retention is required by another law.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Timeline: these legitimate-use provisions (<strong>Section 7</strong>) and the children's-health exemptions (<strong>Rule 12</strong> and Fourth Schedule) are scheduled to come into force in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>.</div>"
            },
            {
              "clause_number": "(4)",
              "title": "Disasters and public order",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Disasters and public order</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Processing personal data during disasters and breakdowns of public order is a 'certain legitimate use,' allowing processing without explicit consent, prioritizing safety and well-being during crises.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Scope (<strong>Section 7</strong>(h)): a Data Fiduciary may process data to ensure the safety of any individual during a disaster or public order breakdown, and to provide assistance or services to affected individuals. 'Disaster' takes the definition assigned in <strong>Section 2</strong>(d) of the Disaster Management Act, 2005.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Public order as an SDF criterion: beyond being a processing ground, public order risk is one of the factors the Central Government considers when notifying a Data Fiduciary as a Significant Data Fiduciary; once notified as an SDF on these grounds, the entity must meet higher compliance standards, including appointing a Data Protection Officer and conducting periodic Data Protection Impact Assessments.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">State instrumentality exemptions: under <strong>Section 17</strong>(2)(a), the Central Government can notify specific State instrumentalities as exempt from the Act's requirements in the interest of maintaining public order \u2014 when notified, standard obligations on notice, consent, and Data Principal rights may not apply to their processing.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Authorised information gathering: the Seventh Schedule of the Rules allows the Central Government or the head of a notified State instrumentality to designate an officer to call for information from Data Fiduciaries for security-of-the-State purposes (frequently linked to public order); if disclosure of such a request would prejudicially affect State security, the Government can require the fiduciary not to disclose the request to the affected Data Principal.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Timeline: the Government's power to notify SDFs (<strong>Section 10</strong>) and exempt State instrumentalities (<strong>Section 17</strong>) came into force on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, but the disaster/public-order processing ground itself under <strong>Section 7</strong> is scheduled to come into force in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>, eighteen months after the initial notification.</div>"
            },
            {
              "clause_number": "(5)",
              "title": "Employment purposes",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Employment purposes</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Processing personal data for employment purposes is a 'certain legitimate use,' giving an employer (as Data Fiduciary) a legal ground to process an employee's (Data Principal's) personal data without requiring explicit consent.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Scope (<strong>Section 7</strong>(i)): covers general employment purposes \u2014 standard administrative processing necessary for the employment relationship; safeguarding the employer from loss or liability, including prevention of corporate espionage and maintaining confidentiality of trade secrets, intellectual property, or classified information; and providing any service or benefit specifically sought by the employee.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Placement within processing grounds: the Act establishes two pathways for lawful processing under <strong>Section 4</strong> \u2014 consent-based processing (free, specific, informed consent following valid notice), and certain legitimate uses (no consent required, falling under <strong>Section 7</strong> categories such as State functions, medical emergencies, or employment). Employment's inclusion here reflects employers' inherent need to manage operations, secure sensitive business assets, and fulfill staff requests.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Ongoing obligations: even without explicit consent, the employer remains a Data Fiduciary and must meet general obligations under <strong>Section 8</strong> \u2014 responsibility for compliance regardless of any agreement to the contrary or the employee's own failures; implementing reasonable security safeguards to prevent breaches; and ensuring data accuracy, completeness, and consistency where the data is used to make a decision affecting the employee.</div>"
            }
          ]
        },
        {
          "section_number": "2.3",
          "title": "General Obligations",
          "clauses": [
            {
              "clause_number": "(intro)",
              "title": "",
              "content": "<div style=\"margin-bottom: 8px; line-height: 1.6;\"><strong>Section 8</strong> of the Act, complemented by the DPDP Rules, 2025, establishes the baseline General Obligations for every Data Fiduciary \u2014 covering data accuracy, security safeguards, breach notification, erasure, and grievance redressal \u2014 alongside more specific obligations that apply to children's data or Significant Data Fiduciaries.</div>"
            },
            {
              "clause_number": "(1)",
              "title": "Ensure data accuracy and completeness",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Ensure data accuracy and completeness</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Statutory obligation (<strong>Section 8</strong>): a Data Fiduciary must ensure the completeness, accuracy, and consistency of personal data specifically when that data is likely to be used to make a decision affecting the Data Principal, or when it is likely to be disclosed to another Data Fiduciary. This responsibility rests solely with the fiduciary regardless of any agreement to the contrary or any failure by the Data Principal to perform their own statutory duties.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Interaction with the Right to Correction (<strong>Section 12</strong>): once a Data Principal makes a request, the fiduciary must correct inaccurate or misleading data, complete incomplete data, and update personal data. This right applies to any processing for which the individual previously gave consent or which falls under certain voluntary legitimate uses.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Reciprocal duty of the Data Principal (<strong>Section 15</strong>): when exercising the right to correction or erasure, the individual must furnish only verifiably authentic information; breaching this duty can result in a penalty of up to ten thousand rupees.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Standards for State and specialized processing: for State processing (subsidies and benefits) or research and archiving purposes, the Rules require fiduciaries to make 'reasonable efforts' to maintain completeness, accuracy, and consistency.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Enforcement timeline: <strong>Section 8</strong> (General Obligations), <strong>Section 12</strong> (Right to Correction), and <strong>Section 15</strong> (Duties) are scheduled to come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u> notification \u2014 enforceable from <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>.</div>"
            },
            {
              "clause_number": "(2)",
              "title": "Reasonable security safeguards",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Reasonable security safeguards</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Statutory mandate (<strong>Section 8</strong>): a Data Fiduciary is legally responsible for protecting personal data in its possession or control, with the primary goal of preventing a personal data breach \u2014 defined as any unauthorized processing, accidental disclosure, acquisition, or loss of access that compromises data confidentiality, integrity, or availability. This responsibility is absolute and non-delegable, persisting regardless of any agreement to the contrary or a Data Principal's own failures.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Mandatory minimum safeguards (<strong>Rule 6</strong>): fiduciaries must adopt a checklist of technical and organizational measures \u2014 encryption, obfuscation, masking, or virtual tokens mapped to personal data; access controls over computer resources whether managed by the fiduciary or a Data Processor; visibility through logs, monitoring, and reviews to detect and remediate unauthorized access; resilience measures such as data backups; log retention of at least one year (unless another law requires otherwise); and contractual provisions requiring Data Processors to maintain the same safeguards.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Extension to specialized entities: Consent Managers, acting in a fiduciary capacity, must also take reasonable security safeguards. State and research/archiving functions must likewise maintain safeguards under the Second Schedule while data is in their possession.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Enforcement and penalties: a breach of the <strong>Section 8</strong>(5) security-safeguards obligation can result in a penalty of up to two hundred and fifty crore rupees \u2014 the highest potential penalty in the Act.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Implementation timeline: <strong>Section 8</strong> and <strong>Rule 6</strong> come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u> notification \u2014 enforceable from <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>.</div>"
            },
            {
              "clause_number": "(3)",
              "title": "Data breach notification to Board and Principal",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Data breach notification to Board and Principal</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Definition: a personal data breach is broadly defined as any unauthorized processing of personal data, or any accidental disclosure, acquisition, sharing, use, alteration, destruction, or loss of access that compromises the confidentiality, integrity, or availability of that data.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Mandatory intimation (<strong>Section 8</strong>): on a breach, the Data Fiduciary must notify both the Data Protection Board of India and each affected Data Principal. This obligation applies regardless of private agreements to the contrary and persists even if the breach was caused by a Data Processor acting on the fiduciary's behalf.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Notification to the Data Principal (<strong>Rule 7</strong>): intimation must be made 'without delay' in a concise, clear, and plain manner, sent through the individual's user account or another registered communication mode. It must include a description of the breach (nature, extent, timing), likely consequences for the Principal, mitigation measures already or being implemented, safety measures the individual can take, and contact information for queries.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Notification to the Board (<strong>Rule 7</strong>): a tiered process applies \u2014 an initial intimation 'without delay' covering nature, extent, timing, location, and likely impact, followed by a detailed report within seventy-two hours covering broader facts, findings on cause, remedial measures taken, and a report on intimations already given to affected individuals.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Enforcement and penalties: failure to notify the Board or affected Data Principals can result in a penalty of up to two hundred crore rupees. On receiving a breach intimation, the Board can direct urgent remedial or mitigation measures and conduct a formal inquiry.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Implementation timeline: <strong>Section 8</strong>(6) and <strong>Rule 7</strong> come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u> notification \u2014 enforceable from <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>.</div>"
            },
            {
              "clause_number": "(4)",
              "title": "Erasure after purpose completion",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Erasure after purpose completion</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Statutory mandate (<strong>Section 8</strong>(7)): a Data Fiduciary must erase personal data upon the earlier of two events \u2014 withdrawal of consent that served as the basis for processing, or as soon as it is reasonable to assume the specified purpose is no longer being served. The fiduciary must ensure any Data Processor it engaged also performs the erasure.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Deemed completion of purpose: a purpose is deemed finished if the Data Principal does not approach the fiduciary or exercise statutory rights for a prescribed period; 'not approached' means no contact in person or via electronic or physical communication during that period.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Prescribed timeframes (<strong>Rule 8</strong> & Third Schedule): large e-commerce entities (\u22652 crore users) and social media intermediaries (\u22652 crore users) must erase data three years after the Principal's last contact or exercise of rights; online gaming intermediaries with \u226550 lakh users face the same three-year window. A mandatory pre-erasure notice must be sent at least forty-eight hours before the deadline, warning the Principal that data will be deleted unless they log in or make contact.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Mandatory minimum log retention: under <strong>Rule 8</strong>(3), fiduciaries must still retain personal data, associated traffic data, and processing logs for a minimum of one year from the date of processing, for purposes specified in the Seventh Schedule (e.g. State functions or national security assessments) \u2014 for example, transaction logs for an e-book purchase must be kept at least a year even if the account is deleted immediately after.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Legal compliance exception: the duty to erase does not apply where retention is necessary to comply with another law in force \u2014 e.g. a bank required to retain client identity records for ten years after account closure. For State processing of subsidies or benefits, data is retained until the specific use is achieved or as required by law.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Implementation timeline: <strong>Section 8</strong> and <strong>Rule 8</strong> come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u> notification \u2014 enforceable from <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>.</div>"
            },
            {
              "clause_number": "(5)",
              "title": "Grievance redressal mechanism",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Grievance redressal mechanism</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Mandatory obligation (<strong>Section 8</strong>(10)): every Data Fiduciary must establish an effective mechanism to redress Data Principal grievances, providing readily available means for redressal regarding any act or omission by the fiduciary or a Consent Manager concerning legal obligations or individual rights. Fiduciaries may require a username or identifier (email, mobile number, enrollment ID) to verify the requester's identity.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Role of Consent Managers: Consent Managers must provide their own grievance redressal systems and respond within the same regulatory timelines as Data Fiduciaries; the Board may inquire into a Consent Manager's conduct on complaint.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Operational standards: Data Fiduciaries and Consent Managers must prominently publish details of their grievance mechanism on their website and/or app, respond within an effective period not exceeding ninety days, and publish the business contact information of a Data Protection Officer or authorized person.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Significant Data Fiduciaries: for an SDF, the India-based Data Protection Officer, responsible to the Board of Directors, must serve as the specific point of contact for grievance redressal.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Exhaustion of remedies: a Data Principal must exhaust the fiduciary's or manager's internal grievance mechanism before approaching the Data Protection Board; the Board steps in to inquire and impose penalties only after this internal process.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Reciprocal duty of the Data Principal: individuals must not register false or frivolous grievances or complaints; the Board may issue a warning or impose costs for misuse, and a breach of <strong>Section 15</strong> duties can lead to a penalty of up to ten thousand rupees.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Implementation timeline: the right to grievance redressal (<strong>Section 13</strong>) and the general obligation to maintain mechanisms (<strong>Section 8</strong>(10)) come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u> notification \u2014 fully operational and compliant by <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>.</div>"
            }
          ]
        },
        {
          "section_number": "2.4",
          "title": "Significant Data Fiduciary (SDF)",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "Appoint India-based Data Protection Officer",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Appoint India-based Data Protection Officer</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, and the accompanying DPDP Rules, 2025, the appointment of an India-based Data Protection Officer (DPO) is a specific, heightened obligation reserved for Significant Data Fiduciaries (SDFs). While all Data Fiduciaries must have a point of contact for grievances, the DPO for an SDF carries distinct statutory responsibilities and must meet specific residency and reporting criteria.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Mandatory Appointment by Significant Data Fiduciaries</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Central Government notifies certain entities as Significant Data Fiduciaries based on factors such as the volume and sensitivity of personal data processed, risks to the rights of Data Principals, and potential impacts on national sovereignty, state security, or public order. Once classified as an SDF, the entity is legally mandated under <strong>Section 10</strong>(2)(a) to appoint a Data Protection Officer.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Key Statutory Requirements for the DPO</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The framework specifies three critical criteria for the DPO of a Significant Data Fiduciary:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>India-Based Residency:</strong> The DPO must be based in India. This ensures that the primary person responsible for the entity's data protection compliance is within the local jurisdiction for regulatory and legal purposes.</li>\n<li style=\"margin-bottom: 4px;\"><strong>High-Level Accountability:</strong> The DPO must be an individual responsible to the Board of Directors or a similar governing body of the Significant Data Fiduciary. This requirement ensures that data protection issues are addressed at the highest levels of corporate governance.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Point of Contact for Grievances:</strong> The DPO serves as the official point of contact for the grievance redressal mechanism. They are responsible for addressing complaints from Data Principals regarding the processing of their personal data or the exercise of their rights.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Transparency and Publication Obligations</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">To ensure accessibility for Data Principals, the framework imposes strict transparency requirements:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Public Contact Information:</strong> An SDF must prominently publish the business contact information of its DPO on its website and application.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Communication Responses:</strong> The business contact information of the DPO must be mentioned in every response sent to a Data Principal who is attempting to exercise their statutory rights.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Notice and Requests:</strong> Every request for consent must provide the DPO's contact details to ensure the individual knows who to contact for further communication.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Role in the Broader Compliance Framework</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPO represents the SDF under the provisions of the Act. Beyond grievance redressal, they are central to the SDF's additional obligations, which include:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Audits and Impact Assessments:</strong> SDFs must appoint an independent data auditor and conduct periodic Data Protection Impact Assessments (DPIAs). The DPO typically oversees these processes to ensure effective observance of the Act.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Reporting to the Board:</strong> The DPO must cause a report containing significant observations from the DPIA and audits to be furnished to the Data Protection Board of India.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The specific provisions governing Significant Data Fiduciaries and the mandatory appointment of an India-based DPO (<strong>Section 10</strong>) are scheduled to come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, notification. Consequently, SDFs must have their DPO appointed and their contact information published by <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u>. Failure to observe these additional obligations can result in a monetary penalty of up to one hundred and fifty crore rupees</div>"
            },
            {
              "clause_number": "(2)",
              "title": "Appoint independent data auditor",
