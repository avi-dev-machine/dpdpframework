              "content": "<strong style=\"display:block; margin-bottom:6px;\">TDSAT as designated tribunal</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the Telecom Disputes Settlement and Appellate Tribunal (TDSAT) is formally designated as the Appellate Tribunal for matters arising under the Act. Rather than creating a new judicial body, the legislation leverages the existing framework of the TDSAT to provide a second tier of oversight for the decisions made by the Data Protection Board of India.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Statutory Designation and Legal Basis</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act provides a clear definition in <strong>Section 2</strong>(a), stating that the \"Appellate Tribunal\" refers specifically to the TDSAT established under <strong>Section 14</strong> of the Telecom Regulatory Authority of India (TRAI) Act, 1997. To finalize this designation, <strong>Section 44</strong>(1) of the DPDP Act amends the TRAI Act to officially include \"the Appellate Tribunal under the Digital Personal Data Protection Act, 2023\" as one of the bodies for which the TDSAT performs its appellate functions.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Role within the Regulatory Framework</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Appellate Tribunal serves as the primary adjudicatory body for individuals or entities dissatisfied with the Board's findings:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Appellate Authority:</strong> Any person aggrieved by an order or direction made by the Data Protection Board of India has the legal right to file an appeal before the TDSAT.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Powers of Adjudication:</strong> Upon hearing an appeal, the Tribunal is authorized to pass orders that confirm, modify, or set aside the original decision made by the Board.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Procedural Independence:</strong> While the Tribunal has the same powers as a civil court for executing its decrees, it is not strictly bound by the Code of Civil Procedure, 1908. Instead, it is guided by the principles of natural justice and has the authority to regulate its own procedure.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Functioning as a Digital Office</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">In keeping with the Act's \"digital by design\" philosophy, the TDSAT is mandated to function as a digital office when hearing data protection cases.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Online Mechanism:</strong> The entire lifecycle of an appeal\u2014from receipt and filing to the final pronouncement of decisions\u2014is intended to be conducted in an online or digital mode.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Techno-Legal Measures:</strong> The Tribunal may adopt specific techno-legal measures to conduct proceedings without requiring the physical presence of the parties involved.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Digital Filing and Fees:</strong> Appeals must be filed in a digital form and accompanied by a fee equivalent to those under the TRAI Act, which must be paid via digital systems like UPI.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Enforcement and Commencement Timelines</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The legal designation of the TDSAT and its operational powers follow different implementation schedules:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Designation (<strong>Section 44</strong>(1)):</strong> The amendment to the TRAI Act that officially designates the TDSAT as the Appellate Tribunal came into force on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, the date of the government's enforcement notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Appellate Rights (<strong>Section 29</strong>):</strong> The substantive right for a person to actually file an appeal (and the corresponding procedural rules) is scheduled to come into force eighteen months after the notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Full Implementation:</strong> Consequently, while the legal framework for the Tribunal was established in late 2025, it will only become fully functional for receiving and hearing data protection appeals in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(3)",
              "title": "Orders executable as civil court decrees",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Orders executable as civil court decrees</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, orders passed by the Appellate Tribunal are granted a specific legal status to ensure their effective enforcement: they are executable as a decree of a civil court. This provision ensures that the Tribunal's decisions carry the same legal weight and compulsory force as a judgment from the traditional judiciary.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Authority and Powers of Execution</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">To facilitate the enforcement of its decisions, the Act provides the Appellate Tribunal with the necessary legal machinery:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Direct Execution:</strong> The Appellate Tribunal has the authority to execute its own orders directly, and for this specific purpose, it is vested with all the powers of a civil court.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Transmission to Local Courts:</strong> Alternatively, the Tribunal may choose to transmit its order to a civil court having local jurisdiction. In such cases, the local civil court is required to execute the order as if it were a decree made by that court itself.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Context within the Regulatory Framework</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The status of these orders as civil decrees is a cornerstone of the Act's specialized adjudicatory process:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Designated Tribunal:</strong> The \"Appellate Tribunal\" refers to the Telecom Disputes Settlement and Appellate Tribunal (TDSAT).</li>\n<li style=\"margin-bottom: 4px;\"><strong>Procedural Flexibility:</strong> While its orders are treated as civil decrees, the Tribunal itself is not bound by the strict procedure laid down by the Code of Civil Procedure, 1908. Instead, it is guided by the principles of natural justice and has the power to regulate its own procedure.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Digital Operations:</strong> The Tribunal is mandated to function as a digital office, utilizing \"techno-legal measures\" to conduct proceedings\u2014such as receiving appeals and pronouncing decisions\u2014without requiring the physical presence of the parties.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Bar of Jurisdiction:</strong> To protect the integrity of this framework, no other civil court has the jurisdiction to entertain suits or proceedings regarding matters that the Board or the Appellate Tribunal are empowered to handle. No injunctions can be granted by any other court against actions taken under the Act.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The legal mandate for the execution of these orders is subject to the Act's staggered commencement schedule:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Wait Period:</strong> The provision establishing the executability of orders (<strong>Section 30</strong>) is scheduled to come into force eighteen months after the initial enforcement notification was published on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, the formal legal power to execute the Tribunal's orders as civil court decrees will become active in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            }
          ]
        }
      ]
    },
    {
      "chapter_number": "6",
      "title": "Enforcement and Penalties",
      "section": [
        {
          "section_number": "6.1",
          "title": "Monetary Penalties",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "Based on nature and gravity of breach",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Based on nature and gravity of breach</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the \"nature, gravity, and duration of the breach\" is a primary statutory factor that the Data Protection Board of India must consider when determining the amount of a monetary penalty. This ensures that penalties are not arbitrary but are instead tailored to the specific circumstances of each violation.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Determination of Penalties (<strong>Section 33</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Board is empowered to impose monetary penalties specified in the Schedule of the Act if it determines, following an inquiry, that a person has committed a significant breach of the Act or its rules.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Statutory Factors for Assessment</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to <strong>Section 33</strong>(2), while determining the specific amount of a penalty, the Board must have regard to the following matters:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Nature, Gravity, and Duration:</strong> The Board evaluates how severe the breach was, the specific way it occurred, and how long the non-compliance lasted.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Data Characteristics:</strong> The Board considers the type and nature of the personal data affected by the breach (e.g., whether it involved highly sensitive information).</li>\n<li style=\"margin-bottom: 4px;\"><strong>Recidivism:</strong> Whether the breach is of a repetitive nature.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Financial Impact:</strong> Whether the person realized a financial gain or avoided a loss as a result of the breach.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Mitigation Efforts:</strong> The timeliness and effectiveness of any actions taken by the person to mitigate the effects and consequences of the breach.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effectiveness and Proportionality:</strong> The Board ensures the penalty is proportionate while remaining effective enough to secure observance and deter future breaches.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Impact on the Person:</strong> The likely overall impact of the penalty on the individual or entity.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Maximum Penalty Caps (The Schedule)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The \"nature and gravity\" of the breach are assessed against the maximum limits provided in the Act\u2019s Schedule:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Security Failures:</strong> For failing to take reasonable security safeguards to prevent a data breach, the penalty may extend to two hundred and fifty crore rupees.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Children\u2019s Data:</strong> For breaches of additional obligations in relation to children, the penalty can reach two hundred crore rupees.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Notification Failures:</strong> For failing to notify the Board or affected Data Principals of a breach, the penalty may extend to two hundred crore rupees.</li>\n<li style=\"margin-bottom: 4px;\"><strong>General Breaches:</strong> For other breaches of the Act or its Rules, the penalty may extend to fifty crore rupees.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Procedural Requirements</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Board cannot impose these penalties without following specific legal procedures:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Natural Justice:</strong> The person concerned must be given an opportunity of being heard before a penalty is finalized.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Record of Reasons:</strong> The Board is required to record its reasons in writing for its actions and findings during and after an inquiry.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Credit to Fund:</strong> All sums realized through these penalties are credited to the Consolidated Fund of India.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">While the Data Protection Board was established in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 2025</u>, the substantive powers to impose these penalties are subject to a staggered commencement. The sections governing penalties (<strong>Section 33</strong>) and the corresponding Schedule are scheduled to come into force eighteen months after the initial notification, making them legally enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></div>"
            },
            {
              "clause_number": "(2)",
              "title": "Consideration of gain or avoided loss",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Consideration of gain or avoided loss</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the consideration of gain realized or loss avoided is a mandatory statutory factor that the Data Protection Board of India must evaluate when determining the appropriate amount for a monetary penalty. This requirement ensures that penalties are economically meaningful and prevent entities from profiting from non-compliance.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Definitions of Gain and Loss</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act provides specific legal definitions to ensure clarity in how financial advantages or disadvantages are calculated:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Gain:</strong> This includes a gain in property or the supply of services (whether temporary or permanent), as well as an opportunity to earn remuneration, greater remuneration, or any financial advantage beyond what is considered legitimate.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Loss:</strong> This is defined as a loss in property or an interruption in the supply of services, or the loss of an opportunity to earn remuneration or gain a financial advantage through legitimate means.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Role in Penalty Determination</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to <strong>Section 33</strong>(2)(d), when the Board concludes an inquiry and determines that a significant breach has occurred, it must consider whether the person realized a gain or avoided a loss as a direct result of that breach. This factor is assessed alongside other critical elements, including:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">The nature, gravity, and duration of the breach.</li>\n<li style=\"margin-bottom: 4px;\">The type and nature of personal data affected.</li>\n<li style=\"margin-bottom: 4px;\">The repetitive nature of the breach.</li>\n<li style=\"margin-bottom: 4px;\">The timeliness and effectiveness of mitigation actions taken by the person.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Strategic Purpose: Deterrence and Proportionality</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The inclusion of gain and avoided loss in the calculation is linked to the Board's broader mandate to ensure that penalties are proportionate and effective. By looking at the financial outcomes of a breach, the Board aims to:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Secure Observance:</strong> Ensure that the cost of the penalty outweighs any potential financial benefit gained by ignoring the law.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Deter Future Breaches:</strong> Discourage the person and others in the industry from viewing data breaches as a manageable \"cost of doing business\".</li>\n<li style=\"margin-bottom: 4px;\"><strong>Assess Likely Impact:</strong> Understand the overall economic effect the penalty will have on the specific individual or entity.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Impact on Penalty Scales</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The assessment of financial gain or avoided loss occurs within a framework of high maximum penalties specified in The Schedule:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">For failing to take reasonable security safeguards (often the source of financial \"avoided loss\" through underinvestment in security), penalties can reach two hundred and fifty crore rupees.</li>\n<li style=\"margin-bottom: 4px;\">General breaches of the Act can result in penalties of up to fifty crore rupees.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Board's authority to evaluate these financial factors and impose penalties under <strong>Section 33</strong> is subject to a staggered commencement. According to the notification issued on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, these provisions are scheduled to come into force eighteen months later, meaning they will be legally active and enforceable in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></div>"
            },
            {
              "clause_number": "(3)",
              "title": "Credited to Consolidated Fund of India",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Credited to Consolidated Fund of India</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the requirement that penalties be credited to the Consolidated Fund of India serves as the final step in the statutory enforcement process, ensuring that fines collected for data protection violations are treated as central government revenue.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. The Statutory Mandate (<strong>Section 34</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act provides a clear and singular directive regarding the financial proceeds of enforcement actions. According to <strong>Section 34</strong>, \"all sums realised by way of penalties imposed by the Board under this Act, shall be credited to the Consolidated Fund of India\". This means that the Data Protection Board of India (DPBI) does not retain the funds it collects from fines; instead, they are deposited into the primary account of the Government of India.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Context of Monetary Penalties</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">These funds originate from the Board's power to impose penalties following an inquiry into a significant breach of the Act or its rules. The amounts directed to the Consolidated Fund can be substantial, based on the maximum caps set in The Schedule:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Security Safeguards:</strong> Up to two hundred and fifty crore rupees for failing to prevent a data breach.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Children\u2019s Data & Notifications:</strong> Up to two hundred crore rupees for failing to protect minors or failing to notify the Board/individuals of a breach.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Significant Data Fiduciary Obligations:</strong> Up to one hundred and fifty crore rupees.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Distinction from State \"Public Funds\"</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The sources also reference the Consolidated Fund of India in a separate context involving the processing of personal data for subsidies and benefits. When the State provides services using \"public funds,\" it includes expenditure from the Consolidated Fund of India or the Consolidated Fund of a State. This highlights the Fund\u2019s dual role in the Act: as the recipient of penalty revenue and as the source of funding for government programs that justify certain data processing activities.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Procedural Safeguards</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Before any sum is realized and credited to the Fund, the Board must observe the principles of natural justice. This includes:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Providing the concerned person an opportunity of being heard.</li>\n<li style=\"margin-bottom: 4px;\">Considering factors such as the nature, gravity, and duration of the breach.</li>\n<li style=\"margin-bottom: 4px;\">Determining if the person realized a financial gain or avoided a loss.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The provision for crediting penalties to the Consolidated Fund (<strong>Section 34</strong>) is not yet active. According to the enforcement notification issued on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, this section is subject to a staggered commencement.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Implementation Date:</strong> <strong>Section 34</strong> is scheduled to come into force eighteen months after the notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, the requirement to credit penalties to the Consolidated Fund will be formally and legally enforceable starting in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            }
          ]
        },
        {
          "section_number": "6.2",
          "title": "Exemptions",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "Legal rights enforcement",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Legal rights enforcement</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the processing of personal data for the purpose of enforcing any legal right or claim is granted a significant exemption from the majority of the Act's core obligations and rights framework. This ensures that the legal system and the assertion of rights are not hindered by strict data protection compliance requirements.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. The Scope of the Exemption (<strong>Section 17</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to <strong>Section 17</strong>(1)(a), the provisions of Chapter II (Obligations of Data Fiduciary), Chapter III (Rights and Duties of Data Principal), and <strong>Section 16</strong> (Transfer of personal data outside India) shall not apply where the processing of personal data is necessary for enforcing any legal right or claim.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">This means that when an entity is processing data to establish, exercise, or defend a legal position, it is generally exempt from:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Notice and Consent Requirements:</strong> The need to provide notice or obtain affirmative consent before processing.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Data Principal Rights:</strong> The individual's rights to access, correction, erasure, or grievance redressal regarding that specific data.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Cross-Border Transfer Restrictions:</strong> The Central Government\u2019s power to restrict the transfer of personal data to certain countries or territories.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Retained Obligations</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">While the exemption is broad, it is not absolute. Even when processing data to enforce legal rights, Data Fiduciaries must still comply with two critical \"General Obligations\" under <strong>Section 8</strong>:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Ultimate Responsibility (<strong>Section 8</strong>(1)):</strong> The Data Fiduciary remains responsible for complying with the Act for any processing undertaken by it or on its behalf by a Data Processor.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Security Safeguards (<strong>Section 8</strong>(5)):</strong> The fiduciary must protect the personal data in its possession by taking reasonable security safeguards to prevent personal data breaches.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. The Larger Context of Exemptions</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The \"legal right\" exemption sits within a category of \"Special Provisions\" designed for situations where the public interest or the functionality of the State takes precedence over individual data rights. This category includes processing necessary for:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Judicial and Quasi-Judicial Functions:</strong> Processing by courts, tribunals, or regulatory bodies entrusted with judicial or supervisory functions.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Prevention and Investigation of Offences:</strong> Processing in the interest of preventing, detecting, or investigating any offence or law contravention in India.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Financial Defaults:</strong> Processing to ascertain the financial information, assets, and liabilities of a person who has defaulted on a loan from a financial institution.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Corporate Restructuring:</strong> Processing for schemes of merger, amalgamation, or demerger approved by a competent authority.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to the government notification issued on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, the provisions governing these exemptions are subject to a staggered commencement.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Commencement Period:</strong> <strong>Section 17</strong> is scheduled to come into force eighteen months after the notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, the exemption for enforcing legal rights and claims will be formally and legally operational starting in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(2)",
              "title": "Judicial or quasi-judicial functions",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Judicial or quasi-judicial functions</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the processing of personal data for the performance of judicial or quasi-judicial functions is granted a broad exemption from many of the Act's substantive requirements. This ensures that courts, tribunals, and other legal bodies can discharge their duties without the procedural constraints typically imposed on Data Fiduciaries.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Scope of the Exemption (<strong>Section 17</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to <strong>Section 17</strong>(1)(b), the Act\u2019s primary obligations and rights frameworks do not apply to the processing of personal data by any court, tribunal, or other body in India entrusted by law with the performance of any judicial, quasi-judicial, regulatory, or supervisory function.</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">This exemption is conditional: the processing must be necessary for the performance of the specific function.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Extent of the Exemptions</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">When a body is performing a judicial or quasi-judicial function, it is exempt from the following:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Chapter II (Obligations of Data Fiduciary):</strong> This includes requirements for notice, consent, and most general obligations.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Chapter III (Rights and Duties of Data Principal):</strong> Individuals cannot exercise rights such as the right to access, correction, or erasure against data being processed for these functions.</li>\n<li style=\"margin-bottom: 4px;\"><strong><strong>Section 16</strong> (Transfer of personal data outside India):</strong> The restrictions on cross-border data transfers do not apply in this context.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Retained Obligations</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Despite the broad nature of the exemption, judicial and quasi-judicial bodies are not exempt from two fundamental \"General Obligations\" under <strong>Section 8</strong>:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Responsibility for Processing (<strong>Section 8</strong>(1)):</strong> The entity remains legally responsible for complying with the Act for any processing it undertakes or that is undertaken on its behalf.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Security Safeguards (<strong>Section 8</strong>(5)):</strong> The entity must protect the personal data in its possession by taking reasonable security safeguards to prevent personal data breaches.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Context within the Regulatory Framework</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The DPDP Act establishes two primary bodies that function in a quasi-judicial capacity:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Data Protection Board of India (DPBI):</strong> In performing its functions, such as conducting inquiries, the Board is vested with the same powers as a civil court regarding summoning witnesses and receiving evidence.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Appellate Tribunal (TDSAT):</strong> Designated as the Appellate Tribunal, it has the power to confirm, modify, or set aside Board orders and operates as a quasi-judicial body guided by the principles of natural justice.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The exemption ensures these bodies can process evidence and personal data during the course of an inquiry or appeal without needing the consent of the Data Principal involved.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The provisions governing these exemptions are subject to the Act's staggered commencement schedule.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Commencement:</strong> <strong>Section 17</strong> is scheduled to come into force eighteen months after the initial notification issued on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, the formal exemption for judicial and quasi-judicial functions will be legally active and operational starting in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(3)",
              "title": "Prevention and detection of offences",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Prevention and detection of offences</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the processing of personal data for the prevention and detection of offences is a primary ground for exemption from the Act's core obligations and individual rights. This framework ensures that law enforcement and regulatory activities are not obstructed by the standard requirements of notice, consent, and data principal access.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Core Exemption for Law Enforcement</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to <strong>Section 17</strong>(1)(c), the provisions of Chapter II (Data Fiduciary Obligations), Chapter III (Rights and Duties of Data Principals), and <strong>Section 16</strong> (Cross-border transfers) shall not apply where personal data is processed in the interest of:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Prevention, detection, investigation, or prosecution of any offence.</li>\n<li style=\"margin-bottom: 4px;\">Contravention of any law for the time being in force in India.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Under this exemption, entities (typically State agencies or fiduciaries acting under legal mandate) are not required to provide notice, obtain consent, or allow individuals to exercise rights like erasure or correction for data being used in a criminal context.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Sharing Data Between Fiduciaries</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Act provides a specific mechanism for the sharing of personal data between entities for crime-related purposes. Under <strong>Section 11</strong>(2), the restrictions that normally allow a Data Principal to see a summary of their shared data (under <strong>Section 11</strong>(1)(b) and (c)) do not apply if:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">The data is shared with another Data Fiduciary authorised by law.</li>\n<li style=\"margin-bottom: 4px;\">The sharing is pursuant to a request made in writing.</li>\n<li style=\"margin-bottom: 4px;\">The purpose is the prevention, detection, or investigation of offences or cyber incidents, or the prosecution and punishment of offences.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. State Instrumentality Exemptions</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Central Government possesses the power under <strong>Section 17</strong>(2)(a) to notify specific instrumentalities of the State to be exempt from the entire Act (with the exception of security and accountability standards). This power can be exercised in the interest of:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\">Maintenance of public order.</li>\n<li style=\"margin-bottom: 4px;\">Preventing incitement to any cognizable offence related to the sovereignty, integrity, or security of India.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Data Retention for Enforcement Purposes</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">While the Act generally requires the erasure of personal data once its purpose is served, <strong>Rule 8</strong>(3) of the DPDP Rules, 2025, establishes a mandatory retention period to assist the State.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>One-Year Retention:</strong> Data Fiduciaries must retain personal data, associated traffic data, and processing logs for a minimum of one year from the date of processing.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Purpose:</strong> This retention is specifically for the purposes outlined in the Seventh Schedule, which includes the State's use of data for functions under any law or the disclosure of information to fulfill legal obligations (such as responding to law enforcement requests).</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Retained Security Obligations</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Even when the \"prevention and detection of offences\" exemption applies, a Data Fiduciary is not exempt from the general obligations found in <strong>Section 8</strong>(1) and 8(5). They must still:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Remain Responsible:</strong> Be accountable for the processing of the data.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Ensure Security:</strong> Take reasonable security safeguards to prevent a personal data breach.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">6. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The provisions governing these exemptions and the related sharing/retention mandates are subject to the government\u2019s staggered commencement schedule.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> <strong>Section 17</strong> (Exemptions), <strong>Section 11</strong> (Sharing), and <strong>Rule 8</strong> (Retention) are all scheduled to come into force eighteen months after the <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>, notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Enforcement:</strong> These law enforcement-related exemptions will be formally and legally operational in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(4)",
              "title": "Research, archiving, or statistical purposes",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Research, archiving, or statistical purposes</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the processing of personal data for research, archiving, or statistical purposes is granted a conditional exemption from the Act's general provisions. This ensures that data-driven insights and historical preservation can continue without the full weight of standard regulatory obligations, provided specific safeguards are met.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. The Core Exemption (<strong>Section 17</strong>)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">According to <strong>Section 17</strong>(2)(b), the provisions of the Act shall not apply to the processing of personal data when it is necessary for these specific purposes. However, this exemption is strictly contingent on two factors:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>No Specific Decision-Making:</strong> The personal data must not be used to take any decision specific to a Data Principal.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Adherence to Standards:</strong> The processing must be carried out in accordance with standards prescribed by the government.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Prescribed Standards for Processing (Second Schedule)</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\"><strong>Rule 16</strong> of the DPDP Rules, 2025, specifies that for this exemption to apply, the processing must follow the technical and organizational standards laid out in the Second Schedule. These standards include:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Lawful Basis:</strong> The processing must still be carried out in a lawful manner.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Data Minimization:</strong> Processing is limited only to the personal data necessary for achieving the research, archiving, or statistical purpose.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Data Integrity:</strong> Fiduciaries must make reasonable efforts to ensure the completeness, accuracy, and consistency of the data.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Storage Limitation:</strong> Data must only be retained for as long as it is required for the specific purpose or for compliance with any law.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Security Safeguards:</strong> The entity must take reasonable security safeguards to prevent personal data breaches while the data is in its possession or control.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Accountability:</strong> The person or entity determining the purpose and means of processing remains accountable for the effective observance of these standards.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Relationship with Other Exemptions</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">This exemption is <strong>part of</strong> a broader \"Special Provisions\" chapter. It is distinct from the <strong>Section 17</strong>(1) exemptions (such as for legal rights or judicial functions), which still require compliance with core security and accountability obligations. For research, archiving, and statistics, the entire Act is exempted, provided the Second Schedule standards are maintained.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The provisions governing this exemption are subject to the government's staggered commencement schedule:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Notification Date:</strong> <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Commencement Period:</strong> Both <strong>Section 17</strong> and <strong>Rule 16</strong> are scheduled to come into force eighteen months after the date of the notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> Consequently, the formal exemption for research, archiving, and statistical purposes will be legally operational starting in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            }
          ]
        },
        {
          "section_number": "6.3",
          "title": "Miscellaneous",
          "clauses": [
            {
              "clause_number": "(1)",
              "title": "Voluntary undertakings",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Voluntary undertakings</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, a voluntary undertaking serves as a specialized legal mechanism for self-correction and alternate dispute resolution. It allows a person or entity to commit to specific compliance actions to resolve proceedings before the Data Protection Board of India (DPBI) without necessarily facing immediate penalties.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Nature and Scope of Voluntary Undertakings</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Board has the authority to accept a voluntary undertaking from any person regarding their observance of the Act\u2019s provisions.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Timing:</strong> An undertaking can be proposed and accepted at any stage of a proceeding conducted by the Board.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Content:</strong> The undertaking may include a commitment to take specific actions within a determined timeframe, refrain from certain actions, or even publicize the undertaking itself to ensure transparency.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Variation:</strong> Once accepted, the terms of the undertaking can be varied by the Board, provided the person who gave the undertaking consents to the changes.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Legal Effect: A Bar on Proceedings</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The most significant incentive for offering a voluntary undertaking is its legal finality.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Cessation of Action:</strong> The acceptance of a voluntary undertaking by the Board constitutes a bar on further proceedings under the Act regarding the specific contents and issues covered by that undertaking.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Exception for Non-Compliance:</strong> This bar is only lifted if the person fails to adhere to the agreed-upon terms.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Consequences of Breach</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Failure to comply with a voluntary undertaking is treated with extreme gravity under the Act.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Deemed Breach of the Act:</strong> If a person fails to adhere to any term of an accepted undertaking, that failure is legally deemed to be a breach of the provisions of the Act itself.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Resumption of Inquiry:</strong> Following such a failure, the Board\u2014after giving the person an opportunity to be heard\u2014may proceed with an inquiry and impose penalties.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Monetary Penalties:</strong> Under the Schedule of the Act, the penalty for breaching an undertaking can extend up to the amount applicable for the original breach that triggered the initial proceedings.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. The \"Miscellaneous\" Regulatory Context</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Voluntary undertakings are supported by several \"Miscellaneous\" provisions (Chapter IX) that ensure the Board's decisions are final and protected:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Bar of Jurisdiction (<strong>Section 39</strong>):</strong> No civil court has the jurisdiction to entertain suits or proceedings regarding matters for which the Board is empowered, including the acceptance and enforcement of voluntary undertakings.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Protection of Good Faith (<strong>Section 35</strong>):</strong> No legal proceedings can be initiated against the Board or its members for any action taken, such as accepting or varying an undertaking, if it was done in good faith under the Act.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Power to Call for Information (<strong>Section 36</strong>):</strong> The Central Government retains the power to require the Board to furnish information regarding its proceedings, which would include the status of voluntary undertakings.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Enforcement and Implementation</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The provisions governing voluntary undertakings are <strong>part of</strong> the Act's broader adjudicatory framework and follow a specific commencement timeline.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Notification Date:</strong> <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> <strong>Section 32</strong> (Voluntary Undertaking) and the corresponding penalty provisions in the Schedule are scheduled to come into force eighteen months after the notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Full Operation:</strong> Consequently, the mechanism for voluntary undertakings will be legally active and available for use starting in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(2)",
              "title": "Alternate dispute resolution via mediation",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Alternate dispute resolution via mediation</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, alternate dispute resolution (ADR) through mediation is established as a key mechanism for resolving complaints outside of formal inquiries and penalties. While mediation is formally detailed in Chapter VII (<strong>Section 31</strong>), it operates within the broader regulatory environment defined by the \"Miscellaneous\" provisions of the Act.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. Authority to Direct Mediation</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Data Protection Board of India (DPBI) serves as the primary gateway for mediation:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Board Discretion:</strong> If the Board believes a complaint can be resolved through mediation, it has the power to direct the concerned parties to attempt a resolution through this method.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Selection of Mediator:</strong> The parties involved may mutually agree upon a mediator, or the process can follow existing mediation laws currently in force in India.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Interaction with Miscellaneous Provisions</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The effectiveness of the mediation process is supported by several \"Miscellaneous\" (Chapter IX) and procedural mandates:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Bar of Jurisdiction (<strong>Section 39</strong>):</strong> The Act explicitly bars civil courts from entertaining any suit or proceeding that the Board is empowered to handle. This ensures that mediation and the Board's subsequent processes remain the primary channels for dispute resolution, preventing parties from bypassing the ADR mechanism for traditional litigation.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Protection of Action Taken in Good Faith (<strong>Section 35</strong>):</strong> The Board and its members are protected from legal proceedings for any actions taken in \"good faith\" while discharging their duties. This includes the Board's decision to refer a matter to mediation rather than proceeding with a formal inquiry.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Exhaustion of Grievance Redressal:</strong> Before a Data Principal can approach the Board\u2014which might then lead to a mediation referral\u2014they are legally required to exhaust the opportunity of redressing their grievance through the Data Fiduciary\u2019s or Consent Manager\u2019s own internal mechanism.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. The Adjudicatory Alternative</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Mediation serves as a flexible alternative to the Board's more rigid powers:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Alternative to Inquiry:</strong> It provides a path to resolution before the Board initiates a full inquiry under <strong>Section 28</strong>, which involves civil court powers like summoning witnesses or inspecting documents.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Avoidance of Penalties:</strong> Successfully resolved mediation prevents the imposition of significant monetary penalties, which can otherwise extend up to two hundred and fifty crore rupees for major breaches.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Implementation Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The legal framework for mediation is subject to the Act\u2019s staggered commencement:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Notification Date:</strong> The Central Government issued the enforcement notification on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> <strong>Section 31</strong> (Alternate dispute resolution) is scheduled to come into force eighteen months after that notification.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Full Enforcement:</strong> Consequently, the Board\u2019s power to formally direct parties to mediation will become legally operational in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            },
            {
              "clause_number": "(3)",
              "title": "Power to block access to information",
              "content": "<strong style=\"display:block; margin-bottom:6px;\">Power to block access to information</strong><div style=\"margin-bottom: 8px; line-height: 1.6;\">Under the Digital Personal Data Protection (DPDP) Act, 2023, the Central Government is granted the specific power to block public access to information associated with a Data Fiduciary. This authority, found in <strong>Section 37</strong> within the \"Miscellaneous\" chapter, represents a high-level enforcement mechanism for addressing persistent violations of the Act.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">1. The Trigger: Recidivism and Board Advice</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The power to block access is not exercised arbitrarily; it requires a formal written reference from the Data Protection Board of India. The Board can issue this advice only under specific conditions:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Repeated Violations:</strong> The Board must have imposed a monetary penalty on the Data Fiduciary in two or more instances.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Public Interest:</strong> The Board must advise that blocking is necessary in the interests of the general public.</li>\n</ul>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The scope of this power targets information generated, transmitted, received, stored, or hosted in any computer resource that enables the Data Fiduciary to carry out activities related to offering goods or services to Data Principals within India.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">2. Procedural Safeguards and Government Mandate</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The Central Government (or its specifically authorized officers) must follow strict procedural steps before issuing a blocking order:</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Opportunity to be Heard:</strong> The Data Fiduciary in question must be given an opportunity of being heard.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Determination of Necessity:</strong> The Government must be satisfied that the action is necessary or expedient in the interests of the general public.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Recorded Reasons:</strong> The final order must be issued in writing, and the reasons for the decision must be recorded.</li>\n</ul>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">3. Implementation through Intermediaries</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">Once the Government decides to proceed, it directs a government agency or an intermediary to block the information. The Act explicitly states that every intermediary\u2014such as an internet service provider or hosting service\u2014that receives such a direction is legally bound to comply. Failure to follow these directions could potentially lead to further inquiries and penalties by the Board.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">4. Legal Context and Definitions</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The framework for blocking access is designed to be consistent with existing technology laws. The expressions \"computer resource,\" \"information,\" and \"intermediary\" carry the same legal meanings as defined in the Information Technology Act, 2000. Additionally, the provisions of the DPDP Act are meant to be in addition to, and not in derogation of, any other laws currently in force.</div>\n<div style=\"font-weight: bold; margin-top: 12px; margin-bottom: 4px;\">5. Enforcement Timeline</div>\n<div style=\"margin-bottom: 8px; line-height: 1.6;\">The government's power to issue blocking orders follows the Act's staggered commencement schedule.</div>\n<ul style=\"margin-left: 1.5rem; list-style-type: square; margin-top: 8px; margin-bottom: 8px; line-height: 1.6;\">\n<li style=\"margin-bottom: 4px;\"><strong>Commencement Period:</strong> <strong>Section 37</strong> is scheduled to come into force eighteen months after the initial notification published on <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">November 13, 2025</u>.</li>\n<li style=\"margin-bottom: 4px;\"><strong>Effective Date:</strong> As a result, the formal authority to block access to information for recidivist Data Fiduciaries will become legally active in <u style=\"text-decoration: underline; text-underline-offset: 2px; text-decoration-color: #A0A090;\">May 2027</u></li>\n</ul>"
            }
          ]
        }
      ]
    }
  ]
};;

        // DOM elements
        const tocList = document.getElementById('tocList');
        const documentView = document.getElementById('documentView');
        const searchInput = document.getElementById('searchInput');
        const expandAllBtn = document.getElementById('expandAllBtn');
        const collapseAllBtn = document.getElementById('collapseAllBtn');

        // Mindmap modal
        const mindmapOverlay = document.getElementById('mindmapOverlay');
        const mindmapBtn = document.getElementById('mindmapBtn');
        const mindmapCloseBtn = document.getElementById('mindmapCloseBtn');
        mindmapBtn.addEventListener('click', () => mindmapOverlay.classList.add('open'));
        mindmapCloseBtn.addEventListener('click', () => mindmapOverlay.classList.remove('open'));
        mindmapOverlay.addEventListener('click', (e) => { if (e.target === mindmapOverlay) mindmapOverlay.classList.remove('open'); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') mindmapOverlay.classList.remove('open'); });

        // Render functions
        function renderApp() {
            renderTOC();
            renderDocument();
            setupEventListeners();
        }

        /* ── Helper functions for deep TOC ────────────────────── */
        function toRoman(num) {
            const map = {1: 'I', 2: 'II', 3: 'III', 4: 'IV', 5: 'V', 6: 'VI', 7: 'VII', 8: 'VIII', 9: 'IX'};
            return map[num] || num;
        }
        function sanitizeId(str) { return str.replace(/[^a-zA-Z0-9]/g, '').toLowerCase(); }
        function makeClauseId(secNum, clauseNum) { return 'sec-' + secNum + '-cl-' + sanitizeId(clauseNum); }
        function makeSubClauseId(secNum, clauseNum, subNum) { return 'sec-' + secNum + '-cl-' + sanitizeId(clauseNum) + '-sub-' + sanitizeId(subNum); }
        function makeSubSubClauseId(secNum, clauseNum, subNum, subSubNum) { return 'sec-' + secNum + '-cl-' + sanitizeId(clauseNum) + '-sub-' + sanitizeId(subNum) + '-ss-' + sanitizeId(subSubNum); }

        const STOP_WORDS = new Set([
            "a", "an", "the", "and", "or", "but", "if", "because", "as", "what",
            "when", "where", "how", "why", "who", "whom", "this", "that", "these",
            "those", "am", "is", "are", "was", "were", "be", "been", "being",
            "have", "has", "had", "do", "does", "did", "to", "from", "in", "out",

        function generateKeyword(text) {
            const cleanText = text.replace(/[^a-zA-Z\s]/g, ' ').toLowerCase();
            const words = cleanText.split(/\s+/);
            
            for (let word of words) {
                if (word.length > 2 && !STOP_WORDS.has(word)) {
                    return word.charAt(0).toUpperCase() + word.slice(1);
                }
            }
            return "Provision";
        }

        function extractClauseLabel(cl, secNum) {
            if (cl.title) return cl.title;
            if (secNum === '2') {
                const m = cl.content.match(/[\u201c"\u201e"\u00ab]([^\u201d"\u201c\u00bb]+)[\u201d"\u201c\u00bb]/);
                if (m) return m[1];
            }
            return generateKeyword(cl.content);
        }

        function extractSubClauseLabel(sub, secNum) {
            if (sub.title) return sub.title;
            if (secNum === '2') {
                const m = sub.content.match(/[\u201c"\u201e"\u00ab]([^\u201d"\u201c\u00bb]+)[\u201d"\u201c\u00bb]/);
                if (m) return m[1];
            }
            return generateKeyword(sub.content);
        }

        function navigateToClause(chapterNum, sectionNum, clauseId) {
            const chCard = document.getElementById('chapter-' + chapterNum);
            if (chCard) chCard.classList.remove('collapsed');
            const secEl = document.getElementById('section-' + sectionNum);
            if (secEl) secEl.classList.remove('collapsed');
            const clEl = document.getElementById(clauseId);
            if (clEl) {
                clEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                clEl.classList.add('clause-pulse');
                setTimeout(() => clEl.classList.remove('clause-pulse'), 2200);
            }

        function renderTOC() {
            tocList.innerHTML = '';
            actData.chapter.forEach(ch => {
                if (ch.chapter_number === 0) return;
                
                const group = document.createElement('div');
                group.className = 'toc-chapter-group';
                
                const chBtn = document.createElement('button');
                chBtn.className = 'toc-chapter-btn';
                chBtn.innerHTML = `<span class="toc-ch-num">${toRoman(ch.chapter_number)}</span><span class="toc-ch-label">${ch.title}</span><svg class="toc-ch-arrow" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>`;
                chBtn.addEventListener('click', () => group.classList.toggle('open'));
                group.appendChild(chBtn);
                
                const secList = document.createElement('ul');
                secList.className = 'toc-section-list';
                
                if (ch.section) {
                    ch.section.forEach(sec => {
                        const secLi = document.createElement('li');
                        const hasClauses = sec.clauses && sec.clauses.length > 0;
                        
                        const secGroup = document.createElement('div');
                        secGroup.className = 'toc-section-group';
                        
                        const secLink = document.createElement('span');
                        secLink.className = 'toc-section-link';
                        secLink.innerHTML = `<span class="toc-sec-num">${sec.section_number}.</span><span class="toc-sec-label">${sec.title}</span>${hasClauses ? '<svg class="toc-sec-arrow" width="8" height="8" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>' : ''}`;
                        
                        secLink.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (hasClauses) {
                                secGroup.classList.toggle('sec-open');
                            }
                            const chCard = document.getElementById('chapter-' + ch.chapter_number);
                            if (chCard) chCard.classList.remove('collapsed');
                            const secEl = document.getElementById('section-' + sec.section_number);
                            if (secEl) {
                                secEl.classList.remove('collapsed');
                                secEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }
                        });
                        
                        secGroup.appendChild(secLink);

                        if (hasClauses) {
                            const clauseList = document.createElement('ul');
                            clauseList.className = 'toc-clause-list';
                            
                            sec.clauses.forEach(cl => {
                                const clLi = document.createElement('li');
                                const clLink = document.createElement('span');
                                clLink.className = 'toc-clause-link';
                                
                                const label = extractClauseLabel(cl, sec.section_number);
                                clLink.innerHTML = `<span class="toc-cl-num">${cl.clause_number}</span><span class="toc-cl-label">${label}</span>`;
                                
                                const clauseId = makeClauseId(sec.section_number, cl.clause_number);
                                
                                clLink.addEventListener('click', (e) => {
                                    e.stopPropagation();
                                    navigateToClause(ch.chapter_number, sec.section_number, clauseId);
                                });
                                
                                clLi.appendChild(clLink);

                                // Render sub-clauses if they exist
                                if (cl.sub_clauses && cl.sub_clauses.length > 0) {
                                    const subClauseList = document.createElement('ul');
                                    subClauseList.className = 'toc-clause-list'; // Reuse styles
                                    subClauseList.style.marginLeft = '12px'; // slightly indent
                                    subClauseList.style.maxHeight = 'none'; // Prevent being hidden by default CSS
                                    
                                    cl.sub_clauses.forEach(sub => {
                                        const subLi = document.createElement('li');
                                        const subLink = document.createElement('span');
                                        subLink.className = 'toc-clause-link';

                                        const subClauseId = makeSubClauseId(sec.section_number, cl.clause_number, sub.sub_clause_number);

                        }

                tocList.appendChild(group);
            });

        function renderClause(cl, secNum) {
            const div = document.createElement('div');
            div.className = 'clause-node';
            if (secNum) {
                div.id = makeClauseId(secNum, cl.clause_number);
            }

            const header = document.createElement('div');
            header.className = 'clause-header';
            header.innerHTML = `
                <span class="clause-num">${cl.clause_number}</span>
                <span class="clause-content">${cl.content}</span>
            `;
            div.appendChild(header);

            const body = document.createElement('div');
            body.className = 'clause-body';

            let hasChildren = false;

            if (cl.illustrations) {
                hasChildren = true;
                cl.illustrations.forEach(illus => {
                    body.appendChild(renderIllustration(illus));
                });
            }

            if (cl.sub_clauses) {
                hasChildren = true;
                cl.sub_clauses.forEach(sub => {
                    const subDiv = document.createElement('div');
                    subDiv.className = 'clause-node sub-clause-node';
                    if (secNum) {
                        subDiv.id = makeSubClauseId(secNum, cl.clause_number, sub.sub_clause_number);
                    }
                    
                    const subHeader = document.createElement('div');
                    subHeader.className = 'clause-header';
                    subHeader.innerHTML = `
                        <span class="clause-num sub-clause-num">${sub.sub_clause_number}</span>
                        <span class="clause-content">${sub.content}</span>
                    `;
                    subDiv.appendChild(subHeader);

                    const subBody = document.createElement('div');
                    subBody.className = 'clause-body';
                    
                    let subHasChildren = false;
                    
                    if (sub.illustrations) {
                        subHasChildren = true;
                        sub.illustrations.forEach(illus => {
                            subBody.appendChild(renderIllustration(illus));
                        });
                    }

                    if (sub.sub_sub_clauses) {
                        subHasChildren = true;
                        sub.sub_sub_clauses.forEach(subSub => {
                            const subSubDiv = document.createElement('div');
                            subSubDiv.className = 'clause-node sub-sub-clause-node';
                            if (secNum) {
                                subSubDiv.id = makeSubSubClauseId(secNum, cl.clause_number, sub.sub_clause_number, subSub.sub_sub_clause_number);
                            }
                            subSubDiv.innerHTML = `
                                <div class="clause-header">

                                    <span class="clause-content">${subSub.content}</span>
                                </div>
                            `;
                            subBody.appendChild(subSubDiv);
                        });
                    }

                    if (subHasChildren) {
                        subDiv.appendChild(subBody);
                    }
                    body.appendChild(subDiv);
                });
            }

            if (hasChildren) {
                div.appendChild(body);
            }

            return div;
        }
