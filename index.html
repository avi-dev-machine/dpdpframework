        function collectClauseText(clauses) {
            let text = '';
            clauses.forEach(c => {
                text += ` ${c.clause_number} ${c.content}`;
                if (c.illustrations) text += ' ' + c.illustrations.join(' ');
                if (c.sub_clauses) {
                    c.sub_clauses.forEach(s => {
                        text += ` ${s.sub_clause_number} ${s.content}`;
                        if (s.illustrations) text += ' ' + s.illustrations.join(' ');
                        if (s.sub_sub_clauses) {
                            s.sub_sub_clauses.forEach(ss => {
                                text += ` ${ss.sub_sub_clause_number} ${ss.content}`;
                            });
                        }
                    });
                }
            });
            return text.toLowerCase();
        }

        function highlightText(element, query) {
            // Simple text highlighting walker
            const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            while(walker.nextNode()) textNodes.push(walker.currentNode);

            textNodes.forEach(node => {
                const parent = node.parentNode;
                if (parent.classList.contains('highlight') || parent.tagName === 'SCRIPT' || parent.tagName === 'STYLE') return;
                
                const text = node.nodeValue;
                const lowerText = text.toLowerCase();
                const index = lowerText.indexOf(query);
                
                if (index !== -1) {
                    const span = document.createElement('span');
                    span.className = 'highlight-container';
                    
                    let lastIdx = 0;
                    let idx = lowerText.indexOf(query, lastIdx);
                    
                    const fragment = document.createDocumentFragment();
                    
                    while (idx !== -1) {
                        fragment.appendChild(document.createTextNode(text.substring(lastIdx, idx)));
                        const matchSpan = document.createElement('span');
                        matchSpan.className = 'highlight';
                        matchSpan.appendChild(document.createTextNode(text.substring(idx, idx + query.length)));
                        fragment.appendChild(matchSpan);
                        lastIdx = idx + query.length;
                        idx = lowerText.indexOf(query, lastIdx);
                    }
                    fragment.appendChild(document.createTextNode(text.substring(lastIdx)));
                    parent.replaceChild(fragment, node);
                }
            });
        }

        function removeHighlights(element) {
            const highlights = element.querySelectorAll('.highlight');
            highlights.forEach(hl => {
                const parent = hl.parentNode;
                parent.replaceChild(document.createTextNode(hl.innerText), hl);
                parent.normalize();
            });
        }

        function getChapterAndSectionForClause(secNum) {
            for (const ch of actData.chapter) {

        window.handleCitationClick = function(docType, numStr) {
            if (docType === 'act') {
                const match = numStr.match(/^(\d+)(?:\(([^)]+)\))?(?:\(([^)]+)\))?/);
                if (match) {
                    const secNum = match[1];
                    const clauseNum = match[2];
                    const subNum = match[3];
                    
                    const info = getChapterAndSectionForClause(secNum);
                    if (info) {
                        const chNum = info.chapter_number;
                        if (clauseNum) {
                            let clauseId = makeClauseId(secNum, '(' + clauseNum + ')');
                            if (subNum) {
                                clauseId = makeSubClauseId(secNum, '(' + clauseNum + ')', '(' + subNum + ')');
                            }
                            navigateToClause(chNum, secNum, clauseId);
                        } else {
                            navigateToClause(chNum, secNum, 'section-' + secNum);
                        }
                        return;
                    }
                }
            } else if (docType === 'rules') {
                alert("Rule citation: " + numStr + "\nNote: The document viewer displays the DPDP Act 2023. You can read the rule details in the chatbot response.");
            }
        };

        function formatBotText(text) {
            return text
                .replace(/\[Act §([\w().,\s-]+)\]/g, (match, p1) => {
                    const cleanNum = p1.replace(/\s+/g, '');
                    return `<a class="cite" onclick="handleCitationClick('act', '${cleanNum}')">${match}</a>`;
                })
                .replace(/\[Rules r\.([\w().,\s-]+)\]/g, (match, p1) => {
                    const cleanNum = p1.replace(/\s+/g, '');
                    return `<a class="cite" onclick="handleCitationClick('rules', '${cleanNum}')">${match}</a>`;
                });
        }

        function appendUserMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-msg user';
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }

        function appendBotSkeleton() {
            const wrap = document.createElement('div');
            wrap.className = 'chat-bot-wrap';
            
            const metaPill = document.createElement('div');
            metaPill.className = 'meta-pill hidden';
            metaPill.innerHTML = '<div class="dot"></div><span class="meta-text">Analysing query...</span>';
            wrap.appendChild(metaPill);
            
            const refsEl = document.createElement('div');
            refsEl.className = 'refs-container';
            wrap.appendChild(refsEl);
            
            const bubbleEl = document.createElement('div');
            bubbleEl.className = 'chat-msg bot';
            bubbleEl.innerHTML = '<div class="cursor"></div>';
            wrap.appendChild(bubbleEl);
            
            chatMessages.appendChild(wrap);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return {
                metaPill,
                metaText: metaPill.querySelector('.meta-text'),
                refsEl,
                bubbleEl
            };
        }

        function renderRefs(refsEl, refs) {
            if (!refs || !refs.length) return;
            
            const panel = document.createElement('div');
            panel.className = 'refs-panel';
            panel.innerHTML = `<div class="refs-label">Wiki pages retrieved</div>`;
            
            refs.forEach(r => {
                const src = r.source === 'DPDP_Act_2023' ? 'act'
                          : r.source === 'DPDP_Rules_2025' ? 'rules' : 'syn';
                const srcLbl = r.source === 'DPDP_Act_2023' ? 'Act'
                             : r.source === 'DPDP_Rules_2025' ? 'Rules' : 'Concept';
                const barW = Math.round(r.score * 100);
                
                const item = document.createElement('div');
                item.className = 'ref-item';
                item.innerHTML = `
                    <span class="ref-src ${src}">${srcLbl}</span>
                    <div style="flex: 1; min-width: 0;">
                        <div style="font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text);">${escHtml(r.title)}</div>
                        <div class="ref-score-bar-wrap" style="margin-top: 3px;">
                            <div class="ref-score-bar" style="width: ${barW}%;"></div>
                        </div>
                    </div>
                    <span style="font-size: 10px; font-weight: 700; color: var(--accent-muted); flex-shrink: 0; margin-left: 4px;">${(r.score * 100).toFixed(0)}%</span>
                `;
                panel.appendChild(item);
            });
            
            refsEl.appendChild(panel);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function handleSend() {
            if (isStreaming) return;
            const text = chatInput.value.trim();
            if (!text) return;

            chatInput.value = '';
            isStreaming = true;
            chatSendBtn.disabled = true;

            appendUserMessage(text);

            const { metaPill, metaText, refsEl, bubbleEl } = appendBotSkeleton();

            let aiText = '';
            let textStarted = false;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history: chatHistory })
                });

                if (!response.ok) throw new Error('Server error');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const payload = line.replace('data: ', '').trim();
                        if (payload === '[DONE]') break;
                        
                        try {
                            const parsed = JSON.parse(payload);
                            if (parsed.error) {
                                bubbleEl.innerHTML = `<span style="color:var(--text-ill);">[Error: ${escHtml(parsed.error)}]</span>`;
                                textStarted = true;
                            } else if (parsed.meta) {
                                const m = parsed.meta;
                                metaText.textContent = `${m.type === 'situation' ? '📋 Situation' : '❓ Question'} · ${m.actors}`;
                                metaPill.classList.remove('hidden');
                            } else if (parsed.refs) {
                                renderRefs(refsEl, parsed.refs);
                            } else if (parsed.token !== undefined) {
                                if (!textStarted) {
                                    bubbleEl.innerHTML = '';
                                    textStarted = true;
                                }
                                aiText += parsed.token;
                                bubbleEl.innerHTML = marked.parse(formatBotText(aiText)) + '<span class="cursor"></span>';
                                chatMessages.scrollTop = chatMessages.scrollHeight;
                            }
                        } catch (e) { }
                    }
                }

                // Finalise bubble — remove cursor
                if (aiText) {
                    bubbleEl.innerHTML = marked.parse(formatBotText(aiText));
                }

                // Update history
                chatHistory.push({ role: 'user', content: text.substring(0, 200) });
                chatHistory.push({ role: 'assistant', content: aiText.substring(0, 500) });
                if (chatHistory.length > 8) chatHistory = chatHistory.slice(-8);

            } catch (err) {
                bubbleEl.innerHTML = '<span style="color:var(--text-ill);">Error connecting to Sahayak.</span>';
            }

            isStreaming = false;
            chatSendBtn.disabled = false;
            chatInput.focus();
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatSendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

    </script>
</body>
</html>
