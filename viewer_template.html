<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Personal Data Protection Framework</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* ── Theme tokens (White + Blue) ──────────────────── */
        :root {
            --bg:            #FFFFFF;
            --bg-sidebar:    #F0F4FA;
            --bg-card:       #FFFFFF;
            --bg-ill:        #EBF2FF;
            --border:        #D9E4F0;
            --accent:        #1A56DB;
            --accent-muted:  #4B83D4;
            --accent-light:  #EBF2FF;
            --accent-xlight: #F5F9FF;
            --text:          #1A1F2E;
            --text-muted:    #6B7A99;
            --text-ill:      #2D4A8A;
            --node-hl:       rgba(26, 86, 219, 0.07);
            --ui-font:       'JetBrains Mono', 'Courier New', monospace;
            --body-font:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* ── Reset ────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--body-font);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ──────────────────────────────────────── */
        .sidebar {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px 18px 14px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-sidebar);
        }

        .sidebar-header h1 {
            font-family: var(--ui-font);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 3px;
        }

        .sidebar-header p {
            font-family: var(--ui-font);
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .toc-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 10px;
            list-style: none;
        }

        .toc-item { margin-bottom: 2px; }

        .toc-link {
            display: block;
            padding: 8px 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-family: var(--ui-font);
            font-size: 11.5px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: color 0.15s, background 0.15s;
        }

        .toc-link:hover { color: var(--text); background: rgba(0,0,0,0.04); }
        [data-theme="dark"] .toc-link:hover { background: rgba(255,255,255,0.04); }
        .toc-link.active { color: var(--text); border: 1px solid var(--border); }

        /* Tree TOC */
        .toc-chapter-group { margin-bottom: 4px; }

        .toc-chapter-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 9px 12px;
            background: none;
            border: 1px solid transparent;
            color: var(--text);
            font-family: var(--ui-font);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            text-align: left;
            transition: background 0.15s, color 0.15s;
            border-radius: 4px;
        }

        .toc-chapter-btn:hover { background: var(--accent-light); color: var(--accent); }

        .toc-ch-label { flex: 1; }
        .toc-ch-num {
            font-size: 10px;
            color: var(--accent-muted);
            margin-right: 6px;
        }
        .toc-ch-arrow {
            width: 12px; height: 12px;
            flex-shrink: 0;
            transition: transform 0.2s;
            color: var(--text-muted);
        }
        .toc-chapter-group.open .toc-ch-arrow { transform: rotate(90deg); }

        .toc-section-list {
            list-style: none;
            margin: 2px 0 2px 16px;
            padding: 0;
            border-left: 1px solid var(--border);
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.25s ease;
        }
        .toc-chapter-group.open .toc-section-list { max-height: 80000px; }

        /* Section group (expandable) */
        .toc-section-group { margin-bottom: 1px; }

        .toc-section-link {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            margin: 1px 0;
            color: var(--text-muted);
            font-family: var(--ui-font);
            font-size: 11px;
            cursor: pointer;
            transition: color 0.12s;
            line-height: 1.4;
            gap: 4px;
        }
        .toc-section-link:hover { color: var(--text); }
        .toc-section-link.active { color: var(--accent); border-left: 2px solid var(--accent); margin-left: -1px; }

        .toc-sec-num {
            font-weight: 700;
            margin-right: 4px;
            opacity: 0.6;
            flex-shrink: 0;
        }
        .toc-sec-label { flex: 1; }
        .toc-sec-arrow {
            flex-shrink: 0;
            transition: transform 0.2s;
            color: var(--text-muted);
            opacity: 0.5;
        }
        .toc-section-group.sec-open > .toc-sec-arrow,
        .toc-section-group.sec-open > .toc-section-link .toc-sec-arrow { transform: rotate(90deg); }

        /* Clause list (3rd level) */
        .toc-clause-list {
            list-style: none;
            margin: 1px 0 2px 12px;
            padding: 0;
            border-left: 1px dashed var(--border);
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
        }
        .toc-section-group.sec-open > .toc-clause-list { max-height: 40000px; }

        .toc-clause-group { margin-bottom: 0; }

        .toc-clause-link {
            display: flex;
            align-items: flex-start;
            padding: 3px 8px;
            margin: 0;
            color: var(--text-muted);
            font-family: var(--ui-font);
            font-size: 10px;
            cursor: pointer;
            transition: color 0.12s, background 0.12s;
            line-height: 1.35;
            gap: 4px;
        }
        .toc-clause-link:hover { color: var(--text); background: rgba(0,0,0,0.03); }
        [data-theme="dark"] .toc-clause-link:hover { background: rgba(255,255,255,0.03); }

        .toc-cl-num {
            font-weight: 700;
            color: var(--accent-muted);
            flex-shrink: 0;
            min-width: 22px;
            opacity: 0.7;
        }
        .toc-cl-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .toc-cl-arrow {
            flex-shrink: 0;
            transition: transform 0.2s;
            color: var(--text-muted);
            opacity: 0.4;
            margin-top: 1px;
        }
        .toc-clause-group.cl-open > .toc-clause-link .toc-cl-arrow { transform: rotate(90deg); }

        /* Sub-clause list (4th level) */
        .toc-subclause-list {
            list-style: none;
            margin: 0 0 1px 10px;
            padding: 0;
            border-left: 1px dotted var(--border);
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.25s ease;
        }
        .toc-clause-group.cl-open > .toc-subclause-list { max-height: 20000px; }

        .toc-subclause-link {
            display: flex;
            align-items: flex-start;
            padding: 2px 6px;
            margin: 0;
            color: var(--text-muted);
            font-family: var(--ui-font);
            font-size: 9.5px;
            cursor: pointer;
            transition: color 0.12s, background 0.12s;
            line-height: 1.3;
            gap: 3px;
            opacity: 0.8;
        }
        .toc-subclause-link:hover { color: var(--text); opacity: 1; background: rgba(0,0,0,0.03); }
        [data-theme="dark"] .toc-subclause-link:hover { background: rgba(255,255,255,0.03); }

        .toc-sub-num {
            font-weight: 700;
            color: var(--accent-muted);
            flex-shrink: 0;
            min-width: 18px;
            opacity: 0.6;
        }
        .toc-sub-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Pulse highlight animation for scroll targets */
        @keyframes tocPulse {
            0% { background: rgba(180, 140, 60, 0.35); }
            100% { background: transparent; }
        }
        .clause-pulse {
            animation: tocPulse 2s ease-out;
        }
        [data-theme="dark"] .clause-pulse {
            animation: tocPulseDark 2s ease-out;
        }
        @keyframes tocPulseDark {
            0% { background: rgba(245, 234, 207, 0.15); }
            100% { background: transparent; }
        }

        /* ── Main area ────────────────────────────────────── */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* ── Top bar ──────────────────────────────────────── */
        .top-bar {
            padding: 0 28px;
            height: 50px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            background: #FFFFFF;
            flex-shrink: 0;
            box-shadow: 0 1px 0 var(--border);
        }

        .top-bar-left {
            flex: 1;
            display: flex;
        }

        .search-container {
            position: relative;
            flex: 0 1 420px;
            width: 100%;
        }

        .search-input {
            width: 100%;
            padding: 7px 12px 7px 34px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--ui-font);
            font-size: 11.5px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }

        .search-icon {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        /* control bar */
        .controls {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            flex: 1;
        }

        .ctrl-group {
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
        }

        .ctrl-group + .ctrl-group { margin-left: 8px; }

        .btn {
            padding: 5px 12px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: var(--ui-font);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            outline: none;
            white-space: nowrap;
            transition: color 0.15s, background 0.15s;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }
        .btn:hover { color: var(--accent); background: var(--accent-light); }
        .btn + .btn { border-left: 1px solid var(--border); border-radius: 0; }

        .btn-icon { font-size: 14px; line-height: 1; }

        .page-indicator {
            font-family: var(--ui-font);
            font-size: 10px;
            color: var(--text-muted);
            padding: 0 8px;
            white-space: nowrap;
            align-self: center;
        }

        /* ── Document area ────────────────────────────────── */
        .document-container {
            flex: 1;
            overflow-y: auto;
            padding: 48px 60px;
            scroll-behavior: smooth;
        }

        .document-view {
            max-width: 820px;
            margin: 0 auto;
            padding-bottom: 100px;
            font-size: var(--doc-size, 15px);
            line-height: 1.75;
        }

        /* ── Chapter card ─────────────────────────────────── */
        .chapter-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 28px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(26,86,219,0.04);
            transition: box-shadow 0.15s;
        }
        .chapter-card:hover { box-shadow: 0 2px 8px rgba(26,86,219,0.08); }

        .chapter-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            background: var(--accent-light);
            border-left: 4px solid var(--accent);
        }
        .chapter-header:hover { background: #dceaff; }

        .chapter-title-area h2 {
            font-family: var(--ui-font);
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .chapter-title-area h3 {
            font-family: var(--body-font);
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        .expand-icon {
            width: 22px; height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--accent-muted);
            border-radius: 4px;
            color: var(--accent-muted);
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        .collapsed .expand-icon { transform: rotate(-90deg); }

        .chapter-body {
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--bg-card);
        }
        .collapsed .chapter-body { display: none; }

        /* ── Section node ─────────────────────────────────── */
        .section-node {
            border-left: 3px solid var(--accent-muted);
            border-radius: 0 6px 6px 0;
            padding-left: 18px;
            margin-bottom: 4px;
            transition: border-color 0.15s;
        }
        .section-node:hover { border-color: var(--accent); }

        .section-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 10px 12px 10px 0;
            cursor: pointer;
            border-radius: 0 4px 4px 0;
            transition: background 0.12s;
        }
        .section-header:hover { background: var(--node-hl); }

        .section-title {
            font-family: var(--body-font);
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: 0.02em;
        }
        .section-title span {
            font-family: var(--ui-font);
            font-size: 11px;
            color: var(--accent);
            margin-right: 8px;
            font-weight: 700;
            background: var(--accent-light);
            padding: 1px 5px;
            border-radius: 3px;
        }

        .section-body {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .collapsed .section-body { display: none; }

        .intro-content {
            font-family: var(--body-font);
            font-size: 0.95em;
            line-height: 1.75;
            color: var(--text-muted);
            padding: 4px 0;
            font-style: italic;
        }

        /* ── Clause node ──────────────────────────────────── */
        .clause-node {
            border-left: 2px solid var(--border);
            border-radius: 0 4px 4px 0;
            padding-left: 14px;
            margin-left: 4px;
            padding-top: 6px;
            padding-bottom: 6px;
            transition: border-color 0.12s, background 0.12s;
        }
        .clause-node:hover {
            border-color: var(--accent-muted);
            background: var(--accent-xlight);
        }

        .clause-header {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-family: var(--body-font);
            font-size: 0.95em;
            line-height: 1.7;
            color: var(--text);
        }

        .clause-num {
            font-family: var(--ui-font);
            font-size: 10px;
            font-weight: 700;
            color: var(--accent);
            background: var(--accent-light);
            border-radius: 3px;
            padding: 2px 5px;
            min-width: 28px;
            text-align: center;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .clause-content { flex: 1; }

        .clause-body {
            margin-top: 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* ── Sub-clause ───────────────────────────────────── */
        .sub-clause-node {
            border-left: 2px dashed var(--border);
            border-radius: 0 4px 4px 0;
            padding-left: 12px;
            margin-left: 8px;
            padding-top: 4px;
            padding-bottom: 4px;
            transition: border-color 0.12s;
        }
        .sub-clause-node:hover { border-color: var(--accent-muted); }
        .sub-clause-num {
            font-family: var(--ui-font);
            font-size: 10px;
            font-weight: 700;
            color: var(--accent-muted);
            background: var(--bg-ill);
            border-radius: 3px;
            padding: 2px 4px;
            min-width: 28px;
            text-align: center;
            flex-shrink: 0;
            margin-top: 2px;
        }

        /* ── Sub-sub-clause ───────────────────────────────── */
        .sub-sub-clause-node {
            border-left: 1px dotted var(--border);
            padding-left: 12px;
            margin-left: 8px;
        }
        .sub-sub-clause-num {
            font-family: var(--ui-font);
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            min-width: 24px;
            padding-top: 2px;
            flex-shrink: 0;
        }

        /* ── Illustrations ────────────────────────────────── */
        .illustration-card {
            background: var(--bg-ill);
            border: 1px solid var(--border);
            border-left: 3px solid var(--accent);
            border-radius: 0 6px 6px 0;
            padding: 14px 18px;
            margin-top: 8px;
            margin-left: 28px;
        }

        .illustration-header {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-family: var(--ui-font);
            font-weight: 700;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 8px;
        }

        .illustration-body {
            font-family: var(--body-font);
            font-size: 0.9em;
            line-height: 1.65;
            color: var(--text-ill);
            font-style: italic;
        }

        /* ── Scrollbar ────────────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-muted); }

        /* ── Search highlight ─────────────────────────────── */
        .highlight {
            background: rgba(26, 86, 219, 0.15);
            color: var(--accent);
            padding: 0 2px;
            border-radius: 2px;
        }

        .hidden { display: none !important; }

        /* ── Sahayak Chat Panel ───────────────────────────── */
        .chat-panel {
            position: absolute;
            top: 52px;
            right: 0;
            bottom: 0;
            width: 400px;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            box-shadow: -4px 0 24px rgba(0,0,0,0.05);
        }
        [data-theme="dark"] .chat-panel {
            box-shadow: -4px 0 24px rgba(0,0,0,0.4);
        }
        .chat-panel.open {
            transform: translateX(0);
        }
        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
        }
        .chat-header h2 {
            font-family: var(--ui-font);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text);
        }
        .chat-close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }
        .chat-msg {
            font-family: var(--body-font);
            font-size: 13px;
            line-height: 1.6;
            padding: 12px 16px;
            max-width: 85%;
            border: 1px solid var(--border);
            word-wrap: break-word;
        }
        .chat-msg.user {
            align-self: flex-end;
            background: var(--bg-card);
            border-color: var(--border);
            color: var(--text);
        }
        .chat-msg.bot {
            align-self: flex-start;
            background: var(--bg-ill);
            border-color: var(--border);
            color: var(--text-ill);
        }
        .chat-msg.bot p { margin-bottom: 8px; }
        .chat-msg.bot p:last-child { margin-bottom: 0; }
        .chat-msg.bot strong { font-weight: 700; color: var(--accent); }
        .chat-msg.bot ul, .chat-msg.bot ol { margin-left: 16px; margin-bottom: 8px; }
        .chat-msg.bot li { margin-bottom: 4px; }
        .chat-input-area {
            padding: 16px;
            border-top: 1px solid var(--border);
            background: var(--bg-card);
            display: flex;
            gap: 8px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--ui-font);
            font-size: 12px;
            outline: none;
        }
        .chat-input-area input:focus {
            border-color: var(--accent);
        }
        .chat-btn {
            padding: 0 16px;
            background: var(--text);
            color: var(--bg);
            border: 1px solid var(--text);
            font-family: var(--ui-font);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .chat-btn:hover {
            opacity: 0.8;
        }

        /* ── Sahayak Chat Additions ──────────────────────── */
        .chat-bot-wrap {
            align-self: flex-start;
            max-width: 85%;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }
        .meta-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--ui-font);
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 3px 8px;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            width: fit-content;
        }
        .meta-pill .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-muted);
        }
        
        .refs-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 8px 12px;
            margin-bottom: 6px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }
        .refs-label {
            font-family: var(--ui-font);
            font-size: 9px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .ref-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--ui-font);
            font-size: 10px;
            color: var(--text-muted);
        }
        .ref-src {
            font-size: 9px;
            font-weight: 700;
            padding: 1px 4px;
            border: 1px solid var(--border);
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .ref-src.act {
            background: rgba(28, 28, 28, 0.05);
            color: var(--text);
        }
        [data-theme="dark"] .ref-src.act {
            background: rgba(245, 234, 207, 0.08);
            color: var(--accent);
        }
        .ref-src.rules {
            background: rgba(85, 85, 80, 0.08);
            color: var(--accent-muted);
        }
        .ref-score-bar-wrap {
            flex: 1;
            height: 4px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            position: relative;
        }
        .ref-score-bar {
            height: 100%;
            background: var(--accent-muted);
        }
        
        .chat-msg.bot .cite {
            display: inline-block;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 0 4px;
            font-family: var(--ui-font);
            font-size: 11px;
            color: var(--text);
            text-decoration: none;
            cursor: pointer;
            margin: 0 2px;
        }
        .chat-msg.bot .cite:hover {
            background: var(--border);
        }
        
        .cursor {
            display: inline-block;
            width: 6px;
            height: 13px;
            background: var(--accent-muted);
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 0.8s steps(2, start) infinite;
        }
        @keyframes blink {
            to { visibility: hidden; }
        }

        /* ── Mindmap Modal ───────────────────────────────── */
        .mindmap-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(10, 20, 50, 0.55);
            backdrop-filter: blur(3px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .mindmap-overlay.open { display: flex; }

        .mindmap-modal {
            background: #FFFFFF;
            border: 1px solid var(--border);
            border-radius: 12px;
            width: calc(100vw - 80px);
            height: calc(100vh - 80px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(26, 86, 219, 0.15);
            overflow: hidden;
        }

        .mindmap-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-sidebar);
            flex-shrink: 0;
        }

        .mindmap-modal-title {
            font-family: var(--ui-font);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
        }

        .mindmap-close-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, color 0.15s;
        }
        .mindmap-close-btn:hover { background: var(--accent-light); color: var(--accent); }

        .mindmap-iframe {
            flex: 1;
            width: 100%;
            border: none;
        }

        .mindmap-btn {
            padding: 6px 14px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: #FFFFFF;
            font-family: var(--ui-font);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            outline: none;
            white-space: nowrap;
            transition: background 0.15s, box-shadow 0.15s;
            height: 30px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .mindmap-btn:hover { background: #1448C2; box-shadow: 0 2px 8px rgba(26,86,219,0.25); }
        .mindmap-btn svg { flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>DPDP Framework</h1>
            <p>Contents</p>
        </div>
        <ul class="toc-list" id="tocList"></ul>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <div class="top-bar-left">
                <button class="mindmap-btn" id="mindmapBtn" title="Open Mind Map">
                    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="3"></circle>
                        <circle cx="12" cy="3" r="2"></circle>
                        <circle cx="3" cy="20" r="2"></circle>
                        <circle cx="21" cy="20" r="2"></circle>
                        <line x1="12" y1="5" x2="12" y2="9"></line>
                        <line x1="10" y1="13.5" x2="4.5" y2="18.5"></line>
                        <line x1="14" y1="13.5" x2="19.5" y2="18.5"></line>
                    </svg>
                    MIND MAP
                </button>
            </div>

            <div class="search-container">
                <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="M21 21l-4.35-4.35"></path>
                </svg>
                <input type="text" class="search-input" id="searchInput" placeholder="Search sections, clauses...">
            </div>

            <div class="controls">
                <!-- Page navigation -->
                <div class="ctrl-group">
                    <button class="btn" id="prevPageBtn" title="Previous chapter">&larr; PREV</button>
                    <span class="page-indicator" id="pageIndicator">CH. 1 / 9</span>
                    <button class="btn" id="nextPageBtn" title="Next chapter">NEXT &rarr;</button>
                </div>

                <!-- Zoom -->
                <div class="ctrl-group">
                    <button class="btn btn-icon" id="zoomOutBtn" title="Zoom out">A&minus;</button>
                    <button class="btn btn-icon" id="zoomInBtn" title="Zoom in">A+</button>
                </div>

                <!-- Expand / Collapse -->
                <div class="ctrl-group">
                    <button class="btn" id="collapseAllBtn">COLLAPSE ALL</button>
                    <button class="btn" id="expandAllBtn">EXPAND ALL</button>
                </div>
            </div>
        </div>

        <div class="document-container" id="documentContainer">
            <div class="document-view" id="documentView"></div>
    </div>

    <!-- Mindmap Modal -->
    <div class="mindmap-overlay" id="mindmapOverlay">
        <div class="mindmap-modal">
            <div class="mindmap-modal-header">
                <span class="mindmap-modal-title">DPDP Framework &mdash; Mind Map</span>
                <button class="mindmap-close-btn" id="mindmapCloseBtn" title="Close">&times;</button>
            </div>
            <iframe class="mindmap-iframe" id="mindmapIframe" src="mindmap.html" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const actData = {};

        // DOM elements
        const tocList = document.getElementById('tocList');
        const documentView = document.getElementById('documentView');
        const searchInput = document.getElementById('searchInput');
        const expandAllBtn = document.getElementById('expandAllBtn');
        const collapseAllBtn = document.getElementById('collapseAllBtn');

        // Mindmap modal
        const mindmapOverlay = document.getElementById('mindmapOverlay');
        const mindmapBtn = document.getElementById('mindmapBtn');
        const mindmapCloseBtn = document.getElementById('mindmapCloseBtn');
        mindmapBtn.addEventListener('click', () => mindmapOverlay.classList.add('open'));
        mindmapCloseBtn.addEventListener('click', () => mindmapOverlay.classList.remove('open'));
        mindmapOverlay.addEventListener('click', (e) => { if (e.target === mindmapOverlay) mindmapOverlay.classList.remove('open'); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') mindmapOverlay.classList.remove('open'); });

        // Render functions
        function renderApp() {
            renderTOC();
            renderDocument();
            setupEventListeners();
        }

        /* ── Helper functions for deep TOC ────────────────────── */
        function toRoman(num) {
            const map = {1: 'I', 2: 'II', 3: 'III', 4: 'IV', 5: 'V', 6: 'VI', 7: 'VII', 8: 'VIII', 9: 'IX'};
            return map[num] || num;
        }
        function sanitizeId(str) { return str.replace(/[^a-zA-Z0-9]/g, '').toLowerCase(); }
        function makeClauseId(secNum, clauseNum) { return 'sec-' + secNum + '-cl-' + sanitizeId(clauseNum); }
        function makeSubClauseId(secNum, clauseNum, subNum) { return 'sec-' + secNum + '-cl-' + sanitizeId(clauseNum) + '-sub-' + sanitizeId(subNum); }
        function makeSubSubClauseId(secNum, clauseNum, subNum, subSubNum) { return 'sec-' + secNum + '-cl-' + sanitizeId(clauseNum) + '-sub-' + sanitizeId(subNum) + '-ss-' + sanitizeId(subSubNum); }

        const STOP_WORDS = new Set([
            "a", "an", "the", "and", "or", "but", "if", "because", "as", "what",
            "when", "where", "how", "why", "who", "whom", "this", "that", "these",
            "those", "am", "is", "are", "was", "were", "be", "been", "being",
            "have", "has", "had", "do", "does", "did", "to", "from", "in", "out",
            "on", "off", "over", "under", "again", "further", "then", "once",
            "here", "there", "when", "where", "why", "how", "all", "any", "both",
            "each", "few", "more", "most", "other", "some", "such", "no", "nor",
            "not", "only", "own", "same", "so", "than", "too", "very", "s", "t",
            "can", "will", "just", "don", "should", "now", "it", "its", "for",
            "by", "with", "about", "against", "between", "into", "through", "during",
            "before", "after", "above", "below", "up", "down", "of", "at", "shall",
            "may", "every", "person", "act", "provisions", "rules", "made", "thereunder",
            "also", "subject", "meaning", "means", "includes", "within", "without",
            "which", "while", "wherever", "whether", "where", "upon", "unless",
            "nothing", "contained", "hereby", "clarified", "provided", "notwithstanding"
        ]);

        function generateKeyword(text) {
            const cleanText = text.replace(/[^a-zA-Z\s]/g, ' ').toLowerCase();
            const words = cleanText.split(/\s+/);
            
            for (let word of words) {
                if (word.length > 2 && !STOP_WORDS.has(word)) {
                    return word.charAt(0).toUpperCase() + word.slice(1);
                }
            }
            return "Provision";
        }

        function extractClauseLabel(cl, secNum) {
            if (cl.title) return cl.title;
            if (secNum === '2') {
                const m = cl.content.match(/[\u201c"\u201e"\u00ab]([^\u201d"\u201c\u00bb]+)[\u201d"\u201c\u00bb]/);
                if (m) return m[1];
            }
            return generateKeyword(cl.content);
        }

        function extractSubClauseLabel(sub, secNum) {
            if (sub.title) return sub.title;
            if (secNum === '2') {
                const m = sub.content.match(/[\u201c"\u201e"\u00ab]([^\u201d"\u201c\u00bb]+)[\u201d"\u201c\u00bb]/);
                if (m) return m[1];
            }
            return generateKeyword(sub.content);
        }

        function navigateToClause(chapterNum, sectionNum, clauseId) {
            const chCard = document.getElementById('chapter-' + chapterNum);
            if (chCard) chCard.classList.remove('collapsed');
            const secEl = document.getElementById('section-' + sectionNum);
            if (secEl) secEl.classList.remove('collapsed');
            const clEl = document.getElementById(clauseId);
            if (clEl) {
                clEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                clEl.classList.add('clause-pulse');
                setTimeout(() => clEl.classList.remove('clause-pulse'), 2200);
            }
        }

        /* ── Deep nested TOC renderer ────────────────────────── */
        function renderTOC() {
            tocList.innerHTML = '';
            actData.chapter.forEach(ch => {
                if (ch.chapter_number === 0) return;
                
                const group = document.createElement('div');
                group.className = 'toc-chapter-group';
                
                const chBtn = document.createElement('button');
                chBtn.className = 'toc-chapter-btn';
                chBtn.innerHTML = `<span class="toc-ch-num">${toRoman(ch.chapter_number)}</span><span class="toc-ch-label">${ch.title}</span><svg class="toc-ch-arrow" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>`;
                chBtn.addEventListener('click', () => group.classList.toggle('open'));
                group.appendChild(chBtn);
                
                const secList = document.createElement('ul');
                secList.className = 'toc-section-list';
                
                if (ch.section) {
                    ch.section.forEach(sec => {
                        const secLi = document.createElement('li');
                        const hasClauses = sec.clauses && sec.clauses.length > 0;
                        
                        const secGroup = document.createElement('div');
                        secGroup.className = 'toc-section-group';
                        
                        const secLink = document.createElement('span');
                        secLink.className = 'toc-section-link';
                        secLink.innerHTML = `<span class="toc-sec-num">${sec.section_number}.</span><span class="toc-sec-label">${sec.title}</span>${hasClauses ? '<svg class="toc-sec-arrow" width="8" height="8" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"></path></svg>' : ''}`;
                        
                        secLink.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (hasClauses) {
                                secGroup.classList.toggle('sec-open');
                            }
                            const chCard = document.getElementById('chapter-' + ch.chapter_number);
                            if (chCard) chCard.classList.remove('collapsed');
                            const secEl = document.getElementById('section-' + sec.section_number);
                            if (secEl) {
                                secEl.classList.remove('collapsed');
                                secEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                            }
                        });
                        
                        secGroup.appendChild(secLink);

                        if (hasClauses) {
                            const clauseList = document.createElement('ul');
                            clauseList.className = 'toc-clause-list';
                            
                            sec.clauses.forEach(cl => {
                                const clLi = document.createElement('li');
                                const clLink = document.createElement('span');
                                clLink.className = 'toc-clause-link';
                                
                                const label = extractClauseLabel(cl, sec.section_number);
                                clLink.innerHTML = `<span class="toc-cl-num">${cl.clause_number}</span><span class="toc-cl-label">${label}</span>`;
                                
                                const clauseId = makeClauseId(sec.section_number, cl.clause_number);
                                
                                clLink.addEventListener('click', (e) => {
                                    e.stopPropagation();
                                    navigateToClause(ch.chapter_number, sec.section_number, clauseId);
                                });
                                
                                clLi.appendChild(clLink);

                                // Render sub-clauses if they exist
                                if (cl.sub_clauses && cl.sub_clauses.length > 0) {
                                    const subClauseList = document.createElement('ul');
                                    subClauseList.className = 'toc-clause-list'; // Reuse styles
                                    subClauseList.style.marginLeft = '12px'; // slightly indent
                                    subClauseList.style.maxHeight = 'none'; // Prevent being hidden by default CSS
                                    
                                    cl.sub_clauses.forEach(sub => {
                                        const subLi = document.createElement('li');
                                        const subLink = document.createElement('span');
                                        subLink.className = 'toc-clause-link';
                                        
                                        const subLabel = extractSubClauseLabel(sub, sec.section_number);
                                        subLink.innerHTML = `<span class="toc-cl-num">${sub.sub_clause_number}</span><span class="toc-cl-label">${subLabel}</span>`;
                                        
                                        const subClauseId = makeSubClauseId(sec.section_number, cl.clause_number, sub.sub_clause_number);
                                        
                                        subLink.addEventListener('click', (e) => {
                                            e.stopPropagation();
                                            navigateToClause(ch.chapter_number, sec.section_number, subClauseId);
                                        });
                                        
                                        subLi.appendChild(subLink);
                                        subClauseList.appendChild(subLi);
                                    });
                                    clLi.appendChild(subClauseList);
                                }
                                
                                clauseList.appendChild(clLi);
                            });
                            
                            secGroup.appendChild(clauseList);
                        }

                        secLi.appendChild(secGroup);
                        secList.appendChild(secLi);
                    });
                }

                group.appendChild(secList);
                tocList.appendChild(group);
            });

        }

        function navigateTo(id, triggerEl) {
            const el = document.getElementById(id);
            if (el) {
                el.classList.remove('collapsed');
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
            document.querySelectorAll('.toc-link').forEach(l => l.classList.remove('active'));
            if (triggerEl) triggerEl.classList.add('active');
        }

        function renderDocument() {
            documentView.innerHTML = '';

            // 1. Render Preamble if exists
            const preambleCh = actData.chapter.find(ch => ch.chapter_number === 0);
            if (preambleCh) {
                const preambleDiv = document.createElement('div');
                preambleDiv.id = 'preamble';
                preambleDiv.style.marginBottom = '40px';
                preambleDiv.innerHTML = `
                    <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 16px;">Preamble</h2>
                    <p style="font-size: 15px; line-height: 1.6; color: var(--text-muted); font-style: italic;">
                        An Act to provide for the processing of digital personal data in a manner that recognises both the right of individuals to protect their personal data and the need to process such personal data for lawful purposes and for matters connected therewith or incidental thereto.
                    </p>
                `;
                documentView.appendChild(preambleDiv);
            }

            // 2. Render Chapters
            actData.chapter.forEach(ch => {
                if (ch.chapter_number === 0) return;

                const chCard = document.createElement('div');
                chCard.className = 'chapter-card';
                chCard.id = `chapter-${ch.chapter_number}`;

                const header = document.createElement('div');
                header.className = 'chapter-header';
                header.onclick = () => toggleCollapse(chCard);
                header.innerHTML = `
                    <div class="chapter-title-area">
                        <h2>Chapter ${ch.chapter_number}</h2>
                        <h3>${ch.title}</h3>
                    </div>
                    <div class="expand-icon">
                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </div>
                `;

                const body = document.createElement('div');
                body.className = 'chapter-body';

                // Render Sections inside Chapter
                ch.section.forEach(sec => {
                    const secNode = document.createElement('div');
                    secNode.className = 'section-node';
                    secNode.id = `section-${sec.section_number}`;

                    const secHeader = document.createElement('div');
                    secHeader.className = 'section-header';
                    secHeader.onclick = (e) => {
                        e.stopPropagation();
                        toggleCollapse(secNode);
                    };
                    secHeader.innerHTML = `
                        <div class="section-title">
                            <span>${sec.section_number}.</span> ${sec.title}
                        </div>
                        <div class="expand-icon" style="width: 20px; height: 20px;">
                            <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                                <path d="M19 9l-7 7-7-7"></path>
                            </svg>
                        </div>
                    `;

                    const secBody = document.createElement('div');
                    secBody.className = 'section-body';

                    if (sec.content) {
                        const intro = document.createElement('div');
                        intro.className = 'intro-content';
                        intro.innerText = sec.content;
                        secBody.appendChild(intro);
                    }

                    if (sec.illustrations) {
                        sec.illustrations.forEach(illus => {
                            const card = renderIllustration(illus);
                            secBody.appendChild(card);
                        });
                    }

                    if (sec.clauses) {
                        sec.clauses.forEach(cl => {
                            const clauseElement = renderClause(cl, sec.section_number);
                            secBody.appendChild(clauseElement);
                        });
                    }

                    secNode.appendChild(secHeader);
                    secNode.appendChild(secBody);
                    body.appendChild(secNode);
                });

                chCard.appendChild(header);
                chCard.appendChild(body);
                documentView.appendChild(chCard);
            });
        }

        function renderClause(cl, secNum) {
            const div = document.createElement('div');
            div.className = 'clause-node';
            if (secNum) {
                div.id = makeClauseId(secNum, cl.clause_number);
            }

            const header = document.createElement('div');
            header.className = 'clause-header';
            header.innerHTML = `
                <span class="clause-num">${cl.clause_number}</span>
                <span class="clause-content">${cl.content}</span>
            `;
            div.appendChild(header);

            const body = document.createElement('div');
            body.className = 'clause-body';

            let hasChildren = false;

            if (cl.illustrations) {
                hasChildren = true;
                cl.illustrations.forEach(illus => {
                    body.appendChild(renderIllustration(illus));
                });
            }

            if (cl.sub_clauses) {
                hasChildren = true;
                cl.sub_clauses.forEach(sub => {
                    const subDiv = document.createElement('div');
                    subDiv.className = 'clause-node sub-clause-node';
                    if (secNum) {
                        subDiv.id = makeSubClauseId(secNum, cl.clause_number, sub.sub_clause_number);
                    }
                    
                    const subHeader = document.createElement('div');
                    subHeader.className = 'clause-header';
                    subHeader.innerHTML = `
                        <span class="clause-num sub-clause-num">${sub.sub_clause_number}</span>
                        <span class="clause-content">${sub.content}</span>
                    `;
                    subDiv.appendChild(subHeader);

                    const subBody = document.createElement('div');
                    subBody.className = 'clause-body';
                    
                    let subHasChildren = false;
                    
                    if (sub.illustrations) {
                        subHasChildren = true;
                        sub.illustrations.forEach(illus => {
                            subBody.appendChild(renderIllustration(illus));
                        });
                    }

                    if (sub.sub_sub_clauses) {
                        subHasChildren = true;
                        sub.sub_sub_clauses.forEach(subSub => {
                            const subSubDiv = document.createElement('div');
                            subSubDiv.className = 'clause-node sub-sub-clause-node';
                            if (secNum) {
                                subSubDiv.id = makeSubSubClauseId(secNum, cl.clause_number, sub.sub_clause_number, subSub.sub_sub_clause_number);
                            }
                            subSubDiv.innerHTML = `
                                <div class="clause-header">
                                    <span class="clause-num sub-sub-clause-num">${subSub.sub_sub_clause_number}</span>
                                    <span class="clause-content">${subSub.content}</span>
                                </div>
                            `;
                            subBody.appendChild(subSubDiv);
                        });
                    }

                    if (subHasChildren) {
                        subDiv.appendChild(subBody);
                    }
                    body.appendChild(subDiv);
                });
            }

            if (hasChildren) {
                div.appendChild(body);
            }

            return div;
        }

        function renderIllustration(text) {
            const card = document.createElement('div');
            card.className = 'illustration-card';
            card.innerHTML = `
                <div class="illustration-header">
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 16v-4M12 8h.01"></path>
                    </svg>
                    Illustration
                </div>
                <div class="illustration-body">${text}</div>
            `;
            return card;
        }

        // Collapse / Expand toggle
        function toggleCollapse(element) {
            element.classList.toggle('collapsed');
        }

        function scrollToElement(id) {
            navigateTo(id, null);
        }

        function setupEventListeners() {
            // Search implementation
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                
                if (!query) {
                    // Clear highlights and reveal all
                    document.querySelectorAll('.chapter-card, .section-node, .schedule-row').forEach(el => {
                        el.classList.remove('hidden');
                    });
                    removeHighlights(documentView);
                    return;
                }

                removeHighlights(documentView);

                // Check sections & chapters
                actData.chapter.forEach(ch => {
                    if (ch.chapter_number === 0) return;
                    let chapterMatches = false;
                    
                    ch.section.forEach(sec => {
                        // Check section content, title, clauses, sub-clauses, illustrations
                        let sectionText = `${sec.section_number} ${sec.title} ${sec.content || ''}`.toLowerCase();
                        
                        if (sec.illustrations) {
                            sectionText += ' ' + sec.illustrations.join(' ');
                        }
                        
                        if (sec.clauses) {
                            // Recursive text collection
                            sectionText += ' ' + collectClauseText(sec.clauses);
                        }

                        const matches = sectionText.includes(query);
                        const secEl = document.getElementById(`section-${sec.section_number}`);

                        if (matches) {
                            secEl.classList.remove('hidden');
                            // Auto-expand sections that match search
                            secEl.classList.remove('collapsed');
                            chapterMatches = true;
                            highlightText(secEl, query);
                        } else {
                            secEl.classList.add('hidden');
                        }
                    });

                    const chCard = document.getElementById(`chapter-${ch.chapter_number}`);
                    if (chapterMatches) {
                        chCard.classList.remove('hidden');
                        chCard.classList.remove('collapsed');
                    } else {
                        chCard.classList.add('hidden');
                    }
                });

                // Check Schedule
                if (actData.schedule) {
                    actData.schedule.forEach(row => {
                        const rowEl = document.querySelectorAll('.schedule-row')[row.sl_no - 1];
                        const text = `${row.sl_no} ${row.breach} ${row.penalty}`.toLowerCase();
                        if (text.includes(query)) {
                            rowEl.classList.remove('hidden');
                            highlightText(rowEl, query);
                        } else {
                            rowEl.classList.add('hidden');
                        }
                    });
                }
            });

            // Expand all
            expandAllBtn.addEventListener('click', () => {
                document.querySelectorAll('.chapter-card, .section-node').forEach(el => {
                    el.classList.remove('collapsed');
                });
                document.querySelectorAll('.toc-chapter-group').forEach(el => el.classList.add('open'));
                document.querySelectorAll('.toc-section-group').forEach(el => el.classList.add('sec-open'));
                document.querySelectorAll('.toc-clause-group').forEach(el => el.classList.add('cl-open'));
            });

            // Collapse all
            collapseAllBtn.addEventListener('click', () => {
                document.querySelectorAll('.chapter-card, .section-node').forEach(el => {
                    el.classList.add('collapsed');
                });
                document.querySelectorAll('.toc-chapter-group').forEach(el => el.classList.remove('open'));
                document.querySelectorAll('.toc-section-group').forEach(el => el.classList.remove('sec-open'));
                document.querySelectorAll('.toc-clause-group').forEach(el => el.classList.remove('cl-open'));
            });
        }

        function collectClauseText(clauses) {
            let text = '';
            clauses.forEach(c => {
                text += ` ${c.clause_number} ${c.content}`;
                if (c.illustrations) text += ' ' + c.illustrations.join(' ');
                if (c.sub_clauses) {
                    c.sub_clauses.forEach(s => {
                        text += ` ${s.sub_clause_number} ${s.content}`;
                        if (s.illustrations) text += ' ' + s.illustrations.join(' ');
                        if (s.sub_sub_clauses) {
                            s.sub_sub_clauses.forEach(ss => {
                                text += ` ${ss.sub_sub_clause_number} ${ss.content}`;
                            });
                        }
                    });
                }
            });
            return text.toLowerCase();
        }

        function highlightText(element, query) {
            // Simple text highlighting walker
            const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
            const textNodes = [];
            while(walker.nextNode()) textNodes.push(walker.currentNode);

            textNodes.forEach(node => {
                const parent = node.parentNode;
                if (parent.classList.contains('highlight') || parent.tagName === 'SCRIPT' || parent.tagName === 'STYLE') return;
                
                const text = node.nodeValue;
                const lowerText = text.toLowerCase();
                const index = lowerText.indexOf(query);
                
                if (index !== -1) {
                    const span = document.createElement('span');
                    span.className = 'highlight-container';
                    
                    let lastIdx = 0;
                    let idx = lowerText.indexOf(query, lastIdx);
                    
                    const fragment = document.createDocumentFragment();
                    
                    while (idx !== -1) {
                        fragment.appendChild(document.createTextNode(text.substring(lastIdx, idx)));
                        const matchSpan = document.createElement('span');
                        matchSpan.className = 'highlight';
                        matchSpan.appendChild(document.createTextNode(text.substring(idx, idx + query.length)));
                        fragment.appendChild(matchSpan);
                        lastIdx = idx + query.length;
                        idx = lowerText.indexOf(query, lastIdx);
                    }
                    fragment.appendChild(document.createTextNode(text.substring(lastIdx)));
                    parent.replaceChild(fragment, node);
                }
            });
        }

        function removeHighlights(element) {
            const highlights = element.querySelectorAll('.highlight');
            highlights.forEach(hl => {
                const parent = hl.parentNode;
                parent.replaceChild(document.createTextNode(hl.innerText), hl);
                parent.normalize();
            });
        }

        // Initialize application
        renderApp();

        // ── Theme toggle ──────────────────────────────────────────
        const themeBtn = document.getElementById('themeToggleBtn');
        themeBtn.addEventListener('click', () => {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            themeBtn.textContent = isDark ? '☾' : '☀';
        });

        // ── Zoom ──────────────────────────────────────────────────
        const docView = document.getElementById('documentView');
        let fontSize = 15; // px
        document.getElementById('zoomInBtn').addEventListener('click', () => {
            fontSize = Math.min(fontSize + 1, 22);
            docView.style.setProperty('--doc-size', fontSize + 'px');
            docView.style.fontSize = fontSize + 'px';
        });
        document.getElementById('zoomOutBtn').addEventListener('click', () => {
            fontSize = Math.max(fontSize - 1, 11);
            docView.style.setProperty('--doc-size', fontSize + 'px');
            docView.style.fontSize = fontSize + 'px';
        });

        // ── Prev / Next chapter navigation ────────────────────────
        const chapters = actData.chapter || [];
        const totalChapters = chapters.length;
        let currentChapter = 1;

        function updatePageIndicator() {
            document.getElementById('pageIndicator').textContent =
                `CH. ${currentChapter} / ${totalChapters}`;
        }

        function scrollToChapter(num) {
            const card = document.getElementById(`chapter-${num}`);
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        document.getElementById('prevPageBtn').addEventListener('click', () => {
            if (currentChapter > 1) {
                currentChapter--;
                updatePageIndicator();
                scrollToChapter(currentChapter);
            }
        });

        document.getElementById('nextPageBtn').addEventListener('click', () => {
            if (currentChapter < totalChapters) {
                currentChapter++;
                updatePageIndicator();
                scrollToChapter(currentChapter);
            }
        });

        // Update current chapter indicator on scroll
        const docContainer = document.getElementById('documentContainer');
        docContainer.addEventListener('scroll', () => {
            for (let i = totalChapters; i >= 1; i--) {
                const card = document.getElementById(`chapter-${i}`);
                if (card && card.getBoundingClientRect().top <= 120) {
                    if (currentChapter !== i) {
                        currentChapter = i;
                        updatePageIndicator();
                    }
                    break;
                }
            }
        }, { passive: true });

        updatePageIndicator();

        // ── Sahayak Chat Logic ───────────────────────────────────────────
        const sahayakBtn = document.getElementById('sahayakBtn');
        const chatPanel = document.getElementById('chatPanel');
        const chatCloseBtn = document.getElementById('chatCloseBtn');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSendBtn = document.getElementById('chatSendBtn');

        let chatHistory = [];
        let isStreaming = false;

        sahayakBtn.addEventListener('click', () => {
            chatPanel.classList.toggle('open');
            if (chatPanel.classList.contains('open')) {
                chatInput.focus();
            }
        });

        chatCloseBtn.addEventListener('click', () => {
            chatPanel.classList.remove('open');
        });

        function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        function getChapterAndSectionForClause(secNum) {
            for (const ch of actData.chapter) {
                if (ch.section) {
                    const found = ch.section.find(s => s.section_number === String(secNum));
                    if (found) {
                        return { chapter_number: ch.chapter_number, section: found };
                    }
                }
            }
            return null;
        }

        window.handleCitationClick = function(docType, numStr) {
            if (docType === 'act') {
                const match = numStr.match(/^(\d+)(?:\(([^)]+)\))?(?:\(([^)]+)\))?/);
                if (match) {
                    const secNum = match[1];
                    const clauseNum = match[2];
                    const subNum = match[3];
                    
                    const info = getChapterAndSectionForClause(secNum);
                    if (info) {
                        const chNum = info.chapter_number;
                        if (clauseNum) {
                            let clauseId = makeClauseId(secNum, '(' + clauseNum + ')');
                            if (subNum) {
                                clauseId = makeSubClauseId(secNum, '(' + clauseNum + ')', '(' + subNum + ')');
                            }
                            navigateToClause(chNum, secNum, clauseId);
                        } else {
                            navigateToClause(chNum, secNum, 'section-' + secNum);
                        }
                        return;
                    }
                }
            } else if (docType === 'rules') {
                alert("Rule citation: " + numStr + "\nNote: The document viewer displays the DPDP Act 2023. You can read the rule details in the chatbot response.");
            }
        };

        function formatBotText(text) {
            return text
                .replace(/\[Act §([\w().,\s-]+)\]/g, (match, p1) => {
                    const cleanNum = p1.replace(/\s+/g, '');
                    return `<a class="cite" onclick="handleCitationClick('act', '${cleanNum}')">${match}</a>`;
                })
                .replace(/\[Rules r\.([\w().,\s-]+)\]/g, (match, p1) => {
                    const cleanNum = p1.replace(/\s+/g, '');
                    return `<a class="cite" onclick="handleCitationClick('rules', '${cleanNum}')">${match}</a>`;
                });
        }

        function appendUserMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'chat-msg user';
            msgDiv.textContent = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return msgDiv;
        }

        function appendBotSkeleton() {
            const wrap = document.createElement('div');
            wrap.className = 'chat-bot-wrap';
            
            const metaPill = document.createElement('div');
            metaPill.className = 'meta-pill hidden';
            metaPill.innerHTML = '<div class="dot"></div><span class="meta-text">Analysing query...</span>';
            wrap.appendChild(metaPill);
            
            const refsEl = document.createElement('div');
            refsEl.className = 'refs-container';
            wrap.appendChild(refsEl);
            
            const bubbleEl = document.createElement('div');
            bubbleEl.className = 'chat-msg bot';
            bubbleEl.innerHTML = '<div class="cursor"></div>';
            wrap.appendChild(bubbleEl);
            
            chatMessages.appendChild(wrap);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return {
                metaPill,
                metaText: metaPill.querySelector('.meta-text'),
                refsEl,
                bubbleEl
            };
        }

        function renderRefs(refsEl, refs) {
            if (!refs || !refs.length) return;
            
            const panel = document.createElement('div');
            panel.className = 'refs-panel';
            panel.innerHTML = `<div class="refs-label">Wiki pages retrieved</div>`;
            
            refs.forEach(r => {
                const src = r.source === 'DPDP_Act_2023' ? 'act'
                          : r.source === 'DPDP_Rules_2025' ? 'rules' : 'syn';
                const srcLbl = r.source === 'DPDP_Act_2023' ? 'Act'
                             : r.source === 'DPDP_Rules_2025' ? 'Rules' : 'Concept';
                const barW = Math.round(r.score * 100);
                
                const item = document.createElement('div');
                item.className = 'ref-item';
                item.innerHTML = `
                    <span class="ref-src ${src}">${srcLbl}</span>
                    <div style="flex: 1; min-width: 0;">
                        <div style="font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text);">${escHtml(r.title)}</div>
                        <div class="ref-score-bar-wrap" style="margin-top: 3px;">
                            <div class="ref-score-bar" style="width: ${barW}%;"></div>
                        </div>
                    </div>
                    <span style="font-size: 10px; font-weight: 700; color: var(--accent-muted); flex-shrink: 0; margin-left: 4px;">${(r.score * 100).toFixed(0)}%</span>
                `;
                panel.appendChild(item);
            });
            
            refsEl.appendChild(panel);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function handleSend() {
            if (isStreaming) return;
            const text = chatInput.value.trim();
            if (!text) return;

            chatInput.value = '';
            isStreaming = true;
            chatSendBtn.disabled = true;

            appendUserMessage(text);

            const { metaPill, metaText, refsEl, bubbleEl } = appendBotSkeleton();

            let aiText = '';
            let textStarted = false;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, history: chatHistory })
                });

                if (!response.ok) throw new Error('Server error');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const payload = line.replace('data: ', '').trim();
                        if (payload === '[DONE]') break;
                        
                        try {
                            const parsed = JSON.parse(payload);
                            if (parsed.error) {
                                bubbleEl.innerHTML = `<span style="color:var(--text-ill);">[Error: ${escHtml(parsed.error)}]</span>`;
                                textStarted = true;
                            } else if (parsed.meta) {
                                const m = parsed.meta;
                                metaText.textContent = `${m.type === 'situation' ? '📋 Situation' : '❓ Question'} · ${m.actors}`;
                                metaPill.classList.remove('hidden');
                            } else if (parsed.refs) {
                                renderRefs(refsEl, parsed.refs);
                            } else if (parsed.token !== undefined) {
                                if (!textStarted) {
                                    bubbleEl.innerHTML = '';
                                    textStarted = true;
                                }
                                aiText += parsed.token;
                                bubbleEl.innerHTML = marked.parse(formatBotText(aiText)) + '<span class="cursor"></span>';
                                chatMessages.scrollTop = chatMessages.scrollHeight;
                            }
                        } catch (e) { }
                    }
                }

                // Finalise bubble — remove cursor
                if (aiText) {
                    bubbleEl.innerHTML = marked.parse(formatBotText(aiText));
                }

                // Update history
                chatHistory.push({ role: 'user', content: text.substring(0, 200) });
                chatHistory.push({ role: 'assistant', content: aiText.substring(0, 500) });
                if (chatHistory.length > 8) chatHistory = chatHistory.slice(-8);

            } catch (err) {
                bubbleEl.innerHTML = '<span style="color:var(--text-ill);">Error connecting to Sahayak.</span>';
            }

            isStreaming = false;
            chatSendBtn.disabled = false;
            chatInput.focus();
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatSendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

    </script>
</body>
